<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f766e">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Minder">
<title>Minder · slimme uitgaventracker</title>
<style>
:root{
  --bg:#0a0f1a; --card:#141b2b; --card2:#1b2336; --line:rgba(255,255,255,.07);
  --txt:#eaf0fb; --mut:#8f9bb0; --teal:#2dd4bf; --teal-d:#0f766e;
  --green:#34d399; --amber:#f5b544; --red:#f06d6d; --blue:#60a5fa; --violet:#a78bfa;
  --shadow:none;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
  font-size:14px; line-height:1.45; padding-bottom:78px; max-width:520px; margin:0 auto;
  min-height:100vh; position:relative;
  font-variant-numeric:tabular-nums; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  letter-spacing:-.01em;
}
svg{display:inline-block}
h1,h2,h3{margin:0}
.app-head{padding:18px 18px 6px;display:flex;align-items:center;justify-content:space-between}
.app-head .logo{font-weight:800;font-size:22px;letter-spacing:-.4px}
.app-head .logo span{color:var(--teal)}
.head-gear{background:none;border:0;color:var(--mut);cursor:pointer;padding:5px;display:flex;align-items:center;border-radius:50%}
.head-gear.on,.head-gear:active{color:var(--teal)}
.head-ic{background:none;border:0;color:var(--mut);cursor:pointer;padding:4px;display:flex;align-items:center;position:relative;border-radius:50%}
.head-ic:active{color:var(--teal)}
.head-ic .badge{position:absolute;top:-1px;right:-1px;min-width:15px;height:15px;padding:0 3px;border-radius:8px;background:var(--red);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1}
.month-pick{display:flex;align-items:center;gap:1px;background:none;border:0;border-radius:0;padding:0}
.month-pick button{background:none;border:none;color:var(--mut);font-size:17px;width:22px;height:22px;border-radius:50%;cursor:pointer}
.month-pick button:active{background:var(--card2)}
.month-pick .m{font-weight:600;min-width:72px;text-align:center;font-size:12.5px}
.screen{display:none;padding:8px 16px 16px;animation:fade .25s ease}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 16px;margin-bottom:14px;box-shadow:none}
.muted{color:var(--mut)}
/* ===== v10 systeem, home pilot: geen dozen, ruimte + typografie ===== */
.hsec{margin-top:30px}
.hlabel{font-size:12.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--mut);margin-bottom:12px}
.hero2{padding:4px 2px 0}
.hero2 .hlbl{font-size:12.5px;color:var(--mut)}
.hero2 .hbig{font-size:44px;font-weight:800;letter-spacing:-1.6px;line-height:1.04;font-variant-numeric:tabular-nums;margin:7px 0 3px}
.hero2 .hsub{font-size:12.5px;color:var(--mut)}
.hero2 .hstat{font-size:12.5px;font-weight:600;margin-top:12px;display:flex;align-items:center;gap:6px}
.homehero{padding:20px 2px 4px;cursor:pointer}
.homehero .hh-lbl{font-size:13px;color:var(--mut)}
.homehero .hh-big{font-size:40px;font-weight:600;letter-spacing:-1.2px;line-height:1.05;font-variant-numeric:tabular-nums;margin:7px 0 11px}
.homehero .hh-warn{font-size:16px;color:var(--amber);vertical-align:middle}
.homehero .hh-sub{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--mut)}
.homehero .hh-sub .dot{width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0}
.homelist{margin-top:28px}
.homelist .hl-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px}
.homelist .hl-head>span:first-child{font-size:13px;color:var(--mut)}
.homelist .hl-all{font-size:13px;color:var(--teal);cursor:pointer}
.insfocus{padding:16px 2px 4px}
.insfocus .if-ctx{font-size:14.5px;color:var(--txt);line-height:1.5;margin-bottom:16px;max-width:320px}
.if-cta{display:inline-flex;align-items:center;gap:6px;background:var(--teal);color:#06231c;border:0;border-radius:13px;padding:11px 18px;font-size:14px;font-weight:600;cursor:pointer}
.daystat{padding:16px 2px 2px;border-top:1px solid var(--line);margin-top:20px}
.daystat .ds-l{font-size:13px;color:var(--mut)}
.daystat .ds-v{font-size:26px;font-weight:600;letter-spacing:-.5px;font-variant-numeric:tabular-nums;margin:3px 0 1px}
.daystat .ds-s{font-size:12.5px;color:var(--mut)}
.daymini{font-size:13px;color:var(--mut);margin-top:20px;padding-top:14px;border-top:1px solid var(--line)}
.vooruit{padding:24px 2px 4px}
.vooruit .vh-lbl{font-size:13px;color:var(--mut)}
.vooruit .vh-big{font-size:44px;font-weight:600;letter-spacing:-1.4px;line-height:1.04;font-variant-numeric:tabular-nums;margin:7px 0 12px}
.vooruit .vh-status{font-size:15px;color:var(--txt);margin-bottom:18px}
.vooruit .vh-bar{position:relative;height:6px;border-radius:6px;background:var(--card2);max-width:320px}
.vooruit .vh-fill{height:100%;border-radius:6px}
.vooruit .vh-mark{position:absolute;top:-4px;height:14px;width:2px;border-radius:1px;background:var(--txt);opacity:.5;transform:translateX(-1px)}
.vooruit .vh-sub{font-size:12.5px;color:var(--mut);margin-top:-8px;margin-bottom:4px}
.vh-hef{margin-top:16px;max-width:340px}
.vh-hef .vh-hef-h{font-size:12px;font-weight:600;color:var(--mut);margin-bottom:8px}
.vh-chip{display:inline-block;background:rgba(45,212,191,.07);border:1px solid rgba(45,212,191,.4);color:var(--teal);border-radius:18px;padding:6px 11px;margin:0 6px 6px 0;font-size:12.5px;font-weight:500;cursor:pointer}
.vh-chip.on{background:var(--teal);color:#06231c;border-color:var(--teal)}
.vh-eff{font-size:12.5px;color:var(--txt);line-height:1.5;margin-top:4px}
.vh-eff b{font-weight:600;color:var(--teal)}
.fc-diff{font-size:13px;font-weight:700;margin-top:12px}
.fc-mo{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-top:1px solid var(--line)}
.fc-mo:first-of-type{border-top:none}
.fc-mo-n{font-size:15px;font-weight:600}
.fc-mo-tag{font-size:11.5px;color:var(--amber);margin-top:2px}
.fc-mo-bal{font-size:15px;font-weight:800;text-align:right}
.fc-mo-net{font-size:12px;font-weight:600;text-align:right;margin-top:2px}
.fc-savings{font-size:12.5px;color:var(--mut);margin-bottom:10px}
.vc-leg{display:flex;gap:16px;font-size:11px;color:var(--mut);margin-top:4px}
.vc-leg i{width:14px;height:2px;background:var(--teal);display:inline-block;vertical-align:middle;margin-right:5px}
.vc-leg i.dash{background:transparent;border-top:2px dashed var(--mut);height:0}
.vc-card{display:flex;justify-content:space-between;align-items:center;gap:10px;background:rgba(45,212,191,.06);border:1px solid rgba(45,212,191,.16);border-radius:12px;padding:11px 13px;margin-top:10px}
.vc-mon{font-size:11px;color:var(--mut);font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.vc-plan{font-size:12px;color:var(--mut);margin-top:2px;overflow:hidden;text-overflow:ellipsis}
.vc-bal{font-size:20px;font-weight:800;letter-spacing:-.4px;flex-shrink:0}
.sc-leg{display:flex;flex-wrap:wrap;gap:6px 14px;font-size:11px;color:var(--mut);margin-top:8px}
.sc-leg span{display:inline-flex;align-items:center}
.sc-leg i{width:15px;height:0;border-top:2px solid var(--teal);display:inline-block;vertical-align:middle;margin-right:5px}
.sc-leg i.d{border-top-style:dashed}
.sc-cap{font-size:12.5px;color:var(--txt);margin-top:10px;padding-top:10px;border-top:1px solid var(--line);line-height:1.5}
.sc-cap b{font-weight:600}
.sc-cap .mut{color:var(--mut)}
.fc-chips{display:flex;flex-wrap:wrap;gap:8px}
.fc-chip{background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:20px;padding:9px 14px;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s,border-color .15s}
.fc-chip.on{background:var(--teal);color:#06231c;border-color:var(--teal)}
.fc-one{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--mut);padding:7px 0}
.fc-one .x{color:var(--mut);cursor:pointer;padding:0 6px;font-size:14px}
.fc-input{display:flex;flex-direction:column;gap:9px}
.fc-input select,.fc-input input{width:100%;box-sizing:border-box;background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:12px;padding:13px 14px;font-size:15px;font-family:inherit}
.fc-input-row{display:flex;gap:9px}
.fc-input-row input{flex:1;min-width:0}
.fc-add{background:var(--teal);color:#06231c;border:none;border-radius:12px;padding:0 20px;height:48px;font-size:15px;font-weight:700;cursor:pointer;flex-shrink:0;white-space:nowrap}
.ov-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:14.5px}
.ov-row:last-child{border-bottom:0}
.beh-row{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line);font-size:14.5px}
.beh-row:last-child{border-bottom:0}
.beh-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.beh-t{flex:1}
.beh-go{color:var(--mut)}
.insinline{display:flex;align-items:center;gap:9px;padding:14px 2px 2px;font-size:14.5px;color:var(--txt);cursor:pointer}
.insinline .ii-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.insinline .ii-go{margin-left:auto;color:var(--mut);flex-shrink:0;font-size:17px}
.bc-sum{display:flex;gap:9px;margin:2px 0 12px}
.bc-sum>div{flex:1;background:var(--card2);border-radius:13px;padding:12px 11px}
.bc-k{font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--mut);margin-bottom:5px}
.bc-v{font-size:15px;font-weight:800;line-height:1.2}
.bc-row{padding:13px 0;border-top:1px solid var(--line);cursor:pointer}
.bc-row:first-of-type{border-top:none}
.bc-rt{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.bc-name{font-size:14.5px;font-weight:600}
.bc-amt{font-size:13.5px;font-weight:700;white-space:nowrap;color:var(--mut)}
.bc-amt b{color:var(--txt)}
.bc-var{font-size:12.5px;font-weight:700;margin-top:6px}
.bc-hypo{font-size:13px;color:var(--mut);line-height:1.5;padding:10px 0;border-top:1px solid var(--line)}
.bc-hypo:first-of-type{border-top:none}
.bc-hd{color:var(--txt);font-weight:600}
.bc-status{font-size:20px;font-weight:800;letter-spacing:-.3px;line-height:1.25}
.bc-statsub{font-size:13px;color:var(--mut);margin-top:4px}
.bc-steer{font-size:13.5px;color:var(--mut);margin-top:16px;line-height:1.5}
.bc-why{font-size:12.5px;color:var(--mut);line-height:1.45;margin-top:6px}
.bc-tip{display:flex;gap:10px;align-items:flex-start;background:rgba(45,212,191,.08);border:1px solid rgba(45,212,191,.18);border-radius:13px;padding:12px 13px;margin-top:18px;font-size:13.5px;line-height:1.45}
.bc-tip .bc-tip-l{color:var(--teal);font-weight:700;flex-shrink:0}
.actfocus{padding:26px 2px 4px}
.actfocus .af-ic{font-size:26px;margin-bottom:14px}
.actfocus .af-ctx{font-size:18px;font-weight:600;line-height:1.4;margin-bottom:22px;max-width:320px}
.actfocus .af-tag{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);margin-bottom:6px}
.actfocus .af-obs{font-size:14px;color:var(--mut);margin-bottom:6px}
.actfocus .af-action{font-size:19px;font-weight:600;line-height:1.35;margin-bottom:22px;max-width:320px}
.actfocus .af-steps{font-size:13px;color:var(--teal);cursor:pointer;margin-top:14px}
.actfocus .af-undo{font-size:13px;color:var(--mut);cursor:pointer;margin-top:12px}
.actfocus .af-open{font-size:19px;font-weight:600;line-height:1.35;margin-bottom:8px;max-width:320px}
.actfocus .af-mean{font-size:14px;color:var(--mut);line-height:1.5;margin:0 0 20px;max-width:320px}
.actfocus .af-q{font-size:17px;font-weight:600;line-height:1.4;margin-bottom:15px;max-width:320px}
.actfocus .af-fwd{font-size:13px;color:var(--teal);margin:-12px 0 20px;max-width:320px}
.actfocus .af-impact{font-size:13.5px;color:var(--txt);background:rgba(45,212,191,.08);border:1px solid rgba(45,212,191,.18);border-radius:12px;padding:11px 13px;margin:0 0 18px;line-height:1.45;max-width:320px}
.coachchips{display:flex;flex-wrap:wrap;gap:9px}
.coachchip{background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:21px;padding:10px 16px;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s,border-color .15s}
.coachchip:active{background:var(--teal);color:#06231c;border-color:var(--teal)}
.coachchip.rec{border-color:var(--teal);color:var(--teal)}
.actfocus .coachcard{background:var(--card2);border:1px solid var(--line);border-left:3px solid var(--amber);border-radius:0 13px 13px 0;padding:13px 14px;margin:2px 0 16px;max-width:340px}
.actfocus .coachcard .cc-obs{font-size:15.5px;font-weight:600;line-height:1.4}
.actfocus .coachcard .cc-cause{font-size:12.5px;color:var(--mut);line-height:1.5;margin-top:6px}
.coachgreet{margin:2px 0 18px;max-width:340px}
.coachgreet .cg-hi{font-size:22px;font-weight:700;letter-spacing:-.3px;margin-bottom:10px}
.coachgreet .cg-line{font-size:14.5px;color:var(--txt);line-height:1.55;margin-bottom:8px}
.coachgreet .cg-line.warn{color:var(--amber)}
.cg-sand{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:4px 14px;margin:0 0 18px;max-width:340px}
.cg-sand .cs-row{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
.cg-sand .cs-row:last-child{border-bottom:0}
.cg-sand .cs-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:6px}
.cg-sand .cs-t{font-size:13.5px;line-height:1.5}
.cg-sand .cs-t b{font-weight:600}
.cg-sand .cs-t .cs-lbl{display:block;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--mut);margin-bottom:2px}
.cg-disc{border:1px solid rgba(45,212,191,.2);background:rgba(45,212,191,.06);border-radius:14px;padding:13px 14px;margin:0 0 20px;max-width:340px}
.cg-disc .cd-h{font-size:13px;font-weight:700;color:var(--teal);margin-bottom:7px}
.cg-disc .cd-rule{font-size:13.5px;color:var(--txt);line-height:1.55;margin-bottom:5px;padding-left:16px;position:relative}
.cg-disc .cd-rule:before{content:"·";position:absolute;left:4px;color:var(--teal);font-weight:700}
.cg-disc .cd-rule:last-child{margin-bottom:0}
/* ===== Coach-scherm: 4 zones (unified card-systeem) ===== */
.cz-status{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px}
.czs-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.czs-amt .czs-lbl{font-size:11px;color:var(--mut);margin-bottom:3px}
.czs-amt .big{font-size:30px;font-weight:700;letter-spacing:-.6px;font-variant-numeric:tabular-nums}
.czs-amt .of{font-size:15px;color:var(--mut)}
.czs-days{text-align:right;flex-shrink:0}
.czs-days .czs-dnum{font-size:20px;font-weight:700;color:var(--txt);font-variant-numeric:tabular-nums}
.czs-days .czs-dlbl{display:block;font-size:11px;color:var(--mut);margin-top:1px}
.czs-cap{font-size:12px;color:var(--txt);line-height:1.45;margin:0 0 12px}
.czs-cap b{font-weight:600}
.czs-bar{position:relative;height:8px;border-radius:6px;background:var(--card2);margin:15px 0 13px}
.czs-fill{height:100%;border-radius:6px;transition:width .4s}
.czs-pace{position:absolute;top:-3px;width:2px;height:14px;background:var(--txt);opacity:.55;border-radius:1px}
.czs-chip{display:inline-block;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;border:1px solid}
.cz-line{font-size:14px;color:var(--txt);line-height:1.55;margin:14px 2px 0;max-width:340px}
.cz-head{font-size:11px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--mut);margin:26px 2px 11px}
.cz-head-t{cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.cz-chev{font-size:9px;opacity:.8}
.cz-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px}
.cz-card+.cz-card{margin-top:10px}
.cz-fb{display:flex;gap:11px}
.cz-fb .ic{font-size:18px;flex-shrink:0;margin-top:1px;line-height:1}
.cz-fb .tx{font-size:13.5px;line-height:1.5}
.cz-fb .tx b{font-weight:600}
.cz-eyebrow{font-size:11px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--mut)}
.cz-end{font-size:34px;font-weight:700;letter-spacing:-.9px;margin:4px 0 6px;font-variant-numeric:tabular-nums}
.cz-delta{display:inline-block;font-size:12.5px;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(45,212,191,.14);color:var(--teal)}
.cz-delta.amber{background:rgba(240,166,117,.14);color:var(--amber)}
.cz-rule{display:block;width:100%;text-align:left;background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:12px;padding:12px 13px;font-size:13.5px;font-weight:500;cursor:pointer;margin-top:8px}
.cz-rule.on{border-color:var(--teal);color:var(--teal);background:rgba(45,212,191,.08)}
.cz-rule .cr-cut{float:right;color:var(--mut);font-weight:600}
.cz-rule.on .cr-cut{color:var(--teal)}
.cz-mine{margin-top:26px;opacity:.9}
.cz-mine .czr-head{font-size:13px;color:var(--mut);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px;padding:13px;border:1px solid var(--line);border-radius:12px;background:var(--card)}
.cz-pot{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
.cz-pot:last-child{border-bottom:0}
.cz-pot .cp-info{flex:1;min-width:0}
.cz-pot .cp-nm{font-size:14px;font-weight:600}
.cz-pot .cp-sub{font-size:12px;color:var(--mut);margin-top:2px}
.cz-pot .cp-sub.warn{color:var(--amber)}
.cz-pot .cp-btn{flex-shrink:0;background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:7px 12px;font-size:12.5px;font-weight:600;cursor:pointer}
.cz-pot .cp-btn.make{border-color:var(--teal);color:var(--teal)}
.cp-add{display:block;width:100%;text-align:left;background:transparent;border:1px dashed rgba(79,214,196,.45);color:var(--teal);border-radius:10px;padding:10px 12px;margin:10px 0 4px;font-size:13px;font-weight:600;cursor:pointer}
.cz-note{font-size:12px;color:var(--mut);line-height:1.5;margin:9px 4px 0}
.cz-effect{font-size:14px;color:var(--txt);line-height:1.5;margin-bottom:4px}
.cz-link{font-size:13px;color:var(--teal);cursor:pointer;font-weight:600;margin-top:14px}
.cothr{display:flex;flex-direction:column}
.cbub{max-width:86%;padding:9px 12px;border-radius:14px;font-size:14px;line-height:1.5;margin:5px 0;white-space:pre-wrap}
.cbub.co{background:var(--card2);border-bottom-left-radius:4px;align-self:flex-start}
.cbub.me{background:var(--teal);color:#06231c;border-bottom-right-radius:4px;align-self:flex-end;font-weight:500}
.cfx{align-self:flex-start;font-size:12px;color:var(--teal);border:1px solid rgba(45,212,191,.3);background:rgba(45,212,191,.08);border-radius:20px;padding:4px 11px;margin:4px 0 6px}
.cdots span{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--mut);margin:0 2px;animation:cobl 1s infinite}
.cdots span:nth-child(2){animation-delay:.2s}.cdots span:nth-child(3){animation-delay:.4s}
@keyframes cobl{0%,60%,100%{opacity:.25}30%{opacity:1}}
.cch{display:flex;justify-content:space-between;align-items:center;gap:8px;width:100%;text-align:left;background:rgba(45,212,191,.07);border:1px solid rgba(45,212,191,.42);color:var(--teal);border-radius:12px;padding:11px 13px;margin-top:7px;font-size:13.5px;font-weight:500;cursor:pointer}
.cch:hover{background:rgba(45,212,191,.15)}
.cch .cchv{opacity:.7;flex-shrink:0}
.corow{display:flex;gap:8px;align-items:flex-end;align-self:flex-start;max-width:92%;margin:5px 0}
.corow .coav{width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--card2)}
.corow .cbub.co{margin:0}
.coachhead{display:flex;align-items:center;gap:9px;margin:26px 2px 11px;cursor:pointer}
.coachhead .av{width:30px;height:30px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--card2)}
.coachhead .nm{font-size:11px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--mut)}
.coachhead .sw{font-size:11px;color:var(--teal);margin-left:auto}
.cobuy{display:block;width:100%;text-align:left;background:var(--card2);border:1px solid var(--teal);color:var(--teal);border-radius:12px;padding:12px 13px;margin-top:18px;font-size:13.5px;font-weight:600;cursor:pointer}
.coinput{width:100%;margin-top:8px;background:var(--card2);color:var(--txt);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px;box-sizing:border-box}
.coconf{display:flex;gap:8px;margin-top:10px}
.coconf-ok{flex:1;background:var(--teal);color:#06231c;border:0;border-radius:11px;padding:11px;font-size:13.5px;font-weight:600;cursor:pointer}
.coconf-adj{background:transparent;color:var(--mut);border:1px solid var(--line);border-radius:11px;padding:11px 14px;font-size:13.5px;cursor:pointer}
.cbub.co.acc{border-left:2px solid var(--teal);border-top-left-radius:5px;border-bottom-left-radius:5px}
.cbub .hl{color:var(--teal);font-weight:600}
.cbub .warn{color:#e8c372;font-weight:600}
.cbub .cbsub{color:var(--mut);font-size:12.5px;line-height:1.45;margin-top:6px}
.cbub .ca-eye{font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--mut);margin-bottom:5px}
.cbub .ca-ctx{font-size:12.5px;color:var(--mut);line-height:1.5;margin-bottom:8px}
.cbub .ca-act{font-size:14px;color:var(--txt);line-height:1.5}
.coachproj{background:rgba(45,212,191,.06);border:1px solid rgba(45,212,191,.18);border-radius:14px;padding:14px;margin:0 0 16px;max-width:340px}
.coachproj .cp-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px}
.coachproj .cp-lbl{font-size:11px;color:var(--mut);font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.coachproj .cp-pill{font-size:12px;font-weight:600;background:rgba(45,212,191,.14);color:var(--teal);padding:3px 9px;border-radius:20px}
.coachproj .cp-big{font-size:28px;font-weight:800;letter-spacing:-.5px;line-height:1.1}
.coachproj .cp-sub{font-size:12px;color:var(--mut);margin-top:1px}
.coachproj .cp-leg{display:flex;gap:16px;font-size:11px;color:var(--mut);margin-top:6px}
.coachproj .cp-leg i{width:14px;height:2px;background:var(--teal);display:inline-block;vertical-align:middle;margin-right:5px}
.coachproj .cp-leg i.dash{background:transparent;border-top:2px dashed var(--mut);height:0}
.actfocus .af-base{font-size:13px;color:var(--mut);margin:2px 0 12px;max-width:320px}
.actfocus .af-prop{font-size:14.5px;color:var(--mut);margin:0 0 14px;max-width:320px}
.actfocus .af-eval{font-size:13px;color:var(--mut);line-height:1.5;margin:0 0 16px;max-width:320px}
.coachdots{display:flex;gap:6px;margin-bottom:18px}
.coachdots i{width:6px;height:6px;border-radius:50%;background:var(--card2);display:inline-block}
.coachdots i.on{background:var(--teal)}
.bar-thin{height:6px;background:var(--card2);border-radius:4px;overflow:hidden;margin:14px 0 2px}
.bar-thin>div{height:100%;border-radius:4px;transition:width .5s}
.kpis{display:flex;gap:30px;padding:2px}
.kpi .kl{font-size:12.5px;color:var(--mut)}
.kpi .kv{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:3px;display:flex;align-items:center;gap:4px}
.signal{display:flex;gap:12px;align-items:flex-start;padding:3px 0 3px 15px;position:relative}
.signal:before{content:"";position:absolute;left:0;top:2px;bottom:2px;width:3px;border-radius:2px;background:var(--mut)}
.signal.good:before{background:var(--green)}
.signal.warn:before{background:var(--amber)}
.signal.bad:before{background:var(--red)}
.signal.info:before{background:var(--blue)}
.signal .si{flex-shrink:0;margin-top:1px;color:var(--mut)}
.signal.good .si{color:var(--green)}
.signal.warn .si{color:var(--amber)}
.signal.bad .si{color:var(--red)}
.signal.info .si{color:var(--blue)}
.signal .st{font-size:14px;line-height:1.5;flex:1;min-width:0;overflow-wrap:break-word;word-break:normal}
.txl{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);cursor:pointer}
.txl:last-child{border-bottom:0}
.txl .ava{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.txl .info{flex:1;min-width:0}
.txl .nm{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txl .cat{font-size:12.5px;color:var(--mut)}
.txl .amt{font-weight:700;font-size:14px;white-space:nowrap;font-variant-numeric:tabular-nums}
.small{font-size:12.5px}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.center{text-align:center}

/* budget ring */
.ring-wrap{display:flex;flex-direction:column;align-items:center;padding:6px 0 2px}
.ring{position:relative;width:200px;height:200px}
.ring svg{transform:rotate(-90deg)}
.ring .mid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .mid .pct{font-size:44px;font-weight:800;letter-spacing:-1px;line-height:1}
.ring .mid .lab{font-size:12.5px;color:var(--mut);margin-top:4px}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:6px}
.kpi{background:var(--card2);border-radius:14px;padding:11px 8px;text-align:center}
.kpi .v{font-weight:700;font-size:14px}
.kpi .l{font-size:11px;color:var(--mut);margin-top:2px}
.bar-track{height:9px;background:var(--card2);border-radius:6px;overflow:hidden;margin:8px 0 4px}
.bar-fill{height:100%;border-radius:6px;transition:width .5s}

/* coach */
.coach{display:flex;gap:11px;align-items:flex-start;padding:3px 0 3px 15px;border-radius:0;margin-bottom:14px;border:0;border-left:3px solid var(--line)}
.coach .ic{font-size:22px;line-height:1.1;flex-shrink:0}
.coach.good .ic{color:var(--green)}
.coach.warn .ic{color:var(--amber)}
.coach.bad .ic{color:var(--red)}
.coach.info .ic{color:var(--blue)}
.coach .tx{display:block;font-size:14px;flex:1;min-width:0;overflow-wrap:break-word;word-break:normal}
.coach.good{border-left-color:var(--green)}
.coach.warn{border-left-color:var(--amber)}
.coach.bad{border-left-color:var(--red)}
.coach.info{border-left-color:var(--blue)}

/* actieplan */
.plan-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.coachfocus{padding:18px 16px}
.cf-tag{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--mut)}
.coachfocus.good .cf-tag{color:var(--green)}
.coachfocus.warn .cf-tag{color:var(--amber)}
.coachfocus.bad .cf-tag{color:var(--red)}
.coachfocus.info .cf-tag{color:var(--blue)}
.cf-insight{font-size:17px;font-weight:700;line-height:1.32;margin:7px 0 6px}
.cf-context{font-size:12.5px;color:var(--mut);line-height:1.55;margin-bottom:15px}
.cf-links{display:flex;justify-content:space-between;margin-top:13px}
.cf-links span{font-size:12.5px;color:var(--teal);cursor:pointer;font-weight:600}
.plan-head .pot{background:rgba(45,212,191,.14);border:1px solid rgba(45,212,191,.4);color:var(--teal);border-radius:999px;padding:4px 11px;font-size:12.5px;font-weight:700;white-space:nowrap}
.action{border:0;border-top:1px solid var(--line);border-radius:0;padding:16px 0;margin-bottom:0;background:transparent}
.action .ah{display:flex;align-items:flex-start;gap:11px;margin-bottom:9px}
.action .ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.action .at{font-weight:700;font-size:14px}
.action .asub{font-size:12.5px;color:var(--mut);margin-top:1px}
.action .save{margin-left:auto;font-size:11px;font-weight:700;color:var(--green);background:rgba(52,211,153,.12);border-radius:999px;padding:3px 9px;white-space:nowrap;flex-shrink:0}
.steps{list-style:none;margin:0;padding:0}
.steps li{position:relative;padding:5px 0 5px 24px;font-size:12.5px;line-height:1.45}
.steps li:before{content:"→";position:absolute;left:4px;top:5px;color:var(--teal);font-weight:700}
.steps li b{color:var(--txt)}
.act-btns{display:flex;gap:8px;margin-top:11px}
.mini{flex:1;border:1px solid var(--line);background:var(--card);color:var(--txt);border-radius:10px;padding:9px;font-size:12.5px;font-weight:600;cursor:pointer}
.mini:active{filter:brightness(1.15)}
.mini.go{background:rgba(52,211,153,.14);border-color:rgba(52,211,153,.45);color:var(--green)}
.action.done{opacity:.72}
.action.done .at{text-decoration:line-through;color:var(--mut)}
.action.done .ico{background:rgba(52,211,153,.16)!important}
.goal-wrap{margin:2px 0 4px}
.goal-row{display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px;margin-bottom:6px}
.goal-row .big{font-size:22px;font-weight:800;color:var(--teal)}
.snz{display:block;width:100%;text-align:center;background:none;border:none;color:var(--mut);font-size:12.5px;padding:8px;cursor:pointer;text-decoration:underline}
#toast{position:fixed;left:50%;bottom:84px;transform:translate(-50%,20px);max-width:90%;background:var(--teal-d);color:#fff;padding:11px 16px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;z-index:80;text-align:center}
#toast.show{opacity:1;transform:translate(-50%,0)}
.note{background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.22);border-radius:10px;padding:8px 10px;margin-top:9px;font-size:12.5px;color:var(--txt);white-space:pre-wrap;word-break:break-word}
.mini.note-btn{flex:0 0 44px}
/* gestapelde balk vast/variabel */
.stack{display:flex;height:26px;border-radius:8px;overflow:hidden;margin:10px 0 12px;background:var(--card2)}
.stack > div{height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#0b1220;white-space:nowrap;min-width:0}
.fv-row{display:flex;align-items:center;gap:9px;margin:7px 0}
.fv-row .dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.fv-row .nm{flex:1;font-size:14px}
.fv-row .amt{font-weight:700;font-size:14px}
.fv-row .pc{font-size:11px;color:var(--mut);width:54px;text-align:right}
/* dagelijkse variabele-uitgaven grafiek */
.daily{position:relative;height:84px;display:flex;align-items:flex-end;gap:2px;margin:14px 0 4px}
.daily .d{flex:1;background:var(--teal-d);border-radius:2px 2px 0 0;min-height:2px}
.daily .d.over{background:var(--red)}
.daily .d.today{outline:2px solid var(--txt);outline-offset:1px}
.daily .tline{position:absolute;left:0;right:0;border-top:1px dashed var(--amber);pointer-events:none}
.wkrow{display:flex;gap:6px;margin-top:10px}
.wkcell{flex:1;text-align:center;background:var(--card2);border-radius:9px;padding:7px 2px}
.wkcell .v{font-weight:700;font-size:12.5px}
.wkcell .l{font-size:11px;color:var(--mut)}
.wkcell .ar{font-size:11px}
/* variantieanalyse P/H/K */
.phq{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:9px;background:var(--card2)}
.phq .ph-t{font-weight:700;font-size:14px;margin-bottom:7px}
.phq .ph-l{font-size:12.5px;line-height:1.5;margin:6px 0;padding-left:22px;position:relative}
.phq .ph-l .k{position:absolute;left:0;top:1px;font-weight:800;font-size:11px;width:16px;height:16px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;background:var(--card);color:#fff}
.bud-line{font-size:12.5px;margin-top:3px;font-weight:600}
/* actieplan-hefbomen + SMART */
.lever{display:flex;align-items:flex-start;gap:9px;padding:9px 10px;border:1px solid var(--line);border-radius:11px;margin-bottom:7px;cursor:pointer;background:var(--card)}
.lever.on{border-color:var(--teal);background:rgba(45,212,191,.08)}
.lever .chk{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--line);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:12.5px;color:#fff}
.lever.on .chk{background:var(--teal-d);border-color:var(--teal)}
.lever .lv{flex:1;min-width:0}
.lever .lv .lt{font-weight:600;font-size:14px}
.lever .lv .ld{font-size:11px;color:var(--mut)}
.lever .ef{font-size:12.5px;font-weight:700;color:var(--green);white-space:nowrap}
.smart{border:1px solid rgba(45,212,191,.3);background:rgba(45,212,191,.06);border-radius:12px;padding:12px;margin-top:10px}
.smart .st{font-weight:700;font-size:14px;margin-bottom:6px}
.smart .sl{font-size:12.5px;line-height:1.5;margin:5px 0;padding-left:26px;position:relative}
.smart .sl .b{position:absolute;left:0;top:1px;font-weight:800;font-size:11px;width:20px;height:18px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;background:var(--teal-d);color:#fff;letter-spacing:.3px}

/* lists */
.tx-day{font-size:12.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin:14px 4px 6px;font-weight:600}
.tx{display:flex;align-items:center;gap:12px;padding:11px 0;background:transparent;border:0;border-bottom:1px solid var(--line);border-radius:0;cursor:pointer}
.tx:active{background:var(--card2)}
.tx .ava{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.tx .info{flex:1;min-width:0}
.tx .nm{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx .cat{font-size:11px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx .amt{font-weight:700;font-size:14px;white-space:nowrap}
.amt.pos{color:var(--green)} .amt.neg{color:var(--txt)}
.cat-row{display:flex;align-items:center;gap:11px;margin-bottom:13px}
.cat-row .ava{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.cat-row .g{flex:1;min-width:0}
.cat-row .t{display:flex;justify-content:space-between;font-size:14px;font-weight:600;margin-bottom:5px}
.cat-row .t .c{color:var(--mut);font-weight:600;font-size:12.5px}

/* controls */
input[type=search],input[type=number]{width:100%;background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:12px;padding:11px 13px;font-size:14px;outline:none}
.chips{display:flex;gap:7px;overflow-x:auto;padding:4px 0 8px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;background:var(--card2);border:1px solid var(--line);color:var(--mut);border-radius:999px;padding:6px 13px;font-size:12.5px;cursor:pointer;white-space:nowrap}
.chip.on{background:var(--teal-d);border-color:var(--teal);color:#fff}
.btn{display:block;width:100%;background:var(--teal-d);color:#fff;border:none;border-radius:13px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;text-align:center}
.btn:active{filter:brightness(1.1)}
.btn.sec{background:var(--card2);border:1px solid var(--line)}
.btn.danger{background:rgba(248,113,113,.14);border:1px solid rgba(248,113,113,.4);color:var(--red)}
.slider{width:100%;accent-color:var(--teal)}
label.fld{display:block;font-size:12.5px;color:var(--mut);margin:14px 0 6px;font-weight:600}
.toggle{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line)}
.toggle:last-child{border-bottom:none}
.sw{position:relative;width:46px;height:27px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.sw .sl{position:absolute;inset:0;background:var(--card2);border:1px solid var(--line);border-radius:999px;transition:.2s}
.sw .sl:before{content:"";position:absolute;width:21px;height:21px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.2s}
.sw input:checked + .sl{background:var(--teal-d);border-color:var(--teal)}
.sw input:checked + .sl:before{transform:translateX(19px)}

/* bottom nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:rgba(13,20,34,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:50}
.nav a{flex:1;text-align:center;color:var(--mut);text-decoration:none;font-size:10px;letter-spacing:.02em;font-weight:500;padding:4px 0;cursor:pointer;opacity:.7;transition:opacity .15s ease,color .15s ease}
.nav a .i{display:inline-flex;align-items:center;justify-content:center;height:30px;padding:0 16px;margin-bottom:3px;border-radius:15px;line-height:1;transition:background .18s ease}
.nav a.on{color:var(--teal);opacity:1;font-weight:600}
.nav a.on .i{background:rgba(45,212,191,.13)}

/* empty / upload */
.empty{text-align:center;padding:50px 24px}
.empty .big{font-size:44px;margin-bottom:12px}
.empty h2{font-size:17px;margin-bottom:8px}
.empty p{color:var(--mut);font-size:14px;margin-bottom:22px}
.fab{position:fixed;right:max(16px,calc(50% - 260px + 16px));bottom:92px;width:56px;height:56px;border-radius:50%;background:var(--teal-d);border:1px solid var(--teal);color:#fff;font-size:22px;box-shadow:var(--shadow);cursor:pointer;z-index:40;display:flex;align-items:center;justify-content:center}

/* sheet */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:60;display:none}
.sheet-bg.show{display:block}
.sheet{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:520px;background:var(--card);border-radius:20px 20px 0 0;border:1px solid var(--line);padding:18px 16px calc(20px + env(safe-area-inset-bottom));max-height:80vh;overflow:auto;animation:up .25s ease}
@keyframes up{from{transform:translate(-50%,100%)}to{transform:translate(-50%,0)}}
.grab{width:40px;height:4px;background:var(--line);border-radius:3px;margin:0 auto 14px}
.catgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
.catpick{display:flex;align-items:center;gap:9px;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:10px;cursor:pointer;font-size:12.5px}
.catpick.on{border-color:var(--teal)}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px;background:var(--card2);color:var(--mut);margin-left:6px}
.legend{display:flex;flex-wrap:wrap;gap:6px 14px;font-size:11px;color:var(--mut);margin-top:10px}
.legend span{display:flex;align-items:center;gap:5px}
.dot{width:9px;height:9px;border-radius:3px;display:inline-block}
.spark{display:flex;align-items:flex-end;gap:6px;height:90px;margin-top:6px}

/* ---------- maand-gebonden potjes (licht) ----------
 * SET.budgets      = het vastgezette plan voor de LOPENDE kalendermaand (alle lezers gebruiken dit).
 * SET.budgetsNext  = wijzigingen die klaarstaan voor de VOLGENDE maand (idem SET.potMetaNext voor de aanname).
 * SET.budgetMonth  = de 'YYYY-MM' waar SET.budgets op geankerd staat.
 * Bij maandwissel promoveert rolloverBudgets() de 'next'-laag naar actief. Niets gewijzigd = carry-forward. */
function thisYM(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function nextYM(ym){ let [y,mo]=String(ym).split('-').map(Number); mo++; if(mo>12){mo=1;y++;} return y+'-'+String(mo).padStart(2,'0'); }
function ymFull(ym){ const mo=+String(ym).split('-')[1]; return MFULL[mo-1]||''; }
function rolloverBudgets(){
  const ym=thisYM();
  if(!SET.budgetMonth){ SET.budgetMonth=ym; save(); return; }
  if(SET.budgetMonth===ym) return;
  const N=SET.budgetsNext||{}, NM=SET.potMetaNext||{};
  if(Object.keys(N).length){ SET.budgets=SET.budgets||{};
    for(const k in N){ const v=+N[k]; if(v>0) SET.budgets[k]=v; else delete SET.budgets[k]; } }
  if(Object.keys(NM).length){ SET.potMeta=SET.potMeta||{};
    for(const k in NM){ if(NM[k]) SET.potMeta[k]=NM[k]; else delete SET.potMeta[k]; } }
  SET.budgetsNext={}; SET.potMetaNext={}; SET.budgetMonth=ym; save();
}

// Overboekingen tussen eigen rekeningen → 'intern' (tellen niet als inkomen/uitgave).
// Salaris/inkomen blijft inkomen, ook al staat het op een eigen rekening.
function applyOwnAccounts(){
  OWN=[...new Set(TX.map(t=>t.acc).filter(Boolean))];
  // namen van eigen N26-potjes (uit Account Name) + vaste aliassen voor onderlinge overboekingen
  const ownNames=new Set([...TX.filter(t=>t.src==='csv').map(t=>(t.accName||'').toLowerCase()),
    'main','main account','zakgeld','buffer comfort','buffer rust','instant savings','income sorter',
    've sumter','vincent sumter','vincent ernst sumter'].filter(Boolean));
  // N26-interne potje-/spaarbewegingen (PSD2 levert geen tegenpartij-IBAN voor Spaces)
  const N26INT=/\b(income sorter|moved|round[\s-]?up)\b|\b(from|to|naar|van)\s+(main|zakgeld|spaces?|spaarpot|buffer)/i;
  for(const t of TX){
    if(OVR[t.id]) continue;                 // handmatige keuze respecteren
    const rc=t.ruleCat||t.autoCat;
    if(rc==='inkomen'){ t.autoCat='inkomen'; continue; }
    let intern = (t.refNums||[]).some(n=>OWN.includes(n));               // MT940/PSD2: eigen IBAN als tegenpartij
    if(!intern && t.src==='csv' && /transfer/i.test(t.typ||'') && ownNames.has((t.partner||'').toLowerCase())) intern=true; // N26 CSV: potje↔potje
    if(!intern && t.src==='psd2'){ const nm=(t.name||'').toLowerCase().trim(); if(ownNames.has(nm) || N26INT.test(t.name||'')) intern=true; } // N26 PSD2: Spaces/eigen naam
    t.autoCat = intern ? 'intern' : rc;
  }
}
// rol + label per rekening afleiden
function buildAccMeta(){
  for(const a of OWN){
    const list=TX.filter(t=>t.acc===a);
    const isCSV=list[0]&&list[0].src==='csv';
    const isPsd2=list[0]&&list[0].src==='psd2';
    const pm=isPsd2 ? ((SET.psd2Accounts||{})[a]||null) : null;
    const inc=list.filter(t=>catOf(t)==='inkomen').reduce((s,t)=>s+Math.max(t.amount,0),0);
    const cards=list.filter(t=>/BEA,|GEA,|ECOM,|APPLE PAY|BETAALPAS|Presentment/i.test(t.desc)).length;
    let role = inc>1000 ? 'Salaris / inkomen' : cards>20 ? 'Betaalrekening' : 'Spaarpotje / overig';
    // label: PSD2 toont bank + rekeningnaam, N26-potjes hun naam, ABN rol + laatste 4 cijfers
    const label = pm ? (pm.bank+' · '+pm.label) : isCSV ? (a.replace(/^N26 /,'')+' · N26') : (role+' ··'+a.slice(-4));
    const prev=ACCMETA[a]||{};
    ACCMETA[a]=Object.assign({},prev,{role,count:list.length,income:inc,label,bank: pm?pm.bank : isCSV?'N26':'ABN AMRO'});
  }
}

/* ---------- MT940 parser (ABN AMRO, beide :86:-formaten) ---------- */
function parseMT940(text){
  const lines=text.replace(/\r/g,'').split('\n');
  const out=[]; let cur=null, acc=null; const bal={};
  const num=s=>parseFloat((s||'').replace(/\./g,'').replace(',','.').replace(/\.$/,''))||0;
  const push=()=>{ if(cur){ cur.desc=cur.raw.join(' ').replace(/\s+/g,' ').trim(); finalize(cur); out.push(cur); cur=null; } };
  for(const ln of lines){
    if(ln.startsWith(':25:')){ acc=ln.slice(4).trim().replace(/[^0-9]/g,''); }
    else if(ln.startsWith(':62F:')){
      push();
      const m=ln.match(/^:62F:([CD])(\d{6})EUR([\d,\.]+)/);
      if(m && acc){ const v=num(m[3])*(m[1]==='C'?1:-1); const d='20'+m[2].slice(0,2)+'-'+m[2].slice(2,4)+'-'+m[2].slice(4,6);
        if(!bal[acc]||d>=bal[acc].date) bal[acc]={balance:v,date:d}; }
    }
    else if(ln.startsWith(':61:')){
      push();
      const m=ln.match(/^:61:(\d{6})(\d{4})?(RC|RD|C|D)([\d,\.]+)N(\w{3})/);
      if(m){
        const yy=m[1].slice(0,2),mm=m[1].slice(2,4),dd=m[1].slice(4,6);
        const sign=(m[3]==='C'||m[3]==='RC')?1:-1;
        cur={date:`20${yy}-${mm}-${dd}`, amount:sign*num(m[4]), code:m[5], acc:acc, raw:[]};
      }
    } else if(ln.startsWith(':86:')){
      if(cur) cur.raw.push(ln.slice(4).trim());
    } else if(ln.startsWith(':60F:')||ln.startsWith(':20:')||ln==='-'){
      push();
    } else if(cur && cur.raw.length){ // doorlopende beschrijvingsregel
      cur.raw.push(ln.trim());
    }
  }
  push();
  return {txns:out, balances:bal};
}

/* counterparty + categorie afleiden */
function finalize(t){
  const U=t.desc.toUpperCase();
  // naam
  let name='';
  let tm=t.desc.match(/\/NAME\/([^\/]+)/i);            // /TRTP/ formaat
  if(tm) name=tm[1].trim();
  if(!name){ tm=t.desc.match(/NAAM:\s*([^]*?)(?:MACHTIGING:|OMSCHRIJVING:|IBAN:|KENMERK:|BIC:|$)/i); if(tm) name=tm[1].trim(); }
  if(!name){ // BEA pin: ":86:BEA, APPLE PAY   MERCHANT"
    tm=t.desc.match(/^(?:BEA|GEA|ECOM)[^A-Z0-9]*[A-Z ]*?(?:PAY|PAS)\s{2,}([^]+?)(?:NR:|KAARTNUMMER|$)/i);
    if(tm) name=tm[1].trim();
  }
  if(!name){ tm=t.desc.match(/\/REMI\/([^\/]+)/i); if(tm) name=tm[1].trim(); }
  if(!name) name=t.desc.slice(0,42)||'Transactie';
  name=name.replace(/\s+/g,' ').replace(/\s+\d{6,}.*$/,'').trim().slice(0,44);
  t.name=name||'Transactie';
  t.src='mt940';
  // rekeningnummers uit IBAN's in de omschrijving, voor eigen-rekening detectie
  t.refNums=[...t.desc.replace(/\s/g,'').matchAll(/[A-Z]{2}\d{2}[A-Z]{4}(\d{9,10})/g)].map(x=>x[1].replace(/^0+/,''));
  categorize(t);
}
// id + keyword-categorie (gedeeld door MT940 en CSV)
function categorize(t){
  const U=t.desc.toUpperCase();
  const Z=U.replace(/\s/g,'');   // spatieloos: vangt MT940-regelafbrekingen op (SAXO B ANK → SAXOBANK)
  t.id=hash((t.acc||'')+t.date+t.amount.toFixed(2)+t.desc)+'_'+Math.round(Math.abs(t.amount)*100);
  const match=w=>{ const wu=(w||'').toUpperCase(); if(!wu) return false; const wz=wu.replace(/\s/g,''); return U.includes(wu) || (wz.length>=4 && Z.includes(wz)); };
  let cat='overig';
  // 1) eigen regels winnen van de ingebouwde categorisatie
  for(const r of (typeof SET!=='undefined'&&SET.rules)||[]){ if(CATS[r.cat] && match(r.kw)){ cat=r.cat; break; } }
  // 2) ingebouwde keyword-regels
  if(cat==='overig'){ for(const [k,kws] of RULES){ if(kws.some(match)){ cat=k; break; } } }
  if(cat==='overig' && t.amount>0) cat='intern'; // onbekende bijschrijving = meestal eigen overboeking
  t.ruleCat=cat;
  t.autoCat=cat;   // wordt evt. overschreven door applyOwnAccounts()
}

/* ---------- CSV parser (N26-export: Booking Date,Partner Name,Type,Account Name,Amount (EUR)…) ---------- */
function splitCSVLine(line){
  const out=[]; let cur='', q=false;
  for(let i=0;i<line.length;i++){ const c=line[i];
    if(q){ if(c==='"'){ if(line[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else { if(c==='"') q=true; else if(c===',') {out.push(cur);cur='';} else cur+=c; }
  }
  out.push(cur); return out;
}
function parseCSV(text){
  const lines=text.replace(/\r/g,'').split('\n').filter(l=>l.trim());
  if(!lines.length) return {txns:[],balances:{}};
  const head=splitCSVLine(lines[0]).map(h=>h.trim().toLowerCase());
  const col=n=>head.findIndex(h=>h===n);
  const ci={date:col('booking date'),partner:col('partner name'),iban:col('partner iban'),type:col('type'),ref:col('payment reference'),acc:col('account name'),amt:col('amount (eur)')};
  const out=[];
  for(let i=1;i<lines.length;i++){
    const f=splitCSVLine(lines[i]); if(f.length<3) continue;
    const amt=parseFloat((f[ci.amt]||'').replace(',','.')); if(isNaN(amt)) continue;
    const accName=(ci.acc>=0?f[ci.acc]:'').trim()||'N26';
    const partner=(ci.partner>=0?f[ci.partner]:'').trim();
    const typ=(ci.type>=0?f[ci.type]:'').trim();
    const ref=(ci.ref>=0?f[ci.ref]:'').trim();
    const t={date:(f[ci.date]||'').slice(0,10), amount:amt, acc:'N26 '+accName, accName, partner, typ, ref,
             desc:[partner,typ,ref,accName].filter(Boolean).join(' '), src:'csv', refNums:[]};
    t.name=partner||typ||'Transactie';
    categorize(t);
    out.push(t);
  }
  return {txns:out, balances:{}};
}
function hash(s){let h=0;for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))|0;}return Math.abs(h).toString(36);}
function catOf(t){ return OVR[t.id]||t.autoCat; }

/* ---------- maand-helpers ---------- */
function months(){ return [...new Set(TX.map(t=>t.date.slice(0,7)))].sort(); }
function txOfMonth(m){ return TX.filter(t=>t.date.slice(0,7)===m); }
function monthLabel(m){ const [y,mo]=m.split('-'); return MFULL[+mo-1]+' '+y; }

/* ---------- periode-helpers (Inzichten: maand / 3 mnd / YTD / alles) ---------- */
function periodMonths(){
  const ms=months(); if(!ms.length) return [];
  const cm=(curMonth&&ms.includes(curMonth))?curMonth:ms[ms.length-1];
  const yr=SET.insYear||cm.slice(0,4);
  const inYr=ms.filter(m=>m.slice(0,4)===yr);
  let sel=(SET.insMonths||[]).filter(m=>inYr.includes(m));
  if(!sel.length) sel=[ (inYr.includes(cm)?cm:inYr[inYr.length-1]) || ms[ms.length-1] ];
  return sel.slice().sort();
}
function periodTx(){ const set=new Set(periodMonths()); return TX.filter(t=>set.has(t.date.slice(0,7))); }
function periodIncome(){ return periodMonths().reduce((s,m)=>s+totals(m).income,0); }
function periodSpend(){ return periodMonths().reduce((s,m)=>s+totals(m).spend,0); }
function periodLabel(){ const pm=periodMonths(); if(!pm.length) return '';
  if(pm.length===1) return monthLabel(pm[0]);
  const ms=months(); const yr=pm[0].slice(0,4); const inYr=ms.filter(m=>m.slice(0,4)===yr);
  if(pm.length===inYr.length) return yr;
  return `${pm.length} maanden · ${yr}`;
}

function toggleInsMonth(m){ SET.insMonths=(SET.insMonths||[]).slice(); const i=SET.insMonths.indexOf(m); if(i>=0) SET.insMonths.splice(i,1); else SET.insMonths.push(m); save(); renderIns(); }
// geaggregeerde totalen over de actieve periode (gedeeld door dashboard + inzichten)
function ptot(){
  const pm=periodMonths(), list=periodTx();
  let income=0, est=false; for(const m of pm){ const tm=totals(m); income+=tm.income; if(tm.incomeBasis==='basisnorm'||tm.incomeBasis==='onbekend') est=true; }
  let spend=0; const byCat={};
  for(const t of list){ const c=catOf(t), meta=CATS[c]; byCat[c]=(byCat[c]||0)+t.amount; if(meta.type==='expense'&&t.amount<0) spend+=-t.amount; }
  return {list, income, spend, budget:monthBudget(inc), byCat, months:pm.length, incomeEst:est};
}
// cirkeldiagram + legenda over een byCat-map
function renderDonut(byCat){

// rollende dag-reeks: variabele uitgaven per dag over de laatste N dagen (los van maandgrenzen)
function dailyRollingSeries(days){
  const all=TX.map(t=>t.date).filter(Boolean).sort(); if(!all.length) return {arr:[],start:'',end:''};
  const end=all[all.length-1]; const endD=new Date(end); const startD=new Date(endD); startD.setDate(startD.getDate()-(days-1));
  const arr=new Array(days).fill(0);
  for(const t of TX){ if(t.amount<0 && CATS[catOf(t)].type==='expense' && !isFixed(t)){ const d=new Date(t.date); const idx=Math.round((d-startD)/86400000); if(idx>=0&&idx<days) arr[idx]+=-t.amount; } }
  return {arr, start:startD.toISOString().slice(0,10), end};
}
function renderDailyRolling(){
  const days=SET.rollDays||30;
  const {arr,start,end}=dailyRollingSeries(days); if(!arr.length) return '';
  const sum=arr.reduce((a,b)=>a+b,0), avg=sum/days;
  const userDay=+SET.dailyVarBudget||0; const target=userDay>0?userDay:avg; // bij geen doel: eigen gemiddelde als referentie
  const scaleMax=Math.max(Math.max(...arr), target*1.3, 1);
  const maxV=Math.max(...arr), maxIdx=arr.indexOf(maxV);
  const fmtD=s=>{const d=new Date(s);return d.getDate()+' '+MNAMES[d.getMonth()];};
  return `<div class="card">

/* ----- BUDGET vs WERKELIJK + variantieanalyse ----- */
function totalBudget(){ const B=SET.budgets||{}; return Object.keys(B).reduce((s,k)=>s+(+B[k]||0),0); }
// geplande potjes = huidige budgets met de 'volgende maand'-laag erbovenop (= wat je aan het plannen bent)
function plannedBudgets(){ const B=Object.assign({}, SET.budgets||{}); const N=SET.budgetsNext||{}; for(const k in N){ const v=+N[k]; if(v>0) B[k]=v; else delete B[k]; } return B; }
function plannedTotalBudget(){ const B=plannedBudgets(); return Object.keys(B).reduce((s,k)=>s+(+B[k]||0),0); }
// 70%-budget (o.b.v. inkomen) + geschatte vaste lasten (mediaan over je maanden) → basis voor 'nog vrij voor potjes'
function potRoomBase(){
  const inc = SET.autoIncome ? baseIncome() : (+SET.income||0);
  const budget = monthBudget(inc);
  const ms=months(); const med=a=>{const s=a.filter(x=>x>0).sort((x,y)=>x-y);return s.length?s[Math.floor(s.length/2)]:0;};
  let fixed=0;
  for(const k of Object.keys(CATS)){ if(CATS[k].type!=='expense'||k==='overig') continue;
    fixed+=med(ms.map(m=>{let f=0;for(const t of txOfMonth(m)){ if(catOf(t)===k && t.amount<0 && isFixed(t)) f+=-t.amount; } return f;})); }
  return {budget:Math.round(budget), fixed:Math.round(fixed)};
}
// één regel: som van je potjes + hoeveel er nog vrij is binnen je grens (na vaste lasten)
function potRoomLineHTML(potTotal){ const b=potRoomBase();
  if(b.budget<=0) return `Samen al je potjes: <b>${euro0(potTotal)}</b> per maand`;
  const free=Math.round(b.budget-potTotal);
  if(free<0) return `<span style="color:var(--amber)">${ICON('warn')} Je potjes (${euro0(potTotal)}) zijn <b>${euro0(-free)}</b> meer dan je bestedingslimiet (${euro0(b.budget)}). Verlaag een potje of pas je limiet aan.</span>`;
  return `Samen al je potjes: <b>${euro0(potTotal)}</b>/mnd · nog <b style="color:var(--teal)">${euro0(free)}</b> vrij binnen je budget`;
}
// is een categorie grotendeels een vaste last? (budget schaalt dan niet mee met inkomen)
function isFixedCat(k){ return FIXED_CATS.has(k)||k==='vervoer'||k==='zorg'; }
// dynamisch maandbudget: vaste categorieën constant, variabele categorieën geschaald naar de
// bestedingsruimte (70%) van het inkomen van DEZE maand → meer inkomen = meer variabel budget.
function effectiveBudgets(m){
  const B=SET.budgets||{}, room=totals(m).budget;
  let fixedB=0, varB=0;
  for(const k in B){ if(+B[k]<=0) continue; if(isFixedCat(k)) fixedB+=+B[k]; else varB+=+B[k]; }
  const varRoom=Math.max(room-fixedB,0), scaleV = varB>0 ? varRoom/varB : 0;
  const out={};
  for(const k in B){ if(+B[k]<=0) continue; out[k]= isFixedCat(k) ? +B[k] : Math.max(Math.round((+B[k])*scaleV/5)*5,0); }
  return {out, room, fixedB:Math.round(fixedB), varRoom:Math.round(varRoom), scaleV};
}
function setCatBudget(k,val){ // bestaand potje wijzigen = vanaf volgende maand; nieuw potje = meteen actief
  const exists = +(SET.budgets||{})[k] > 0;
  const v = (val===''||+val<=0) ? 0 : +val;
  if(exists){ SET.budgetsNext=SET.budgetsNext||{}; if(v===(+(SET.budgets||{})[k]||0)) delete SET.budgetsNext[k]; else SET.budgetsNext[k]=v; }
  else { SET.budgets=SET.budgets||{}; if(v>0) SET.budgets[k]=v; else delete SET.budgets[k]; }
  save(); const g=document.getElementById('potGridTotal'); if(g) g.innerHTML=potRoomLineHTML(plannedTotalBudget()); renderIns(); } // settings niet herrenderen (focus)
// budgetvoorstel met VASTE LASTEN als vertrekpunt:
// - vaste lasten op historisch niveau (committed, niet schalen)
// - resterende bestedingsruimte verdeeld over variabele lasten (die je zelf beïnvloedt)
function suggestBudgets(){
  const ms=months(), med=a=>{const s=a.filter(x=>x>0).sort((x,y)=>x-y);return s.length?s[Math.floor(s.length/2)]:0;};
  const inc = SET.autoIncome ? baseIncome() : (+SET.income||0);
  const room = monthBudget(inc);
  const histF={}, histV={};
  for(const k of Object.keys(CATS)){ if(CATS[k].type!=='expense'||k==='overig') continue;
    const fArr=[], vArr=[];
    for(const m of ms){ let f=0,v=0; for(const t of txOfMonth(m)){ if(catOf(t)===k && t.amount<0){ if(isFixed(t)) f+=-t.amount; else v+=-t.amount; } } fArr.push(f); vArr.push(v); }
    histF[k]=med(fArr); histV[k]=med(vArr);
  }
  const totalFixed=Object.values(histF).reduce((a,b)=>a+b,0);
  const totalVar=Object.values(histV).reduce((a,b)=>a+b,0);
  const remaining=Math.max(room-totalFixed,0);
  const scaleV = totalVar>0 ? Math.min(remaining/totalVar,1) : 0;   // variabel ≤ historisch, past binnen ruimte
  SET.budgets={};
  for(const k of Object.keys(CATS)){ if(CATS[k].type!=='expense'||k==='overig') continue;
    const b=(histF[k]||0)+(histV[k]||0)*scaleV; if(b>=1) SET.budgets[k]=Math.max(Math.round(b/5)*5,5);
  }
  save(); render();
  if(totalFixed>room){
    alert(`Let op: je vaste lasten (€${Math.round(totalFixed)}) zijn al hoger dan je bestedingsruimte (€${Math.round(room)}). Variabele budgetten staan op het minimum. Je vaste lasten verlagen of je inkomen verhogen is nodig om binnen je ${SET.limit}%-norm te blijven.`);
  } else {
    alert(`Voorstel klaar. Vaste lasten ≈ €${Math.round(totalFixed)} (vast), resterende ruimte voor variabele uitgaven ≈ €${Math.round(remaining)}. Pas de variabele categorieën gerust handmatig aan.`);
  }
}
// richtlijn-band o.b.v. % over budget: ≤3% geen actie (marge) · 4–5% monitoren · >5% actie
function budgetBand(bud,act){
  if(!bud) return 'none';
  if(act<=bud) return 'under';
  const o=(act-bud)/bud*100;
  return o<=3?'margin':o<=5?'monitor':'action';
}
function bandColor(b){ return b==='action'?'var(--red)':(b==='monitor'||b==='margin')?'var(--amber)':b==='none'?'var(--mut)':'var(--green)'; }
function renderBudgetActual(m){
  const B=SET.budgets||{}; const setKeys=Object.keys(B).filter(k=>+B[k]>0 && CATS[k] && CATS[k].type==='expense');
  if(!setKeys.length){
    return `<div class="card"><div class="row" style="margin-bottom:6px"><span class="hlabel" style="margin:0;flex:1">Budget</span></div>
      <div class="small muted" style="margin-bottom:10px">Stel een maandbudget per categorie in om je uitgaven eraan te meten.</div>
      <button class="btn sec" onclick="go('set')">Budget instellen</button></div>`;
  }
  const actual=catSpendMap(m); const EB=effectiveBudgets(m); const B2=EB.out;
  const cats=[...new Set([...setKeys, ...Object.keys(actual).filter(k=>CATS[k]&&CATS[k].type==='expense')])];
  const over=cats.map(k=>({k,bud:+B2[k]||0,act:actual[k]||0})).filter(r=>r.bud>0 && r.act>r.bud)
    .map(r=>(r.band=budgetBand(r.bud,r.act),r)).filter(r=>r.band==='action'||r.band==='monitor')
    .sort((a,b)=>(b.act-b.bud)-(a.act-a.bud));
  if(!over.length){
    return `<div class="card coachfocus good"><div class="cf-tag">Budget</div><div class="cf-insight">Alles binnen budget</div><div class="cf-context">Geen categorie noemenswaardig over je grens deze maand. Mooi.</div></div>`;
  }
  const line=r=>`<div class="row" style="padding:8px 0;border-top:1px solid var(--line);cursor:pointer" onclick="openVariance('${r.k}')"><span class="small">${CATS[r.k].icon} ${CATS[r.k].name}</span><span class="small" style="color:var(--red);font-weight:700;white-space:nowrap">${euro0(r.act-r.bud)} over ›</span></div>`;
  const top=over[0], c=CATS[top.k], overEur=top.act-top.bud;
  const sec=over.slice(1,3), rest=over.slice(3), exp=!!SET.expandBudgetOk;
  return `<div class="card coachfocus bad">
    <div class="cf-tag">Grootste afwijking · ${c.name}</div>

    <div class="cf-context">${euro(top.act)} uitgegeven aan ${c.name} deze maand. Kijk waar het heen ging.</div>
    <div class="bar-track" style="margin:6px 0 14px"><div class="bar-fill" style="width:${Math.min(top.act/top.bud*100,100)}%;background:var(--red)"></div></div>
    <button class="btn" onclick="openVariance('${top.k}')">Bekijk transacties ›</button>
    <div class="cf-links"><span></span><span onclick="go('set')">Budget aanpassen ›</span></div>
    ${sec.length?`<div style="margin-top:14px">${sec.map(line).join('')}</div>`:''}
    ${rest.length?`${exp?rest.map(line).join(''):''}<button class="snz" onclick="toggleExpand('expandBudgetOk')">${exp?'minder ▲':'+'+rest.length+' andere over budget ▼'}</button>`:''}
  </div>`;
}
// drill-down: variantieanalyse (P/H/K) + transacties voor één categorie
function openVariance(k){
  const m=curMonth, c=CATS[k];
  const bud=+effectiveBudgets(m).out[k]||0;
  const items=txOfMonth(m).filter(x=>catOf(x)===k && x.amount<0).sort((a,b)=>b.date.localeCompare(a.date));
  const act=items.reduce((s,t)=>s-t.amount,0);
  const band=budgetBand(bud,act); const over=band==='action'||band==='monitor';
  const overEur=act-bud;
  const status = over?(band==='action'?'Over budget':'Let op'):(bud?'Binnen budget':'');
  const stCol = over?(band==='action'?'var(--red)':'var(--amber)'):'var(--green)';
  const insight = !bud ? `${euro(act)} uitgegeven. Je hebt voor deze categorie nog geen budget ingesteld.`
    : over ? `Je gaf ${euro0(overEur)} meer uit dan je ${euro0(bud)}-budget deze maand.`
    : band==='margin' ? `${euro0(act-bud)} over, binnen je 3%-marge. Geen actie nodig.`
    : `${euro0(bud-act)} onder je ${euro0(bud)}-budget. Goed bezig.`;
  $('#sheet').innerHTML=`<div class="grab"></div>
    <div class="center" style="margin-bottom:4px"><div style="font-size:22px">${c.icon}</div>

      <div style="font-size:22px;font-weight:800;margin:7px 0 2px">${euro(act)}${bud?` <span class="muted" style="font-size:12.5px">/ ${euro0(bud)}</span>`:''}</div>
      <div class="small muted">${monthLabel(m)} · ${items.length} transacties</div></div>
    <div class="cf-context" style="text-align:center;margin:12px 6px 14px">${insight}</div>
    ${bud&&over?`<button class="btn sec" style="margin-bottom:16px" onclick="closeSheet();go('set')">Budget bijstellen ›</button>`:''}
    <div class="hlabel" style="margin:4px 2px 8px">Transacties</div>
    ${items.map(t=>`<div class="tx" style="cursor:default"><div class="ava" style="background:var(--card2)">${c.icon}</div>
      <div class="info"><div class="nm">${esc(t.name)}</div><div class="cat">${new Date(t.date).toLocaleDateString('nl-NL',{day:'numeric',month:'short'})}${OWN.length>1?' · '+esc(accShort(t.acc)):''}</div></div>
      <div class="amt neg">${euro(t.amount)}</div></div>`).join('')}`;
  $('#sheetBg').classList.add('show');
}
// voorzichtige, data-gedreven hypothese voor één over-budget categorie (geen aannames als feit)
function catHypo(m,k){
  const d=catDriver(m,k);
  const cat=CATS[k]?CATS[k].name.toLowerCase():'deze categorie';
  const big=d.biggest?(esc(cleanMerch(d.biggest.name)||d.biggest.name)):'';
  // 1) één grotere aankoop weegt zwaar mee
  if(d.sum>0 && d.biggest && (-d.biggest.amount)/d.sum>=0.45)
    return `Dit komt vooral door één aankoop bij ${big} van ${euro0(-d.biggest.amount)}.`;
  // 2) één winkel/leverancier is het grootste deel

    return `Je kocht wat vaker iets voor ${cat} dan normaal. ${d.n} keer, meestal is dat rond ${Math.round(d.priorN)}.`;
  // 4) bedragen per keer iets hoger
  if(d.priorAvg>0 && d.avg>=d.priorAvg*1.2)
    return `De bedragen voor ${cat} lagen wat hoger dan je gewend bent, zo'n ${euro0(d.avg)} per keer.`;
  // 5) specifiek opgebouwd, met grootste post benoemd
  if(d.biggest && d.n>1)

// Vervoer & auto bestaat uit deeluitgaven (lease/benzine/parkeren/OV), splits ze zodat een tip de juiste post raakt
function vervoerSplit(m){
  let lease=0,fuel=0,park=0,ov=0,rest=0;
  for(const t of txOfMonth(m)){ if(catOf(t)!=='vervoer'||t.amount>=0) continue;
    const U=((t.desc||'')+' '+(t.name||'')).toUpperCase(), a=-t.amount;
    if(/HILTERMANN|LEASECONTRACT|LEASE|PRIVATE LEASE/.test(U)) lease+=a;
    else if(/SHELL|ESSO|\bBP\b|TINQ|TOTAL|TANKSTATION|\bTANK\b|GULF|TEXACO|AVIA|FIREZONE|TAMOIL/.test(U)) fuel+=a;
    else if(/PARKBEE|PARKEER|PARKING|Q-?PARK|TRAVELCARD|YELLOWBRICK|EASYPARK/.test(U)) park+=a;
    else if(/\bNS\b|OV-?CHIP|GVB|\bRET\b|FLIXBUS|UBER|BOLT|TREIN/.test(U)) ov+=a;
    else rest+=a;
  }
  return {lease,fuel,park,ov,rest};
}

function catDriver(m,k){
  const items=txOfMonth(m).filter(x=>catOf(x)===k && x.amount<0);
  const n=items.length, sum=items.reduce((s,t)=>s-t.amount,0);
  const pm=months().filter(mm=>mm<m).slice(-3);
  const priorN=pm.length?pm.reduce((s,mm)=>s+txOfMonth(mm).filter(x=>catOf(x)===k&&x.amount<0).length,0)/pm.length:n;
  const priorSum=pm.length?pm.reduce((s,mm)=>s+(catSpendMap(mm)[k]||0),0)/pm.length:sum;
  const merch=groupMerch(items)[0];
  const biggest=items.slice().sort((a,b)=>a.amount-b.amount)[0];
  return {n,sum,priorN,priorSum,avg:sum/(n||1),priorAvg:priorSum/(priorN||1),merch,biggest};
}

function baselineSpend(){
  const now=new Date(); const nowYM=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const recent=months().filter(m=>m<nowYM).slice(-6);
  const sp=recent.map(m=>{let x=0;for(const t of txOfMonth(m)){const c=catOf(t);if(CATS[c]&&CATS[c].type==='expense'&&t.amount<0)x+=-t.amount;}return x;}).filter(v=>v>0).sort((a,b)=>a-b);
  if(!sp.length) return 0;
  const lower=sp.slice(0,Math.ceil(sp.length/2));
  return Math.round(lower[Math.floor(lower.length/2)]);
}
function monthBudget(inc){
  inc=+inc||0; const pctBud=inc*SET.limit/100; const mode=SET.limitMode||'pct';
  if(mode==='cap'){ const cap=+SET.spendCap||0; return cap>0?cap:pctBud; }
  if(mode==='baseline'){ const bl=baselineSpend(); return bl>0?Math.min(bl, pctBud||bl):pctBud; }
  if(mode==='damper'){ const base=baseIncome()||inc; const a=Math.min(Math.max(+SET.damperPct||30,0),100)/100; return Math.round(base*SET.limit/100 + Math.max(inc-base,0)*a); }
  return pctBud;
}
function totals(m){
  const list=txOfMonth(m);
  let income=0, spend=0, internal=0;
  const byCat={};
  for(const t of list){
    const c=catOf(t), meta=CATS[c];
    byCat[c]=(byCat[c]||0)+t.amount;
    if(meta.type==='income') income+=Math.max(t.amount,0);
    else if(meta.type==='expense' && t.amount<0) spend+=-t.amount;
    else if(meta.type==='internal') internal+=t.amount;
  }
  let inc, basis;
  if(SET.autoIncome){
    if(income>0){ inc=income; basis='gedetecteerd'; }
    else { inc=baseIncome(); basis = inc>0?'basisnorm':'onbekend'; }
  } else { inc=SET.income||0; basis='handmatig'; }
  const budget = monthBudget(inc);
  return {list,income:inc,detectedIncome:income,spend,internal,byCat,budget,incomeBasis:basis};
}
// mediaan maandinkomen (robuuster dan gemiddelde tegen incidentele pieken zoals vakantiegeld)
function avgIncome(){
  const vals=months().map(m=>{let s=0;for(const t of txOfMonth(m)){if(CATS[catOf(t)].type==='income')s+=Math.max(t.amount,0);}return s;}).filter(v=>v>0).sort((a,b)=>a-b);
  return vals.length?vals[Math.floor(vals.length/2)]:0;
}
// basis-inkomen = conservatieve norm over je RECENTE maanden (laatste 6): mediaan van de ONDERSTE helft.
// Recent venster → een salarisverhoging telt meteen mee en oudere/lagere maanden wegen niet meer mee.
// Onderste helft → incidentele pieken (vakantiegeld, dividend, onkosten) blazen je norm niet op.
function baseIncome(){
  if(!SET.autoIncome) return +SET.income||0;
  const recent=months().slice(-6);
  const vals=recent.map(m=>{let s=0;for(const t of txOfMonth(m)){if(CATS[catOf(t)].type==='income')s+=Math.max(t.amount,0);}return s;}).filter(v=>v>0).sort((a,b)=>a-b);
  if(!vals.length) return 0;
  const lower=vals.slice(0,Math.ceil(vals.length/2));
  return Math.round(lower[Math.floor(lower.length/2)]);
}
// vaste/variabele splitsing over een maand
function splitFixedVar(m){ let fixed=0,vari=0;
  for(const x of txOfMonth(m)){ if(x.amount<0 && CATS[catOf(x)].type==='expense'){ if(isFixed(x)) fixed+=-x.amount; else vari+=-x.amount; } }
  return {fixed,vari};
}
// ===== PROGNOSE (lichtgewicht AI: gemiddelden + trend) =====
function monthAgg(m){ let income=0; for(const t of txOfMonth(m)) if(CATS[catOf(t)].type==='income') income+=Math.max(t.amount,0);
  const s=splitFixedVar(m); return {m,income,fixed:s.fixed,vari:s.vari,spend:s.fixed+s.vari,net:income-s.fixed-s.vari}; }
function regSlope(arr){ const n=arr.length; if(n<2) return 0; const xm=(n-1)/2; const ym=arr.reduce((a,b)=>a+b,0)/n; let num=0,den=0;
  for(let i=0;i<n;i++){ num+=(i-xm)*(arr[i]-ym); den+=(i-xm)**2; } return den?num/den:0; }
function nextMonths(m,k){ const out=[]; let [y,mo]=m.split('-').map(Number); for(let i=0;i<k;i++){ mo++; if(mo>12){mo=1;y++;} out.push({y,mo,label:MNAMES[mo-1],full:MFULL[mo-1]+' '+y}); } return out; }
function forecastModel(){
  const ms=months(); if(ms.length<2) return null;
  const agg=ms.map(monthAgg);
  const last=agg.slice(-3); const avg=k=>last.reduce((s,a)=>s+a[k],0)/last.length;
  const vSlope=regSlope(agg.map(a=>a.vari)), sSlope=regSlope(agg.map(a=>a.spend));
  const fInc=baseIncome()||avg('income'), fFixed=avg('fixed'), fVar=Math.max(avg('vari')+vSlope,0);

}

// groeperingssleutel voor terugkerende posten (zelfde logica als recurringSchedule)
function recurKey(t){ return (t.name||'').toUpperCase().replace(/[0-9]/g,'').replace(/\s+/g,' ').trim().slice(0,20); }
// terugkerend schema: dag van de maand + mediaan bedrag per vaste last / inkomstenbron
function intervalLabel(im){ return im===1?'maandelijks':im===3?'per kwartaal':im===6?'half jaar':im===12?'jaarlijks':'~'+im+ ' mnd'; }
function shiftWeekendToMonday(d){ const x=new Date(d); const w=x.getDay(); if(w===6) x.setDate(x.getDate()+2); else if(w===0) x.setDate(x.getDate()+1); return x; }
function recurringSchedule(){
  const map={};
  for(const t of TX){ if(t.pending) continue; const c=catOf(t), meta=CATS[c]; let type=null;
    if(meta.type==='income' && t.amount>0) type='income';
    else if(meta.type==='expense' && t.amount<0 && (isFixed(t) || isIncasso(t))) type='fixed'; else continue;   // vaste last = vaste-categorie OF automatische incasso
    const key=recurKey(t); if(!key) continue;
    const m=(map[key]=map[key]||{name:t.name,cat:c,type,occ:[],inc:0,tot:0});
    m.occ.push({date:t.date, amt:Math.abs(t.amount), ym:t.date.slice(0,7), acc:t.acc});
    m.tot++; if(isIncasso(t)) m.inc++; }
  const now=new Date(); now.setHours(0,0,0,0); const today=now.getTime();
  const ym0=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const out=[];
  for(const k in map){ const r=map[k];
    const byYm={}; for(const o of r.occ){ if(!byYm[o.ym]||o.amt>byYm[o.ym].amt) byYm[o.ym]=o; }
    const occ=Object.values(byYm).sort((a,b)=>a.date.localeCompare(b.date));
    if(occ.length<2) continue;
    const gaps=[]; for(let i=1;i<occ.length;i++) gaps.push((new Date(occ[i].date)-new Date(occ[i-1].date))/86400000);
    gaps.sort((a,b)=>a-b); const medGap=gaps[Math.floor(gaps.length/2)]||30;
    const intervalM = medGap<=45?1 : medGap<=135?3 : medGap<=225?6 : 12;
    const last=occ[occ.length-1]; const lastD=new Date(last.date); lastD.setHours(0,0,0,0);
    if((today-lastD.getTime())/86400000 > intervalM*30*1.6 + 7) continue;
    const dom=lastD.getDate(); const chargedThisMonth=occ.some(o=>o.ym===ym0);
    let nx;
    if(intervalM===1 && !chargedThisMonth){
      const dim=new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
      const cand=new Date(now.getFullYear(), now.getMonth(), Math.min(dom,dim)); cand.setHours(0,0,0,0);
      nx = cand.getTime()<today ? new Date(now) : cand;        // dag al voorbij maar nog niet afgeschreven -> imminent (deze maand), niet doorrollen
    } else {
      nx=new Date(lastD); let g=0; do{ nx.setMonth(nx.getMonth()+intervalM); g++; }while(nx.getTime()<=today && g<60);
    }
    nx=shiftWeekendToMonday(nx);                                // incasso in het weekend -> maandag erna
    out.push({key:k,name:r.name,cat:r.cat,type:r.type,amount:last.amt,day:lastD.getDate(),intervalM,nextDate:new Date(nx),lastDate:last.date,count:r.occ.length,monthlyEq:Math.round(last.amt/intervalM),acc:last.acc,incasso:(r.tot>0 && r.inc/r.tot>=0.5)});
  }
  return out.sort((a,b)=>a.nextDate-b.nextDate);
}
// per-rekening saldo-check: dekt het huidige saldo de aankomende incasso's tot het volgende inkomen op DIE rekening?
// alleen rekeningen met een bekend saldo; venster = tot je volgende verwachte inkomen op die rekening (anders 35 dagen).
function accountShortfalls(){
  if(OWN.length<1) return [];
  const sched=recurringSchedule();
  const t0=new Date(); t0.setHours(0,0,0,0); const today=t0.getTime();
  const MAXH=35*86400000;
  const out=[];
  for(const acc of OWN){
    const bal=accBalance(acc); if(bal==null) continue;
    let incT=null;
    for(const r of sched){ if(r.type==='income' && r.acc===acc){ const d=new Date(r.nextDate).setHours(0,0,0,0); if(d>today && (incT==null||d<incT)) incT=d; } }
    const horizon = incT!=null ? incT : today+MAXH;
    const debits=sched.filter(r=>r.type==='fixed' && r.acc===acc && r.amount>0)
      .map(r=>({name:r.name,amt:r.amount,t:new Date(r.nextDate).setHours(0,0,0,0),cat:r.cat}))
      .filter(e=>e.t>=today && e.t<horizon).sort((a,b)=>a.t-b.t);
    if(!debits.length) continue;
    let run=bal;
    for(const e of debits){ run-=e.amt; if(run<0){ out.push({acc,name:e.name,amt:e.amt,t:e.t,balance:Math.round(bal),shortfall:Math.round(-run),cat:e.cat}); break; } }
  }
  return out.sort((a,b)=>a.t-b.t);
}
// dag-voor-dag liquiditeitscurve: vaste lasten/inkomen op hun datum + variabele burn
function liquidityDaily(days){
  const sched=recurringSchedule(), f=forecastModel();
  const start=new Date(); start.setHours(0,0,0,0);
  const end=new Date(start); end.setDate(start.getDate()+days);
  const {sum}=totalBalance();
  const events=[];
  for(const s of sched){ if(s.type==='fixed' && !s.incasso) continue;   // alleen automatische incasso's als komende last (geen kaart/Google Pay)
    let d=new Date(s.nextDate); d.setHours(0,0,0,0); let g=0;
    while(d.getTime()<end.getTime() && g<60){
      if(d.getTime()>=start.getTime()){ const ed=shiftWeekendToMonday(d); events.push({date:new Date(ed),name:s.name,amt:s.type==='income'?s.amount:-s.amount,type:s.type,cat:s.cat}); }
      d.setMonth(d.getMonth()+s.intervalM); g++; } }
  events.sort((a,b)=>a.date-b.date);
  const dailyVar=f?f.fVar/30:0; let b=sum; const dates=[],bal=[];
  for(let i=0;i<days;i++){ const d=new Date(start); d.setDate(start.getDate()+i);
    for(const e of events){ if(e.date.getFullYear()===d.getFullYear()&&e.date.getMonth()===d.getMonth()&&e.date.getDate()===d.getDate()) b+=e.amt; }
    b-=dailyVar; dates.push(new Date(d)); bal.push(b); }
  let ti=0; for(let i=1;i<bal.length;i++) if(bal[i]<bal[ti]) ti=i;
  return {dates,bal,events,trough:{date:dates[ti],bal:bal[ti],i:ti}, net:f?f.fNet:0};
}
// dagen verstreken in maand m (volledige maand voor verleden, t/m vandaag voor lopende maand)
function daysElapsed(m){ const [y,mo]=m.split('-').map(Number); const dim=new Date(y,mo,0).getDate();
  const now=new Date(); const todayYM=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  return {dim, elapsed: m===todayYM?Math.min(now.getDate(),dim):dim, today: m===todayYM?now.getDate():0}; }
// variabele uitgaven per dag van de maand
function dailyVarSeries(m){ const [y,mo]=m.split('-').map(Number); const dim=new Date(y,mo,0).getDate();
  const arr=new Array(dim).fill(0);
  for(const t of txOfMonth(m)){ if(t.amount<0 && CATS[catOf(t)].type==='expense' && !isFixed(t)){ const d=+t.date.slice(8,10); if(d>=1&&d<=dim) arr[d-1]+=-t.amount; } }
  return arr; }
function renderDailyVar(m, budget){
  const sv=splitFixedVar(m), de=daysElapsed(m), series=dailyVarSeries(m);
  const monthVar=series.reduce((a,b)=>a+b,0), avgDay=monthVar/(de.elapsed||1);
  const autoDay=Math.max(budget - sv.fixed,0)/de.dim, userDay=+SET.dailyVarBudget||0, target=userDay>0?userDay:autoDay;
  const color=avgDay<=target?'var(--green)':avgDay<=target*1.2?'var(--amber)':'var(--red)';
  const scaleMax=Math.max(Math.max(...series), target*1.3, 1);
  const overDays=series.filter((v,i)=>(de.today?i<de.today:true)&&v>target).length;
  const maxDay=Math.max(...series), maxIdx=series.indexOf(maxDay);
  // weekblokken (1-7, 8-14, …) met gemiddelde per dag
  const weeks=[]; for(let i=0;i<series.length;i+=7){ const c=series.slice(i,i+7); weeks.push({avg:c.reduce((a,b)=>a+b,0)/c.length, lo:i+1, hi:Math.min(i+7,series.length)}); }
  return `<div class="card">
    <div class="row"><span class="hlabel" style="margin:0;flex:1">Variabele uitgave per dag</span><span class="small muted" onclick="go('set')" style="cursor:pointer;color:var(--teal)">dagbudget ›</span></div>
    <div style="display:flex;align-items:baseline;gap:10px;margin-top:6px">
      <div style="font-size:22px;font-weight:800;color:${color}">${euro(avgDay)}</div>
      <div class="small muted">gem./dag · ${userDay>0?'doel':'richtlijn'} ${euro(target)}</div>
    </div>
    <div class="daily">
      <div class="tline" style="bottom:${Math.min(target/scaleMax*100,99)}%"></div>
      ${series.map((v,i)=>`<div class="d ${v>target?'over':''} ${de.today&&i+1===de.today?'today':''}" style="height:${Math.max(v/scaleMax*100,2)}%" title="${i+1} ${MNAMES[+m.slice(5,7)-1]}: ${euro(v)}"></div>`).join('')}
    </div>
    <div class="small muted" style="display:flex;justify-content:space-between"><span>dag 1</span><span style="color:var(--amber)">– – doel ${euro(target)}</span><span>${series.length}</span></div>
    <div class="small muted" style="margin-top:8px">Hoogste dag <b>${euro0(maxDay)}</b> (${maxIdx+1} ${MNAMES[+m.slice(5,7)-1]}) · <b>${overDays}</b> ${overDays===1?'dag':'dagen'} boven doel.</div>
    ${weeks.length>1?`<div class="wkrow">${weeks.map((w,i)=>{const up=w.avg>target;return `<div class="wkcell"><div class="v" style="color:${w.avg<=target?'var(--teal)':'var(--red)'}">${euro0(w.avg)}</div><div class="l">wk ${i+1}</div><div class="ar" style="color:${up?'var(--red)':'var(--green)'}">${up?'▲':'▼'}</div></div>`;}).join('')}</div>
    <div class="small muted" style="margin-top:6px">Gemiddelde variabele uitgave per dag, per week van de maand.</div>`:''}
  </div>`;
}
