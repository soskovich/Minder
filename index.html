function insOverview(m){
  const t=totals(m); const saved=Math.round(t.income-t.spend);
  return `<div class="card"><div class="hlabel" style="margin:0 0 10px">Deze maand</div>
    <div class="ov-row"><span>Uitgegeven</span><span>${euro0(t.spend)}</span></div>
    <div class="ov-row"><span>Over</span><span style="color:${saved>=0?'var(--teal)':'var(--red)'}">${euro0(saved)}</span></div></div>`;
}
function renderBehavior(m){
  const rows=[]; const actual=catSpendMap(m), EB=effectiveBudgets(m).out; let worst=null;
  for(const k in EB){ if(+EB[k]>0){ const act=actual[k]||0; if(act>+EB[k]){ const band=budgetBand(+EB[k],act); if(band==='action'||band==='monitor'){ const over=act-(+EB[k]); if(!worst||over>worst.over) worst={k,over}; } } } }
  if(worst) rows.push({tone:'warn',txt:`${CATS[worst.k].name} loopt uit de pas`,k:worst.k});
  for(const i of (coachItems()||[])){ if(i.t==='good'||rows.length>=4) continue;
    if(worst && i.insight && i.insight.toLowerCase().includes(CATS[worst.k].name.toLowerCase())) continue;
    rows.push({tone:i.t,txt:i.insight}); }
  if(!rows.length) return '';
  const dotc=t=>t==='bad'?'var(--red)':t==='warn'?'var(--amber)':'var(--teal)';
  const body=rows.slice(0,4).map(r=>`<div class="beh-row"><span class="beh-dot" style="background:${dotc(r.tone)}"></span><span class="beh-t">${esc(r.txt)}</span></div>`).join('');
  return `<div class="card"><div class="hlabel" style="margin:0 0 4px">Gedrag</div>${body}</div>`;
}
function renderCatBreak(list){
  const by={}; for(const t of list){ if(t.amount<0 && CATS[catOf(t)].type==='expense') by[catOf(t)]=(by[catOf(t)]||0)+(-t.amount); }
  const ex=Object.entries(by).sort((a,b)=>b[1]-a[1]); if(!ex.length) return '';
  const max=ex[0][1], total=ex.reduce((s,e)=>s+e[1],0);
  const exp=!!SET.expandCat; const shown=exp?ex:ex.slice(0,3);
  const toggle=ex.length>3?`<button class="snz" onclick="toggleExpand('expandCat')">${exp?'minder ▲':'toon alle '+ex.length+' categorieën ▼'}</button>`:'';
  return `<div class="card"><div class="row" style="margin-bottom:10px"><span class="hlabel" style="margin:0;flex:1">Categorieën</span><span class="small muted">${euro0(total)}</span></div>
    ${shown.map(([k,v])=>{const c=CATS[k];const cnt=list.filter(x=>catOf(x)===k&&x.amount<0).length;return `
      <div class="cat-row" style="cursor:pointer" onclick="openCategory('${k}')"><div class="ava" style="background:var(--card2)">${c.icon}</div>
        <div class="g"><div class="t"><span>${c.name} <span class="c">· ${cnt}×</span></span><span>${euro(v)} <span class="muted small">${Math.round(v/total*100)}%</span> ›</span></div>
          <div class="bar-track" style="margin:0"><div class="bar-fill" style="width:${v/max*100}%;background:var(--teal)"></div></div></div>
      </div>`;}).join('')}${toggle}</div>`;
}

function ingest(items){
  let added=0;
  const existing=new Set(TX.map(t=>t.id));
  for(const {name,text} of items){
    const isCSV = /\.csv$/i.test(name) || /booking date|partner name|account name/i.test(text.slice(0,200));
    let res; try{ res = isCSV ? parseCSV(text) : parseMT940(text); }catch(e){ continue; }
    for(const t of res.txns){ if(!existing.has(t.id)){ TX.push(t); existing.add(t.id); added++; } }
    for(const a in res.balances){ ACCMETA[a]=Object.assign(ACCMETA[a]||{},res.balances[a]); }
  }
  TX.sort((a,b)=>a.date.localeCompare(b.date));
  applyOwnAccounts(); buildAccMeta(); save();
  return added;
}

/* ---------- automatische map-import (File System Access API) ---------- */

function idb(){return new Promise((res,rej)=>{const r=indexedDB.open('minder',1);r.onupgradeneeded=()=>r.result.createObjectStore('kv');r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}

async function idbSet(k,v){const db=await idb();return new Promise((res,rej)=>{const t=db.transaction('kv','readwrite');t.objectStore('kv').put(v,k);t.oncomplete=()=>res();t.onerror=()=>rej(t.error);});}

async function idbGet(k){const db=await idb();return new Promise((res,rej)=>{const t=db.transaction('kv','readonly');const q=t.objectStore('kv').get(k);q.onsuccess=()=>res(q.result);q.onerror=()=>rej(q.error);});}

async function connectFolder(){
  if(!FSA){ alert('Automatische map-import werkt in Chrome of Edge. Gebruik anders “Bestand toevoegen” of sleep je map op het scherm.'); return; }

    await syncFolder(true);
  }catch(e){ if(e&&e.name!=='AbortError') alert('Kon de map niet koppelen: '+e.message); }
}

async function syncFolder(verbose){
  try{
    if(!dirHandle) dirHandle=await idbGet('dir');
    if(!dirHandle){ if(verbose) alert('Koppel eerst een map.'); return; }
    let p=await dirHandle.queryPermission({mode:'read'});
    if(p!=='granted'){ if(!verbose) return; p=await dirHandle.requestPermission({mode:'read'}); }
    if(p!=='granted'){ if(verbose) alert('Geen leestoegang tot de map gegeven.'); return; }
    const items=[];
    for await (const [name,h] of dirHandle.entries()){
      if(h.kind==='file' && FILE_RX.test(name)){ const f=await h.getFile(); items.push({name,text:await f.text()}); }
    }
    const added=ingest(items);
    SET.lastSync=Date.now(); SET.folderName=dirHandle.name; save();
    curMonth=null; render();
    if(added) try{ pushTopNotif(); updateNotifBadge(); }catch(_){}
    if(added) toast(`${ICON('check')} ${added} nieuwe transacties bijgewerkt`); else if(verbose) toast('Bijgewerkt — geen nieuwe transacties');
  }catch(e){ if(verbose) toast('Synchroniseren mislukt'); }
}

async function forgetFolder(){ dirHandle=null; SET.autoSync=false; SET.folderName=''; SET.lastSync=0; try{await idbSet('dir',null);}catch(e){} save(); render(); }

/* ---------- PSD2 live koppeling (Enable Banking via eigen backend) ---------- */

function psd2Cfg(){ return { url:(SET.psd2Url||'').replace(/\/+$/,''), token:SET.psd2Token||'' }; }

function psd2Ready(){ const c=psd2Cfg(); return !!(c.url && c.token); }

async function psd2Api(path, opts){
  opts=opts||{}; const c=psd2Cfg(); if(!c.url) throw new Error('Geen backend-URL ingesteld');
  const r=await fetch(c.url+path, Object.assign({}, opts, {
    headers: Object.assign({ 'Authorization':'Bearer '+c.token, 'Content-Type':'application/json' }, opts.headers||{})
  }));
  let data=null; try{ data=await r.json(); }catch(e){}
  if(!r.ok) throw new Error((data&&(data.error||data.detail))||('HTTP '+r.status));
  return data||{};
}
// iban → numeriek rekeningdeel (zelfde vorm als MT940 :25:, voor intern-detectie)

function ibanNum(iban){ const s=(iban||'').replace(/\s/g,''); if(s.length<8) return ''; const d=(s.slice(4).match(/\d+/g)||[]).join(''); return d.replace(/^0+/,''); }
// 1) bank kiezen → consent starten

async function psd2Refresh(silent){
  const meta=SET.psd2Accounts||{}; const keys=Object.keys(meta);
  if(!keys.length){ if(!silent) psd2Connect(); return; }
  if(!psd2Ready()){ if(!silent){ toast('Stel eerst de backend-URL en token in'); go('set'); } return; }
  if(!silent) toast('Verversen…');
  const from=new Date(); from.setMonth(from.getMonth()-2); const fromStr=from.toISOString().slice(0,10);
  const allTx=[]; const balances={}; let authFail=false, anyOk=false;
  for(const accId of keys){ const uid=meta[accId].uid; if(!uid) continue;
    let cont=null, guard=0;
    do{
      const qs='?date_from='+fromStr+(cont?'&continuation_key='+encodeURIComponent(cont):'');
      let d; try{ d=await psd2Api('/accounts/'+encodeURIComponent(uid)+'/transactions'+qs); anyOk=true; }
      catch(e){ if(/40[13]|verlop|expired|consent|session|unauth/i.test(e.message||'')) authFail=true; break; }
      for(const raw of (d.transactions||[])){ const t=mapPsd2Tx(raw, accId); if(t) allTx.push(t); }
      cont=d.continuation_key||null; guard++;
    } while(cont && guard<40);
    try{ const b=await psd2Api('/accounts/'+encodeURIComponent(uid)+'/balances'); const bal=pickBalance(b); if(bal!=null) balances[accId]={balance:bal,date:new Date().toISOString().slice(0,10)}; }catch(e){}
  }
  if(authFail && !anyOk){ if(!silent){ toast('Koppeling verlopen — log opnieuw in'); psd2Connect(); } return; }
  SET.psd2LastSync=Date.now(); save();
  const added=commitTx(allTx, balances);
  if(SET.psd2Pending!==false){ const pend=[];
    for(const accId of keys){ const uid=meta[accId].uid; if(!uid) continue;
      try{ const dp=await psd2Api('/accounts/'+encodeURIComponent(uid)+'/transactions?date_from='+fromStr+'&transaction_status=PDNG');
        for(const raw of (dp.transactions||[])){ const t=mapPsd2Tx(raw, accId, true); if(t) pend.push(t); }
      }catch(e){}
    }
    applyPending(pend);
  }
  curMonth=null; render();
  if(added) try{ pushTopNotif(); updateNotifBadge(); }catch(_){}
  if(!silent) toast(added? `${ICON('check')} ${added} nieuwe transacties` : 'Bijgewerkt — geen nieuwe (van vandaag soms nog niet geboekt)');
}
async function psd2Connect(){
  if(!psd2Ready()){ toast('Stel eerst je bank-verbinding in'); SET.advBank=true; SET.setOpen='bank'; save(); go('set'); return; }
  toast('Banken ophalen…');
  let banks;
  try{ const d=await psd2Api('/aspsps?country=NL'); banks=(d.aspsps||d||[]).filter(b=>b&&b.name).sort((a,b)=>a.name.localeCompare(b.name)); }
  catch(e){ toast('Fout: '+e.message); return; }
  if(!banks.length){ toast('Geen banken ontvangen'); return; }
  $('#sheet').innerHTML=`<div class="grab"></div>
    <div class="center" style="margin-bottom:8px"><div style="font-size:22px">${ICON('bank')}</div><div style="font-weight:800;font-size:17px">Kies je bank</div>
      <div class="muted small">${banks.length} banken · je logt in bij je bank om toegang te geven</div></div>
    ${banks.map((b,i)=>`<div class="tx" style="cursor:pointer" onclick="psd2StartAuth(${i})">
      <div class="ava" style="background:var(--card2)">${ICON('bank')}</div>
      <div class="info"><div class="nm">${esc(b.name)}</div><div class="cat">${esc(b.country||'NL')}</div></div>
      <div class="amt" style="color:var(--teal)">›</div></div>`).join('')}`;
  window._psd2Banks=banks; $('#sheetBg').classList.add('show');
}

async function psd2StartAuth(idx){
  const b=(window._psd2Banks||[])[idx]; if(!b) return;
  const aspsp={ name:b.name, country:b.country||'NL' };
  const state='mind_'+Math.random().toString(36).slice(2)+Date.now().toString(36);
  const redirect=location.origin+location.pathname;
  sessionStorage.setItem('psd2_state', state); closeSheet();
  toast('Doorsturen naar '+b.name+'…');
  try{
    const d=await psd2Api('/auth',{ method:'POST', body:JSON.stringify({ aspsp, state, redirect_url:redirect, valid_days:90 }) });
    if(d&&d.url){ location.href=d.url; } else { toast('Geen autorisatie-URL ontvangen'); }
  }catch(e){ toast('Fout: '+e.message); }
}
// 2) terug van de bank: ?code=&state=

async function psd2HandleCallback(){
  const q=new URLSearchParams(location.search);
  const code=q.get('code'), state=q.get('state');
  if(!code) return;
  const expect=sessionStorage.getItem('psd2_state');
  history.replaceState(null,'',location.origin+location.pathname);
  if(expect && state && state!==expect){ toast('Sessie kwam niet overeen — probeer opnieuw'); return; }
  toast('Bankkoppeling afronden…');
  try{ const s=await psd2Api('/sessions',{ method:'POST', body:JSON.stringify({ code }) }); await psd2IngestSession(s); }
  catch(e){ toast('Fout bij afronden: '+e.message); }
}
// accounts uit de sessie → transacties + saldo ophalen en opslaan

async function psd2IngestSession(s){
  const accounts = s.accounts || [];
  if(!accounts.length){ toast('Geen rekeningen ontvangen'); return; }
  const meta=SET.psd2Accounts||{};
  const aspspName=(s.aspsp&&s.aspsp.name)||'Bank';
  const allTx=[]; const balances={}; const pend=[];
  const from=new Date(); from.setMonth(from.getMonth()-24); const fromStr=from.toISOString().slice(0,10);
  for(const a of accounts){
    const uid = a.uid || a;
    const iban = (a.account_id&&a.account_id.iban) || a.iban || '';
    const accId = ibanNum(iban) || ('psd2_'+String(uid).slice(0,8));
    const label = (a.name||a.product||'Rekening')+(iban?' ··'+iban.slice(-4):'');
    meta[accId]={ uid, iban, label, bank:aspspName, exp:(s.access&&s.access.valid_until)||'' };
    let cont=null, guard=0;
    do{
      const qs='?date_from='+fromStr+(cont?'&continuation_key='+encodeURIComponent(cont):'');
      let d; try{ d=await psd2Api('/accounts/'+encodeURIComponent(uid)+'/transactions'+qs); }
      catch(e){ toast('Transacties ophalen mislukt: '+e.message); break; }
      for(const raw of (d.transactions||[])){ const t=mapPsd2Tx(raw, accId); if(t) allTx.push(t); }
      cont=d.continuation_key||null; guard++;
    } while(cont && guard<40);
    try{ const b=await psd2Api('/accounts/'+encodeURIComponent(uid)+'/balances'); const bal=pickBalance(b); if(bal!=null) balances[accId]={balance:bal,date:new Date().toISOString().slice(0,10)}; }catch(e){}
    if(SET.psd2Pending!==false){ try{ const fp=new Date(); fp.setMonth(fp.getMonth()-1); const dp=await psd2Api('/accounts/'+encodeURIComponent(uid)+'/transactions?date_from='+fp.toISOString().slice(0,10)+'&transaction_status=PDNG');
      for(const raw of (dp.transactions||[])){ const t=mapPsd2Tx(raw, accId, true); if(t) pend.push(t); } }catch(e){} }
  }
  SET.psd2Accounts=meta; SET.psd2LastSync=Date.now();
  const added=commitTx(allTx, balances);
  applyPending(pend);
  curMonth=null; render();
  toast(added? `${ICON('check')} ${added} transacties gekoppeld van ${aspspName}` : `Koppeling met ${aspspName} ververst (geen nieuwe)`);
}
// Enable Banking transactie → intern TX-object (zelfde schema als MT940/CSV)

function mapPsd2Tx(raw, accId, pending){
  const amtObj = raw.transaction_amount || raw.amount || {};
  const val = parseFloat(amtObj.amount); if(isNaN(val)) return null;
  const cdi = (raw.credit_debit_indicator||'').toUpperCase();
  const amount = cdi==='DBIT' ? -Math.abs(val) : (cdi==='CRDT'? Math.abs(val) : val);
  const date = (raw.booking_date || raw.value_date || raw.transaction_date || '').slice(0,10);
  if(!date) return null;
  const remit = Array.isArray(raw.remittance_information)? raw.remittance_information.join(' ') : (raw.remittance_information||'');
  const cp = amount<0 ? (raw.creditor||{}) : (raw.debtor||{});
  const cpAcc = amount<0 ? (raw.creditor_account||{}) : (raw.debtor_account||{});
  const name = ((cp.name||'').trim() || remit.slice(0,42).trim() || 'Transactie');
  const desc = [name, remit, (raw.bank_transaction_code&&raw.bank_transaction_code.description)||''].filter(Boolean).join(' ');
  const t={ date, amount, acc:accId, src:'psd2', desc, name:name.replace(/\s+/g,' ').slice(0,44),
    refNums: cpAcc.iban? [ibanNum(cpAcc.iban)].filter(Boolean) : [] };
  categorize(t);
  if(pending){ t.pending=true; t.id+='_p'; }
  return t;
}

function pickBalance(b){
  const arr = (b&&(b.balances||b))||[]; if(!Array.isArray(arr)||!arr.length) return null;
  const pref = arr.find(x=>/CLBD|ITAV|XPCD|PRCD/i.test(x.balance_type||x.type||'')) || arr[0];
  const v = pref&&(pref.balance_amount||pref.amount); if(!v) return null;
  const n=parseFloat(v.amount); if(isNaN(n)) return null;
  return (pref.credit_debit_indicator||'').toUpperCase()==='DBIT' ? -Math.abs(n) : n;
}
// gedeelde commit voor kant-en-klare TX-objecten (zelfde dedup als ingest)

function applyPending(list){
  TX=TX.filter(t=>!t.pending);            // wis vorige pending-snapshot
  const booked=TX.slice();                // dedup alleen tegen geboekte/geïmporteerde tx
  let add=0;
  for(const t of (list||[])){ if(!t) continue;
    const dup=booked.some(b=>b.acc===t.acc && Math.abs(b.amount-t.amount)<0.01 && Math.abs((new Date(b.date)-new Date(t.date))/86400000)<=6);
    if(dup) continue;
    TX.push(t); add++;
  }
  TX.sort((a,b)=>a.date.localeCompare(b.date));
  applyOwnAccounts(); buildAccMeta(); save();
  return add;
}
function commitTx(newTxns, balances){
  let added=0; const existing=new Set(TX.map(t=>t.id));
  for(const t of newTxns){ if(t&&!existing.has(t.id)){ TX.push(t); existing.add(t.id); added++; } }
  if(balances) for(const a in balances){ ACCMETA[a]=Object.assign(ACCMETA[a]||{}, balances[a]); }
  TX.sort((a,b)=>a.date.localeCompare(b.date));
  applyOwnAccounts(); buildAccMeta(); save();
  if(added) try{ pushTopNotif(); updateNotifBadge(); }catch(_){}
  return added;
}

function psd2Disconnect(){
  if(!confirm('Live koppeling vergeten? (Reeds ingelezen transacties blijven staan.)')) return;
  SET.psd2Accounts={}; SET.psd2LastSync=0; save(); render();
}

/* ---------- map/bestanden slepen (werkt ook zonder File System Access API) ---------- */

function detectRecurring(){
  const map={};
  for(const t of TX){ if(t.amount>=0) continue; const c=catOf(t); if(CATS[c].type!=='expense'&&c!=='intern')continue;
    const key=t.name.toUpperCase().replace(/[0-9]/g,'').slice(0,18).trim();
    if(!key)continue; (map[key]=map[key]||{name:t.name,cat:c,amts:[],mset:new Set()});
    map[key].amts.push(-t.amount); map[key].mset.add(t.date.slice(0,7));
  }
  return Object.values(map).filter(r=>r.mset.size>=2).map(r=>({name:r.name,cat:r.cat,count:r.amts.length,
    avg:r.amts.reduce((a,b)=>a+b,0)/r.amts.length})).sort((a,b)=>b.avg-a.avg);
}

/* ----- INSTELLINGEN ----- */

function toggleSet(id){ SET.setOpen = SET.setOpen===id?'':id; save(); renderSet(); }

async function readEntry(entry,items){
  if(!entry) return;
  if(entry.isFile){ await new Promise(res=>entry.file(async f=>{ if(FILE_RX.test(f.name)) items.push({name:f.name,text:await f.text()}); res(); },res)); }
  else if(entry.isDirectory){ const rd=entry.createReader();
    while(true){ const ents=await new Promise((res,rej)=>rd.readEntries(res,rej)); if(!ents.length) break; for(const e of ents) await readEntry(e,items); } }
}
document.addEventListener('dragover',e=>{e.preventDefault();});
document.addEventListener('drop',async e=>{
  e.preventDefault();
  const items=[];
  const ents=[...(e.dataTransfer.items||[])].map(i=>i.webkitGetAsEntry&&i.webkitGetAsEntry()).filter(Boolean);
  if(ents.length){ for(const en of ents) await readEntry(en,items); }
  else { for(const f of e.dataTransfer.files){ if(FILE_RX.test(f.name)) items.push({name:f.name,text:await f.text()}); } }
  if(items.length){ const added=ingest(items); curMonth=null; render(); if(added) try{ pushTopNotif(); updateNotifBadge(); }catch(_){} toast(added? `${ICON('check')} ${added} transacties geïmporteerd` : 'Geen nieuwe transacties'); }
});

/* ---------- start ---------- */
load(); if(TX.length){ TX.forEach(categorize); applyOwnAccounts(); buildAccMeta(); } render(); // hercategoriseer met actuele regels
try{ if(TX.length) pushTopNotif(); updateNotifBadge(); }catch(_){}
try{ if(Object.keys(SET.psd2Accounts||{}).length && (Date.now()-(SET.psd2LastSync||0))>4*3600000) psd2Refresh(true); }catch(_){}
if(new URLSearchParams(location.search).get('code')) psd2HandleCallback(); // terug van bank (PSD2-consent)
(async()=>{ // auto-sync bij openen als de map al gekoppeld is en toegang al verleend is
  if(!FSA || !SET.autoSync) return;
  try{ dirHandle=await idbGet('dir');
    if(dirHandle && await dirHandle.queryPermission({mode:'read'})==='granted'){ await syncFolder(false); }
    else { render(); }
  }catch(e){}
})();

/* ---------- PWA: service worker + installeren ---------- */
if('serviceWorker' in navigator && location.protocol!=='file:'){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').then(reg=>{ try{reg.update();}catch(e){} }).catch(()=>{}));
  let _reloading=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{ if(_reloading)return; _reloading=true; location.reload(); });
}
window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); deferredPrompt=e; if(TX.length) renderSet(); });
window.addEventListener('appinstalled',()=>{ deferredPrompt=null; if(TX.length) renderSet(); });
async function installApp(){
  if(!deferredPrompt){ alert('Installeren kan via het browsermenu: ⋮ → “App installeren” (Chrome/Edge) of Deel → “Zet op beginscherm” (iPhone). Mogelijk is de app al geïnstalleerd.'); return; }
  deferredPrompt.prompt(); try{ await deferredPrompt.userChoice; }catch(e){} deferredPrompt=null; renderSet();
}
