<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f766e">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Minder">
<title>Minder — slimme uitgaventracker</title>
<style>
:root{
  --bg:#0a0f1a; --card:#141b2b; --card2:#1b2336; --line:rgba(255,255,255,.07);
  --txt:#eaf0fb; --mut:#8f9bb0; --teal:#2dd4bf; --teal-d:#0f766e;
  --green:#34d399; --amber:#f5b544; --red:#f06d6d; --blue:#60a5fa; --violet:#a78bfa;
  --shadow:none;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
  font-size:15px; line-height:1.45; padding-bottom:78px; max-width:520px; margin:0 auto;
  min-height:100vh; position:relative;
  font-variant-numeric:tabular-nums; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  letter-spacing:-.01em;
}
svg{display:inline-block}
h1,h2,h3{margin:0}
.app-head{padding:18px 18px 6px;display:flex;align-items:center;justify-content:space-between}
.app-head .logo{font-weight:800;font-size:20px;letter-spacing:-.4px}
.app-head .logo span{color:var(--teal)}
.month-pick{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:6px 10px}
.month-pick button{background:none;border:none;color:var(--txt);font-size:18px;width:26px;height:26px;border-radius:50%;cursor:pointer}
.month-pick button:active{background:var(--card2)}
.month-pick .m{font-weight:600;min-width:96px;text-align:center;font-size:14px}
.screen{display:none;padding:8px 16px 16px;animation:fade .25s ease}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.muted{color:var(--mut)}
.small{font-size:12.5px}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.center{text-align:center}

/* budget ring */
.ring-wrap{display:flex;flex-direction:column;align-items:center;padding:6px 0 2px}
.ring{position:relative;width:200px;height:200px}
.ring svg{transform:rotate(-90deg)}
.ring .mid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .mid .pct{font-size:38px;font-weight:800;letter-spacing:-1px;line-height:1}
.ring .mid .lab{font-size:12px;color:var(--mut);margin-top:4px}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:6px}
.kpi{background:var(--card2);border-radius:14px;padding:11px 8px;text-align:center}
.kpi .v{font-weight:700;font-size:15px}
.kpi .l{font-size:11px;color:var(--mut);margin-top:2px}
.bar-track{height:9px;background:var(--card2);border-radius:6px;overflow:hidden;margin:8px 0 4px}
.bar-fill{height:100%;border-radius:6px;transition:width .5s}

/* coach */
.coach{display:flex;gap:11px;align-items:flex-start;padding:12px;border-radius:14px;margin-bottom:9px;border:1px solid var(--line)}
.coach .ic{font-size:20px;line-height:1.1;flex-shrink:0}
.coach.good .ic{color:var(--green)}
.coach.warn .ic{color:var(--amber)}
.coach.bad .ic{color:var(--red)}
.coach.info .ic{color:var(--blue)}
.coach .tx{font-size:13.5px}
.coach.good{background:rgba(52,211,153,.08);border-color:rgba(52,211,153,.25)}
.coach.warn{background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.28)}
.coach.bad{background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.28)}
.coach.info{background:rgba(96,165,250,.08);border-color:rgba(96,165,250,.25)}

/* actieplan */
.plan-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.plan-head .pot{background:rgba(45,212,191,.14);border:1px solid rgba(45,212,191,.4);color:var(--teal);border-radius:999px;padding:4px 11px;font-size:12px;font-weight:700;white-space:nowrap}
.action{border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:10px;background:var(--card2)}
.action .ah{display:flex;align-items:flex-start;gap:11px;margin-bottom:9px}
.action .ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.action .at{font-weight:700;font-size:14.5px}
.action .asub{font-size:12px;color:var(--mut);margin-top:1px}
.action .save{margin-left:auto;font-size:11.5px;font-weight:700;color:var(--green);background:rgba(52,211,153,.12);border-radius:999px;padding:3px 9px;white-space:nowrap;flex-shrink:0}
.steps{list-style:none;margin:0;padding:0}
.steps li{position:relative;padding:5px 0 5px 24px;font-size:13px;line-height:1.45}
.steps li:before{content:"→";position:absolute;left:4px;top:5px;color:var(--teal);font-weight:700}
.steps li b{color:var(--txt)}
.act-btns{display:flex;gap:8px;margin-top:11px}
.mini{flex:1;border:1px solid var(--line);background:var(--card);color:var(--txt);border-radius:10px;padding:9px;font-size:12.5px;font-weight:600;cursor:pointer}
.mini:active{filter:brightness(1.15)}
.mini.go{background:rgba(52,211,153,.14);border-color:rgba(52,211,153,.45);color:var(--green)}
.action.done{opacity:.72}
.action.done .at{text-decoration:line-through;color:var(--mut)}
.action.done .ico{background:rgba(52,211,153,.16)!important}
.goal-wrap{margin:2px 0 4px}
.goal-row{display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px;margin-bottom:6px}
.goal-row .big{font-size:20px;font-weight:800;color:var(--teal)}
.snz{display:block;width:100%;text-align:center;background:none;border:none;color:var(--mut);font-size:12px;padding:8px;cursor:pointer;text-decoration:underline}
#toast{position:fixed;left:50%;bottom:84px;transform:translate(-50%,20px);max-width:90%;background:var(--teal-d);color:#fff;padding:11px 16px;border-radius:12px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;z-index:80;text-align:center}
#toast.show{opacity:1;transform:translate(-50%,0)}
.note{background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.22);border-radius:10px;padding:8px 10px;margin-top:9px;font-size:12.5px;color:var(--txt);white-space:pre-wrap;word-break:break-word}
.mini.note-btn{flex:0 0 44px}
/* gestapelde balk vast/variabel */
.stack{display:flex;height:26px;border-radius:8px;overflow:hidden;margin:10px 0 12px;background:var(--card2)}
.stack > div{height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#0b1220;white-space:nowrap;min-width:0}
.fv-row{display:flex;align-items:center;gap:9px;margin:7px 0}
.fv-row .dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.fv-row .nm{flex:1;font-size:13.5px}
.fv-row .amt{font-weight:700;font-size:13.5px}
.fv-row .pc{font-size:11.5px;color:var(--mut);width:54px;text-align:right}
/* dagelijkse variabele-uitgaven grafiek */
.daily{position:relative;height:84px;display:flex;align-items:flex-end;gap:2px;margin:14px 0 4px}
.daily .d{flex:1;background:var(--teal-d);border-radius:2px 2px 0 0;min-height:2px}
.daily .d.over{background:var(--red)}
.daily .d.today{outline:2px solid var(--txt);outline-offset:1px}
.daily .tline{position:absolute;left:0;right:0;border-top:1px dashed var(--amber);pointer-events:none}
.wkrow{display:flex;gap:6px;margin-top:10px}
.wkcell{flex:1;text-align:center;background:var(--card2);border-radius:9px;padding:7px 2px}
.wkcell .v{font-weight:700;font-size:13px}
.wkcell .l{font-size:10px;color:var(--mut)}
.wkcell .ar{font-size:10px}
/* variantieanalyse P/H/K */
.phq{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:9px;background:var(--card2)}
.phq .ph-t{font-weight:700;font-size:14px;margin-bottom:7px}
.phq .ph-l{font-size:12.5px;line-height:1.5;margin:6px 0;padding-left:22px;position:relative}
.phq .ph-l .k{position:absolute;left:0;top:1px;font-weight:800;font-size:10px;width:16px;height:16px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;background:var(--card);color:#fff}
.bud-line{font-size:12px;margin-top:3px;font-weight:600}
/* actieplan-hefbomen + SMART */
.lever{display:flex;align-items:flex-start;gap:9px;padding:9px 10px;border:1px solid var(--line);border-radius:11px;margin-bottom:7px;cursor:pointer;background:var(--card)}
.lever.on{border-color:var(--teal);background:rgba(45,212,191,.08)}
.lever .chk{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--line);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff}
.lever.on .chk{background:var(--teal-d);border-color:var(--teal)}
.lever .lv{flex:1;min-width:0}
.lever .lv .lt{font-weight:600;font-size:13.5px}
.lever .lv .ld{font-size:11.5px;color:var(--mut)}
.lever .ef{font-size:12px;font-weight:700;color:var(--green);white-space:nowrap}
.smart{border:1px solid rgba(45,212,191,.3);background:rgba(45,212,191,.06);border-radius:12px;padding:12px;margin-top:10px}
.smart .st{font-weight:700;font-size:13.5px;margin-bottom:6px}
.smart .sl{font-size:12.5px;line-height:1.5;margin:5px 0;padding-left:26px;position:relative}
.smart .sl .b{position:absolute;left:0;top:1px;font-weight:800;font-size:9px;width:20px;height:18px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;background:var(--teal-d);color:#fff;letter-spacing:.3px}

/* lists */
.tx-day{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin:14px 4px 6px;font-weight:600}
.tx{display:flex;align-items:center;gap:12px;padding:11px 12px;background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:8px;cursor:pointer}
.tx:active{background:var(--card2)}
.tx .ava{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.tx .info{flex:1;min-width:0}
.tx .nm{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx .cat{font-size:11.5px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx .amt{font-weight:700;font-size:14.5px;white-space:nowrap}
.amt.pos{color:var(--green)} .amt.neg{color:var(--txt)}
.cat-row{display:flex;align-items:center;gap:11px;margin-bottom:13px}
.cat-row .ava{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.cat-row .g{flex:1;min-width:0}
.cat-row .t{display:flex;justify-content:space-between;font-size:13.5px;font-weight:600;margin-bottom:5px}
.cat-row .t .c{color:var(--mut);font-weight:500;font-size:12px}

/* controls */
input[type=search],input[type=number]{width:100%;background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:12px;padding:11px 13px;font-size:14px;outline:none}
.chips{display:flex;gap:7px;overflow-x:auto;padding:4px 0 8px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;background:var(--card2);border:1px solid var(--line);color:var(--mut);border-radius:999px;padding:6px 13px;font-size:12.5px;cursor:pointer;white-space:nowrap}
.chip.on{background:var(--teal-d);border-color:var(--teal);color:#fff}
.btn{display:block;width:100%;background:var(--teal-d);color:#fff;border:none;border-radius:13px;padding:13px;font-size:15px;font-weight:600;cursor:pointer;text-align:center}
.btn:active{filter:brightness(1.1)}
.btn.sec{background:var(--card2);border:1px solid var(--line)}
.btn.danger{background:rgba(248,113,113,.14);border:1px solid rgba(248,113,113,.4);color:var(--red)}
.slider{width:100%;accent-color:var(--teal)}
label.fld{display:block;font-size:13px;color:var(--mut);margin:14px 0 6px;font-weight:600}
.toggle{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line)}
.toggle:last-child{border-bottom:none}
.sw{position:relative;width:46px;height:27px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.sw .sl{position:absolute;inset:0;background:var(--card2);border:1px solid var(--line);border-radius:999px;transition:.2s}
.sw .sl:before{content:"";position:absolute;width:21px;height:21px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.2s}
.sw input:checked + .sl{background:var(--teal-d);border-color:var(--teal)}
.sw input:checked + .sl:before{transform:translateX(19px)}

/* bottom nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:rgba(13,20,34,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:50}
.nav a{flex:1;text-align:center;color:var(--mut);text-decoration:none;font-size:10.5px;padding:4px 0;cursor:pointer}
.nav a .i{display:block;font-size:21px;margin-bottom:1px;line-height:1}
.nav a.on{color:var(--teal)}

/* empty / upload */
.empty{text-align:center;padding:50px 24px}
.empty .big{font-size:54px;margin-bottom:12px}
.empty h2{font-size:19px;margin-bottom:8px}
.empty p{color:var(--mut);font-size:14px;margin-bottom:22px}
.fab{position:fixed;right:max(16px,calc(50% - 260px + 16px));bottom:92px;width:56px;height:56px;border-radius:50%;background:var(--teal-d);border:1px solid var(--teal);color:#fff;font-size:26px;box-shadow:var(--shadow);cursor:pointer;z-index:40;display:flex;align-items:center;justify-content:center}

/* sheet */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:60;display:none}
.sheet-bg.show{display:block}
.sheet{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:520px;background:var(--card);border-radius:20px 20px 0 0;border:1px solid var(--line);padding:18px 16px calc(20px + env(safe-area-inset-bottom));max-height:80vh;overflow:auto;animation:up .25s ease}
@keyframes up{from{transform:translate(-50%,100%)}to{transform:translate(-50%,0)}}
.grab{width:40px;height:4px;background:var(--line);border-radius:3px;margin:0 auto 14px}
.catgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
.catpick{display:flex;align-items:center;gap:9px;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:10px;cursor:pointer;font-size:13px}
.catpick.on{border-color:var(--teal)}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px;background:var(--card2);color:var(--mut);margin-left:6px}
.legend{display:flex;flex-wrap:wrap;gap:6px 14px;font-size:11.5px;color:var(--mut);margin-top:10px}
.legend span{display:flex;align-items:center;gap:5px}
.dot{width:9px;height:9px;border-radius:3px;display:inline-block}
.spark{display:flex;align-items:flex-end;gap:6px;height:90px;margin-top:6px}
.spark .b{flex:1;background:var(--teal-d);border-radius:5px 5px 0 0;position:relative;min-height:3px;transition:height .4s}
.spark .b .lab{position:absolute;bottom:-18px;left:0;right:0;text-align:center;font-size:9.5px;color:var(--mut)}
.spark .b .val{position:absolute;top:-15px;left:0;right:0;text-align:center;font-size:9px;color:var(--mut)}
</style>
</head>
<body>

<div class="app-head">
  <div class="logo">Min<span>der</span></div>
  <div class="month-pick" id="monthPick" style="display:none">
    <button id="mPrev">‹</button><div class="m" id="mLabel">—</div><button id="mNext">›</button>
  </div>
</div>

<!-- DASHBOARD -->
<section class="screen active" id="s-dash"></section>
<!-- TRANSACTIES -->
<section class="screen" id="s-tx"></section>
<!-- INZICHTEN -->
<section class="screen" id="s-ins"></section>
<!-- ACTIEPLAN -->
<section class="screen" id="s-act"></section>
<!-- INSTELLINGEN -->
<section class="screen" id="s-set"></section>

<button class="fab" id="fab" title="MT940 uploaden">＋</button>
<input type="file" id="file" accept=".sta,.STA,.940,.txt,.mt940,.csv,.CSV" multiple style="display:none">

<nav class="nav">
  <a data-go="dash" class="on"><span class="i"><svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg></span>Dashboard</a>
  <a data-go="tx"><span class="i"><svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13M8 12h13M8 18h13"/><path d="M4 6h.01M4 12h.01M4 18h.01"/></svg></span>Transacties</a>
  <a data-go="ins"><span class="i"><svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4"/><path d="M12 2a6 6 0 0 0-3.5 10.9c.9.7 1.5 1.6 1.5 2.6V16h4v-.5c0-1 .6-1.9 1.5-2.6A6 6 0 0 0 12 2Z"/></svg></span>Inzichten</a>
  <a data-go="act"><span class="i"><svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.3"/></svg></span>Actieplan</a>
  <a data-go="set"><span class="i"><svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.6-2-3.4-2.4 1a7 7 0 0 0-1.7-1L14.4 3H9.6l-.4 2.5a7 7 0 0 0-1.7 1l-2.4-1-2 3.4 2 1.6a7 7 0 0 0 0 2l-2 1.6 2 3.4 2.4-1a7 7 0 0 0 1.7 1l.4 2.5h4.8l.4-2.5a7 7 0 0 0 1.7-1l2.4 1 2-3.4-2-1.6a7 7 0 0 0 .1-1Z"/></svg></span>Instellingen</a>
</nav>

<div class="sheet-bg" id="sheetBg"><div class="sheet" id="sheet"></div></div>

<script>
/* ============================================================
   MINDER — lokale, privacyvriendelijke MT940 uitgaventracker
   Alle verwerking gebeurt in je browser. Niets wordt verstuurd.
   ============================================================ */
const $=s=>document.querySelector(s);
const euro=n=>'€'+(n<0?'-':'')+Math.abs(n).toLocaleString('nl-NL',{minimumFractionDigits:2,maximumFractionDigits:2});
const euro0=n=>'€'+Math.round(Math.abs(n)).toLocaleString('nl-NL');
const MNAMES=['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
const MFULL=['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];

/* ---------- categorie-definities ---------- */
// type: expense | income | internal  (income & internal tellen niet als uitgave)
// monochrome line-icon-set (1 stijl, currentColor) — schaalt mee met font-size van de container
function ICON(n){const P={
  home:'<path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/>',
  list:'<path d="M8 6h13M8 12h13M8 18h13"/><path d="M4 6h.01M4 12h.01M4 18h.01"/>',

// Overboekingen tussen eigen rekeningen → 'intern' (tellen niet als inkomen/uitgave).
// Salaris/inkomen blijft inkomen, ook al staat het op een eigen rekening.
function applyOwnAccounts(){
  OWN=[...new Set(TX.map(t=>t.acc).filter(Boolean))];
  // namen van eigen N26-potjes (uit Account Name) + vaste aliassen voor onderlinge overboekingen
  const ownNames=new Set([...TX.filter(t=>t.src==='csv').map(t=>(t.accName||'').toLowerCase()),
    'main','main account','zakgeld','buffer comfort','buffer rust','instant savings','income sorter',
    've sumter','vincent sumter','vincent ernst sumter'].filter(Boolean));
  // N26-interne potje-/spaarbewegingen (PSD2 levert geen tegenpartij-IBAN voor Spaces)
  const N26INT=/\b(income sorter|moved|round[\s-]?up)\b|\b(from|to|naar|van)\s+(main|zakgeld|spaces?|spaarpot|buffer)/i;
  for(const t of TX){
    if(OVR[t.id]) continue;                 // handmatige keuze respecteren
    const rc=t.ruleCat||t.autoCat;
    if(rc==='inkomen'){ t.autoCat='inkomen'; continue; }
    let intern = (t.refNums||[]).some(n=>OWN.includes(n));               // MT940/PSD2: eigen IBAN als tegenpartij
    if(!intern && t.src==='csv' && /transfer/i.test(t.typ||'') && ownNames.has((t.partner||'').toLowerCase())) intern=true; // N26 CSV: potje↔potje
    if(!intern && t.src==='psd2'){ const nm=(t.name||'').toLowerCase().trim(); if(ownNames.has(nm) || N26INT.test(t.name||'')) intern=true; } // N26 PSD2: Spaces/eigen naam
    t.autoCat = intern ? 'intern' : rc;
  }
}

    const cards=list.filter(t=>/BEA,|GEA,|ECOM,|APPLE PAY|BETAALPAS|Presentment/i.test(t.desc)).length;
    let role = inc>1000 ? 'Salaris / inkomen' : cards>20 ? 'Betaalrekening' : 'Spaarpotje / overig';
    // label: PSD2 toont bank + rekeningnaam, N26-potjes hun naam, ABN rol + laatste 4 cijfers
    const label = pm ? (pm.bank+' · '+pm.label) : isCSV ? (a.replace(/^N26 /,'')+' · N26') : (role+' ··'+a.slice(-4));
    const prev=ACCMETA[a]||{};
    ACCMETA[a]=Object.assign({},prev,{role,count:list.length,income:inc,label,bank: pm?pm.bank : isCSV?'N26':'ABN AMRO'});
  }
}

/* ---------- MT940 parser (ABN AMRO, beide :86:-formaten) ---------- */
function parseMT940(text){
  const lines=text.replace(/\r/g,'').split('\n');
  const out=[]; let cur=null, acc=null; const bal={};
  const num=s=>parseFloat((s||'').replace(/\./g,'').replace(',','.').replace(/\.$/,''))||0;
  const push=()=>{ if(cur){ cur.desc=cur.raw.join(' ').replace(/\s+/g,' ').trim(); finalize(cur); out.push(cur); cur=null; } };
  for(const ln of lines){
    if(ln.startsWith(':25:')){ acc=ln.slice(4).trim().replace(/[^0-9]/g,''); }
    else if(ln.startsWith(':62F:')){
      push();
      const m=ln.match(/^:62F:([CD])(\d{6})EUR([\d,\.]+)/);
      if(m && acc){ const v=num(m[3])*(m[1]==='C'?1:-1); const d='20'+m[2].slice(0,2)+'-'+m[2].slice(2,4)+'-'+m[2].slice(4,6);
        if(!bal[acc]||d>=bal[acc].date) bal[acc]={balance:v,date:d}; }
    }
    else if(ln.startsWith(':61:')){
      push();
      const m=ln.match(/^:61:(\d{6})(\d{4})?(RC|RD|C|D)([\d,\.]+)N(\w{3})/);
      if(m){
        const yy=m[1].slice(0,2),mm=m[1].slice(2,4),dd=m[1].slice(4,6);
        const sign=(m[3]==='C'||m[3]==='RC')?1:-1;
        cur={date:`20${yy}-${mm}-${dd}`, amount:sign*num(m[4]), code:m[5], acc:acc, raw:[]};
      }
    } else if(ln.startsWith(':86:')){
      if(cur) cur.raw.push(ln.slice(4).trim());
    } else if(ln.startsWith(':60F:')||ln.startsWith(':20:')||ln==='-'){
      push();
    } else if(cur && cur.raw.length){ // doorlopende beschrijvingsregel
      cur.raw.push(ln.trim());
    }
  }
  push();
  return {txns:out, balances:bal};
}

/* counterparty + categorie afleiden */
function finalize(t){
  const U=t.desc.toUpperCase();
  // naam
  let name='';
  let tm=t.desc.match(/\/NAME\/([^\/]+)/i);            // /TRTP/ formaat
  if(tm) name=tm[1].trim();
  if(!name){ tm=t.desc.match(/NAAM:\s*([^]*?)(?:MACHTIGING:|OMSCHRIJVING:|IBAN:|KENMERK:|BIC:|$)/i); if(tm) name=tm[1].trim(); }
  if(!name){ // BEA pin: ":86:BEA, APPLE PAY   MERCHANT"
    tm=t.desc.match(/^(?:BEA|GEA|ECOM)[^A-Z0-9]*[A-Z ]*?(?:PAY|PAS)\s{2,}([^]+?)(?:NR:|KAARTNUMMER|$)/i);
    if(tm) name=tm[1].trim();
  }
  if(!name){ tm=t.desc.match(/\/REMI\/([^\/]+)/i); if(tm) name=tm[1].trim(); }
  if(!name) name=t.desc.slice(0,42)||'Transactie';
  name=name.replace(/\s+/g,' ').replace(/\s+\d{6,}.*$/,'').trim().slice(0,44);
  t.name=name||'Transactie';
  t.src='mt940';
  // rekeningnummers uit IBAN's in de omschrijving — voor eigen-rekening detectie
  t.refNums=[...t.desc.replace(/\s/g,'').matchAll(/[A-Z]{2}\d{2}[A-Z]{4}(\d{9,10})/g)].map(x=>x[1].replace(/^0+/,''));
  categorize(t);
}
// id + keyword-categorie (gedeeld door MT940 en CSV)
function categorize(t){
  const U=t.desc.toUpperCase();
  const Z=U.replace(/\s/g,'');   // spatieloos: vangt MT940-regelafbrekingen op (SAXO B ANK → SAXOBANK)
  t.id=hash((t.acc||'')+t.date+t.amount.toFixed(2)+t.desc)+'_'+Math.round(Math.abs(t.amount)*100);
  const match=w=>{ const wu=(w||'').toUpperCase(); if(!wu) return false; const wz=wu.replace(/\s/g,''); return U.includes(wu) || (wz.length>=4 && Z.includes(wz)); };
  let cat='overig';
  // 1) eigen regels winnen van de ingebouwde categorisatie
  for(const r of (typeof SET!=='undefined'&&SET.rules)||[]){ if(CATS[r.cat] && match(r.kw)){ cat=r.cat; break; } }
  // 2) ingebouwde keyword-regels
  if(cat==='overig'){ for(const [k,kws] of RULES){ if(kws.some(match)){ cat=k; break; } } }
  if(cat==='overig' && t.amount>0) cat='intern'; // onbekende bijschrijving = meestal eigen overboeking
  t.ruleCat=cat;
  t.autoCat=cat;   // wordt evt. overschreven door applyOwnAccounts()
}

/* ---------- CSV parser (N26-export: Booking Date,Partner Name,Type,Account Name,Amount (EUR)…) ---------- */
function splitCSVLine(line){
  const out=[]; let cur='', q=false;
  for(let i=0;i<line.length;i++){ const c=line[i];
    if(q){ if(c==='"'){ if(line[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else { if(c==='"') q=true; else if(c===',') {out.push(cur);cur='';} else cur+=c; }
  }

function parseCSV(text){
  const lines=text.replace(/\r/g,'').split('\n').filter(l=>l.trim());
  if(!lines.length) return {txns:[],balances:{}};
  const head=splitCSVLine(lines[0]).map(h=>h.trim().toLowerCase());
  const col=n=>head.findIndex(h=>h===n);
  const ci={date:col('booking date'),partner:col('partner name'),iban:col('partner iban'),type:col('type'),ref:col('payment reference'),acc:col('account name'),amt:col('amount (eur)')};
  const out=[];
  for(let i=1;i<lines.length;i++){
    const f=splitCSVLine(lines[i]); if(f.length<3) continue;
    const amt=parseFloat((f[ci.amt]||'').replace(',','.')); if(isNaN(amt)) continue;
    const accName=(ci.acc>=0?f[ci.acc]:'').trim()||'N26';
    const partner=(ci.partner>=0?f[ci.partner]:'').trim();
    const typ=(ci.type>=0?f[ci.type]:'').trim();
    const ref=(ci.ref>=0?f[ci.ref]:'').trim();
    const t={date:(f[ci.date]||'').slice(0,10), amount:amt, acc:'N26 '+accName, accName, partner, typ, ref,
             desc:[partner,typ,ref,accName].filter(Boolean).join(' '), src:'csv', refNums:[]};
    t.name=partner||typ||'Transactie';

}

function periodMonths(){

/* ----- BUDGET vs WERKELIJK + variantieanalyse ----- */
function totalBudget(){ const B=SET.budgets||{}; return Object.keys(B).reduce((s,k)=>s+(+B[k]||0),0); }
// is een categorie grotendeels een vaste last? (budget schaalt dan niet mee met inkomen)
function isFixedCat(k){ return FIXED_CATS.has(k)||k==='vervoer'||k==='zorg'; }
// dynamisch maandbudget: vaste categorieën constant, variabele categorieën geschaald naar de
// bestedingsruimte (70%) van het inkomen van DEZE maand → meer inkomen = meer variabel budget.
function effectiveBudgets(m){
  const B=SET.budgets||{}, room=totals(m).budget;
  let fixedB=0, varB=0;
  for(const k in B){ if(+B[k]<=0) continue; if(isFixedCat(k)) fixedB+=+B[k]; else varB+=+B[k]; }
  const varRoom=Math.max(room-fixedB,0), scaleV = varB>0 ? varRoom/varB : 0;
  const out={};
  for(const k in B){ if(+B[k]<=0) continue; out[k]= isFixedCat(k) ? +B[k] : Math.max(Math.round((+B[k])*scaleV/5)*5,0); }
  return {out, room, fixedB:Math.round(fixedB), varRoom:Math.round(varRoom), scaleV};
}
function setCatBudget(k,val){ SET.budgets=SET.budgets||{}; if(val===''||+val<=0) delete SET.budgets[k]; else SET.budgets[k]=+val; save(); renderIns(); } // settings niet herrenderen (focus)
// budgetvoorstel met VASTE LASTEN als vertrekpunt:
// - vaste lasten op historisch niveau (committed, niet schalen)
// - resterende bestedingsruimte verdeeld over variabele lasten (die je zelf beïnvloedt)
function suggestBudgets(){
  const ms=months(), med=a=>{const s=a.filter(x=>x>0).sort((x,y)=>x-y);return s.length?s[Math.floor(s.length/2)]:0;};
  const inc = SET.autoIncome ? baseIncome() : (+SET.income||0);
  const room = inc*SET.limit/100;
  const histF={}, histV={};
  for(const k of Object.keys(CATS)){ if(CATS[k].type!=='expense'||k==='overig') continue;
    const fArr=[], vArr=[];
    for(const m of ms){ let f=0,v=0; for(const t of txOfMonth(m)){ if(catOf(t)===k && t.amount<0){ if(isFixed(t)) f+=-t.amount; else v+=-t.amount; } } fArr.push(f); vArr.push(v); }
    histF[k]=med(fArr); histV[k]=med(vArr);
  }
  const totalFixed=Object.values(histF).reduce((a,b)=>a+b,0);
  const totalVar=Object.values(histV).reduce((a,b)=>a+b,0);
  const remaining=Math.max(room-totalFixed,0);
  const scaleV = totalVar>0 ? Math.min(remaining/totalVar,1) : 0;   // variabel ≤ historisch, past binnen ruimte
  SET.budgets={};
  for(const k of Object.keys(CATS)){ if(CATS[k].type!=='expense'||k==='overig') continue;
    const b=(histF[k]||0)+(histV[k]||0)*scaleV; if(b>=1) SET.budgets[k]=Math.max(Math.round(b/5)*5,5);
  }
  save(); render();
  if(totalFixed>room){
    alert(`Let op: je vaste lasten (€${Math.round(totalFixed)}) zijn al hoger dan je bestedingsruimte (€${Math.round(room)}). Variabele budgetten staan op het minimum. Je vaste lasten verlagen of je inkomen verhogen is nodig om binnen je ${SET.limit}%-norm te blijven.`);
  } else {
    alert(`Voorstel klaar. Vaste lasten ≈ €${Math.round(totalFixed)} (vast), resterende ruimte voor variabele uitgaven ≈ €${Math.round(remaining)}. Pas de variabele categorieën gerust handmatig aan.`);
  }
}
// richtlijn-band o.b.v. % over budget: ≤3% geen actie (marge) · 4–5% monitoren · >5% actie
function budgetBand(bud,act){
  if(!bud) return 'none';
  if(act<=bud) return 'under';
  const o=(act-bud)/bud*100;
  return o<=3?'margin':o<=5?'monitor':'action';
}
function bandColor(b){ return b==='action'?'var(--red)':(b==='monitor'||b==='margin')?'var(--amber)':b==='none'?'var(--mut)':'var(--green)'; }
function renderBudgetActual(m){
  const B=SET.budgets||{}; const setKeys=Object.keys(B).filter(k=>+B[k]>0 && CATS[k] && CATS[k].type==='expense');
  if(!setKeys.length){
    return `<div class="card"><div class="row" style="margin-bottom:6px"><b>${ICON('chart')} Budget vs werkelijk</b></div>
      <div class="small muted" style="margin-bottom:10px">Stel een maandbudget per categorie in om je werkelijke uitgaven eraan te meten — inclusief variantieanalyse.</div>
      <button class="btn sec" onclick="go('set')">Budget instellen</button></div>`;
  }
  const actual=catSpendMap(m);
  const EB=effectiveBudgets(m); const B2=EB.out;   // dynamisch geschaald naar inkomen van deze maand
  const cats=[...new Set([...setKeys, ...Object.keys(actual).filter(k=>CATS[k]&&CATS[k].type==='expense')])];
  const rows=cats.map(k=>({k,bud:+B2[k]||0,act:actual[k]||0})).sort((a,b)=>(b.act-b.bud)-(a.act-a.bud));
  const totB=cats.reduce((s,k)=>s+(+B2[k]||0),0), totA=cats.reduce((s,k)=>s+(actual[k]||0),0);
  const totPct=totB?Math.round(totA/totB*100):0;

function totals(m){
  const list=txOfMonth(m);
  let income=0, spend=0, internal=0;
  const byCat={};
  for(const t of list){
    const c=catOf(t), meta=CATS[c];
    byCat[c]=(byCat[c]||0)+t.amount;
    if(meta.type==='income') income+=Math.max(t.amount,0);
    else if(meta.type==='expense' && t.amount<0) spend+=-t.amount;
    else if(meta.type==='internal') internal+=t.amount;
  }
  let inc, basis;
  if(SET.autoIncome){
    if(income>0){ inc=income; basis='gedetecteerd'; }
    else { inc=baseIncome(); basis = inc>0?'basisnorm':'onbekend'; }
  } else { inc=SET.income||0; basis='handmatig'; }
  const budget = inc*SET.limit/100;
  return {list,income:inc,detectedIncome:income,spend,internal,byCat,budget,incomeBasis:basis};
}
// mediaan maandinkomen (robuuster dan gemiddelde tegen incidentele pieken zoals vakantiegeld)
function avgIncome(){
  const vals=months().map(m=>{let s=0;for(const t of txOfMonth(m)){if(CATS[catOf(t)].type==='income')s+=Math.max(t.amount,0);}return s;}).filter(v=>v>0).sort((a,b)=>a-b);
  return vals.length?vals[Math.floor(vals.length/2)]:0;
}
// basis-inkomen = conservatieve norm over je RECENTE maanden (laatste 6): mediaan van de ONDERSTE helft.
// Recent venster → een salarisverhoging telt meteen mee en oudere/lagere maanden wegen niet meer mee.
// Onderste helft → incidentele pieken (vakantiegeld, dividend, onkosten) blazen je norm niet op.
function baseIncome(){
  if(!SET.autoIncome) return +SET.income||0;
  const recent=months().slice(-6);
  const vals=recent.map(m=>{let s=0;for(const t of txOfMonth(m)){if(CATS[catOf(t)].type==='income')s+=Math.max(t.amount,0);}return s;}).filter(v=>v>0).sort((a,b)=>a-b);
  if(!vals.length) return 0;
  const lower=vals.slice(0,Math.ceil(vals.length/2));
  return Math.round(lower[Math.floor(lower.length/2)]);
}
// vaste/variabele splitsing over een maand
function splitFixedVar(m){ let fixed=0,vari=0;
  for(const x of txOfMonth(m)){ if(x.amount<0 && CATS[catOf(x)].type==='expense'){ if(isFixed(x)) fixed+=-x.amount; else vari+=-x.amount; } }
  return {fixed,vari};
}
// ===== PROGNOSE (lichtgewicht AI: gemiddelden + trend) =====
function monthAgg(m){ let income=0; for(const t of txOfMonth(m)) if(CATS[catOf(t)].type==='income') income+=Math.max(t.amount,0);
  const s=splitFixedVar(m); return {m,income,fixed:s.fixed,vari:s.vari,spend:s.fixed+s.vari,net:income-s.fixed-s.vari}; }
function regSlope(arr){ const n=arr.length; if(n<2) return 0; const xm=(n-1)/2; const ym=arr.reduce((a,b)=>a+b,0)/n; let num=0,den=0;
  for(let i=0;i<n;i++){ num+=(i-xm)*(arr[i]-ym); den+=(i-xm)**2; } return den?num/den:0; }
function nextMonths(m,k){ const out=[]; let [y,mo]=m.split('-').map(Number); for(let i=0;i<k;i++){ mo++; if(mo>12){mo=1;y++;} out.push({y,mo,label:MNAMES[mo-1],full:MFULL[mo-1]+' '+y}); } return out; }
function forecastModel(){
  const ms=months(); if(ms.length<2) return null;
  const agg=ms.map(monthAgg);
  const last=agg.slice(-3); const avg=k=>last.reduce((s,a)=>s+a[k],0)/last.length;
  const vSlope=regSlope(agg.map(a=>a.vari)), sSlope=regSlope(agg.map(a=>a.spend));

function accBalance(acc){ const mb=(SET.manualBal||{})[acc]; if(mb!=null && mb!=='') return +mb; const a=ACCMETA[acc]; return a&&a.balance!=null?a.balance:null; }

// groeperingssleutel voor terugkerende posten (zelfde logica als recurringSchedule)
function recurKey(t){ return (t.name||'').toUpperCase().replace(/[0-9]/g,'').replace(/\s+/g,' ').trim().slice(0,20); }
// terugkerend schema: dag van de maand + mediaan bedrag per vaste last / inkomstenbron
function recurringSchedule(){
  const map={};
  for(const t of TX){ const c=catOf(t), meta=CATS[c]; let type=null;
    if(meta.type==='income' && t.amount>0) type='income';
    else if(meta.type==='expense' && t.amount<0 && isFixed(t)) type='fixed'; else continue;
    const key=recurKey(t);
    if(!key) continue; (map[key]=map[key]||{name:t.name,cat:c,type,occ:[]});
    map[key].occ.push({day:+t.date.slice(8,10), amt:Math.abs(t.amount), ym:t.date.slice(0,7)});
  }
  const med=a=>{const s=[...a].sort((x,y)=>x-y);return s[Math.floor(s.length/2)];};

  const allYms=[...new Set(TX.map(t=>t.date.slice(0,7)))].sort();
  const last3=new Set(allYms.slice(-3));
  const out=[];
  for(const k in map){ const r=map[k];
    // per maand de HOOFDbetaling (grootste bedrag) — zo telt de echte maandlast, niet losse kleine overboekingen
    const byYm={}; for(const o of r.occ){ if(!byYm[o.ym] || o.amt>byYm[o.ym].amt) byYm[o.ym]=o; }
    const mains=Object.values(byYm); if(mains.length<2) continue;
    if(mains.filter(o=>last3.has(o.ym)).length<2) continue;   // niet (meer) actief in recente maanden → overslaan
    out.push({key:k,name:r.name,cat:r.cat,type:r.type,day:med(mains.map(o=>o.day)),amount:med(mains.map(o=>o.amt)),count:r.occ.length}); }
  return out.sort((a,b)=>a.day-b.day);
}
// dag-voor-dag liquiditeitscurve: vaste lasten/inkomen op hun datum + variabele burn
function liquidityDaily(days){
  const sched=recurringSchedule(), f=forecastModel();
  const fix=sched.filter(s=>s.type==='fixed');
  const incItems=sched.filter(s=>s.type==='income');
  const incomeDay=incItems.length?incItems.slice().sort((a,b)=>b.count-a.count)[0].day:25;
  const fInc=f?f.fInc:0, dailyVar=f?f.fVar/30:0;
  const {sum}=totalBalance();
  const start=new Date(); start.setHours(0,0,0,0);
  const dates=[], bal=[], events=[]; let b=sum;
  for(let i=0;i<days;i++){ const d=new Date(start); d.setDate(start.getDate()+i);
    const dom=d.getDate(), last=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
    if(fInc>0 && dom===Math.min(incomeDay,last)){ b+=fInc; events.push({date:new Date(d),name:'Salaris / inkomen (verwacht)',amt:fInc,type:'income'}); }
    for(const s of fix){ if(dom===Math.min(s.day,last)){ b-=s.amount; events.push({date:new Date(d),name:s.name,amt:-s.amount,type:'fixed',cat:s.cat}); } }
    b-=dailyVar; dates.push(new Date(d)); bal.push(b);
  }
  let ti=0; for(let i=1;i<bal.length;i++) if(bal[i]<bal[ti]) ti=i;

// maand-liquiditeit: wat is deze maand NOG niet ontvangen/betaald?
// "Due" = terugkerende post die deze kalendermaand nog niet in je transacties voorkomt
// (niet op basis van de typische dag — die kan al gepasseerd zijn terwijl het bedrag nog moet komen).
function monthLiquidity(){
  const sched=recurringSchedule(), f=forecastModel();
  const now=new Date(); const dom=now.getDate(); const dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const daysLeft=Math.max(dim-dom,0);
  const ym=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  // wat is deze maand al langsgekomen?
  const seen=new Set(); let incomeThisMonth=0;
  for(const t of txOfMonth(ym)){ const k=recurKey(t); if(k) seen.add(k); if(CATS[catOf(t)].type==='income') incomeThisMonth+=Math.max(t.amount,0); }
  const fixDueItems=sched.filter(s=>s.type==='fixed' && !seen.has(s.key));
  const fixDue=fixDueItems.reduce((a,s)=>a+s.amount,0);
  // verwacht inkomen dat nog moet komen = basisinkomen minus wat al deze maand binnen is
  const incDue=Math.max(baseIncome()-incomeThisMonth,0);
  const dailyVar=f?f.fVar/30:0; const varDue=Math.round(dailyVar*daysLeft);
  const {sum,missing}=totalBalance(); const buffer=+SET.buffer||0;
  const projected=Math.round(sum+incDue-fixDue-varDue);
  return {sum,missing,fixDue:Math.round(fixDue),incDue:Math.round(incDue),varDue,daysLeft,projected,buffer,shortfall:Math.round(buffer-projected),fixDueItems};
}

      ${L.incDue>0?`<div class="row" style="padding:5px 0;gap:8px"><span class="small" style="min-width:0">${ICON('coins')} Inkomen nog te komen</span><span class="small" style="font-weight:700;color:var(--green);flex-shrink:0">+${euro(L.incDue)}</span></div>`:''}

      : saveOk ? `Voldoende: je houdt naar verwachting <b>${euro(L.projected)}</b> over — genoeg voor je spaarinleg van <b>${euro0(monthlySaving)}</b>${L.projected>monthlySaving?` plus ${euro0(L.projected-monthlySaving)} extra`:''}.`

// ===== SPAREN & BUFFER (30%-spaardeel → buffer van Nx maanduitgave) =====
// beoogde maandelijkse spaarinleg — instelbaar: automatisch (inkomen − bestedingsruimte), vast bedrag, of %
function monthlySavingTarget(){
  const inc = SET.autoIncome ? baseIncome() : (+SET.income||0);
  const mode = SET.savingMode||'auto';
  if(mode==='amount') return +SET.savingAmount||0;
  if(mode==='percent') return inc*(+SET.savingPercent||0)/100;
  return Math.max(inc - inc*SET.limit/100, 0);
}
function savingLabel(){ const m=SET.savingMode||'auto';
  if(m==='amount') return 'vast bedrag'; if(m==='percent') return (+SET.savingPercent||0)+'% van inkomen';
  return (100-SET.limit)+'% van inkomen'; }
function savingsModel(){
  const inc = SET.autoIncome ? baseIncome() : (+SET.income||0);
  const room = inc*SET.limit/100;
  const monthlySaving = monthlySavingTarget();
  const ms=months(); const med=a=>{const s=a.filter(v=>v>0).sort((x,y)=>x-y);return s.length?s[Math.floor(s.length/2)]:0;};
  const avgSpend=med(ms.map(m=>totals(m).spend));
  const avgFixed=med(ms.map(m=>splitFixedVar(m).fixed));
  const avgVar=med(ms.map(m=>splitFixedVar(m).vari));
  // flexibel bufferdoel
  const basis=SET.bufferBasis||'spend';
  const mult=+SET.bufferMonths||6;
  let baseVal, baseLabel;
  if(basis==='income'){ baseVal=inc; baseLabel='inkomen'; }
  else if(basis==='fixed'){ baseVal=avgFixed; baseLabel='vaste lasten'; }
  else if(basis==='variable'){ baseVal=avgVar; baseLabel='variabele lasten'; }
  else { baseVal=avgSpend; baseLabel='maanduitgave'; }
  const goal = basis==='amount' ? (+SET.bufferAmount||0) : baseVal*mult;
  const {sum:bankBal,missing}=totalBalance();
  const cur=bankBal + (+SET.extraSavings||0);   // + handmatig spaargeld buiten PSD2 (bv. N26 Spaces)
  const pct=goal>0?Math.min(cur/goal*100,100):0;
  const toGo=Math.max(goal-cur,0);
  const monthsLeft= monthlySaving>0? toGo/monthlySaving : 0;
  return {inc,room,monthlySaving,avgSpend,avgFixed,avgVar,basis,mult,baseVal,baseLabel,goal,cur,missing,pct,toGo,monthsLeft};
}
function renderSavings(){
  const S=savingsModel(); if(!S.inc) return '';
  return `<div class="card">
    <div class="row"><b>${ICON('coins')} Sparen & buffer</b><span class="small muted" onclick="go('set')" style="cursor:pointer;color:var(--teal)">doel ›</span></div>

    <div class="goal-row" style="margin-top:12px"><span class="muted">Bufferdoel ${S.basis==='amount'?'(vast bedrag)':`${S.mult}× gem. ${S.baseLabel} (${euro0(S.baseVal)})`}</span><span><b>${euro0(S.cur)}</b><span class="muted"> / ${euro0(S.goal)}</span></span></div>
    <div class="bar-track" style="margin:0"><div class="bar-fill" style="width:${S.pct}%;background:var(--teal)"></div></div>

function renderDash(){
  const ms=months(); if(!ms.length){ $('#s-dash').innerHTML=renderReminder(); return; }
  const now=new Date(); const nowYM=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const m=curMonth||ms[ms.length-1]; const isNow=m===nowYM;
  const t=totals(m);
  const pct=t.budget>0?Math.min(t.spend/t.budget*100,100):(t.spend>0?100:0);
  const pctRaw=t.budget>0?Math.round(t.spend/t.budget*100):0;
  const savedPct=t.income>0?Math.round((t.income-t.spend)/t.income*100):0;
  const monthName=MFULL[+m.slice(5,7)-1];
  // ---- HERO: één getal ----
  let lbl,big,col,sub,status;
  if(isNow){
    const L=monthLiquidity(); const sv=monthlySavingTarget(); const free=L.projected-sv;
    lbl=`Nog vrij te besteden · ${monthName}`;
    col = free<0?'var(--red)':(pctRaw>100?'var(--red)':pctRaw>85?'var(--amber)':'var(--green)');
    big=euro(Math.max(free,0));
    sub = free<0 ? `je haalt je spaardoel ${euro0(sv)} niet — ${euro0(-free)} tekort` : `na vaste lasten én sparen · nog ${L.daysLeft} dgn`;
    status = free<0?`${ICON('warn')} Even opletten` : pctRaw>100?`${ICON('alert')} Over je grens` : pctRaw<70?`${ICON('check')} Op koers` : `${ICON('warn')} Let op je tempo`;
  } else {
    lbl=`${monthName} — over (binnen ${SET.limit}%)`;
    col = pctRaw<100?'var(--green)':'var(--red)';
    big=euro(Math.max(t.budget-t.spend,0));

function cleanMerch(s){ return (s||'').replace(/\s+/g,' ')
  .replace(/^\s*(BEA|GEA|ECOM)[, ]*/i,'')
  .replace(/\b(GOOGLE PAY|APPLE PAY|BETAALPAS|CONTACTLOOS|VIA TIKKIE)\b/gi,'')
  .replace(/\bNR[: ].*$/i,'')
  .replace(/\b(B\.?V\.?|N\.?V\.?|PURMEREND|PURME|AMSTERDAM|ZAANDAM|WEERWAL|KOOIMANPLEIN|HOUTEN|DE MEERN)\b/gi,'')
  .replace(/BCK\*|CCV\*|SUMUP ?\*|ZTL\*/gi,'')
  .replace(/[^A-Za-z0-9 &.\-]/g,'').replace(/\s+/g,' ').trim(); }
function titleCase(s){ return s.replace(/\b([A-Z])([A-Z0-9]+)\b/g,(m,a,b)=>a+b.toLowerCase()); }
function groupMerch(items){ const by={}; for(const x of items){ const disp=cleanMerch(x.name)||'Overig'; const key=disp.toUpperCase(); (by[key]=by[key]||{name:titleCase(disp),n:0,s:0}); by[key].n++; by[key].s+=-x.amount; } return Object.values(by).sort((a,b)=>b.s-a.s); }
function hasRe(items,re){ return items.filter(x=>re.test((x.desc||'')+' '+(x.name||''))); }
function sumNeg(arr){ return arr.reduce((a,b)=>a-b.amount,0); }

function buildAction(k,total,items){
  const M=groupMerch(items), top=M[0], E=v=>euro0(v);
  if(k==='vervoer'){
    const lease=sumNeg(hasRe(items,/HILTERMANN|LEASE/i)), fuel=sumNeg(hasRe(items,/TRAVELCARD|SHELL|ESSO|\bBP |TINQ|TANK/i)), park=hasRe(items,/PARKBEE|PARKEER|PARKING/i), parkS=sumNeg(park), flight=sumNeg(hasRe(items,/KLM|ESKY|TRANSAVIA|RYANAIR|EASYJET/i));
    const steps=[]; let saving=0;
    if(lease>0){ steps.push(`Je leaseauto kost <b>${E(lease)}/mnd</b> (Hiltermann) — veruit je grootste vaste last. Reken bij contractverlenging een kleiner model of budget private-lease door; dat scheelt al snel €75–150/mnd.`); saving+=Math.round(lease*0.12); }
    if(fuel>0){ steps.push(`Tankpas (Travelcard): <b>${E(fuel)}/mnd</b>. Tank bij onbemande pompen (Tinq, TanQyou, Gulf) — zo'n 8% goedkoper.`); saving+=Math.round(fuel*0.08); }
    if(parkS>5){ steps.push(`Parkeren: <b>${E(parkS)}</b> over ${park.length} keer. Gebruik P+R met OV of een parkeervergunning i.p.v. losse ParkBee-sessies.`); saving+=Math.round(parkS*0.5); }
    if(flight>40){ steps.push(`Vluchten/reizen: <b>${E(flight)}</b>. Boek 6–8 weken vooruit en zet prijsalerts aan (Google Flights/Skyscanner).`); }
    return steps.length?{k,headline:lease>0?`lease ${E(lease)}/mnd`:(top?top.name:''),steps,saving}:null;
  }
  if(k==='verzekering'){
    const zorg=sumNeg(hasRe(items,/ZILVEREN KRUIS|ZORGVERZEK/i)), schade=sumNeg(hasRe(items,/ALLIANZ/i)), dela=sumNeg(hasRe(items,/DELA/i));
    const steps=[]; let saving=0;
    if(zorg>0){ steps.push(`Zorgverzekering (Zilveren Kruis): <b>${E(zorg)}/mnd</b>. Stap vóór 31 december over via een vergelijker — gemiddeld €100–300/jaar besparing, en vraag naar collectiviteitskorting.`); saving+=Math.round(zorg*0.1); }
    if(schade>0){ steps.push(`Schade/zakelijk (Allianz): <b>${E(schade)}/mnd</b>. Vraag een nieuwe offerte of verhoog je eigen risico voor een lagere premie.`); saving+=Math.round(schade*0.12); }
    if(dela>0){ steps.push(`Uitvaartverzekering (DELA): controleer of het verzekerde bedrag nog past — verlagen of oversluiten kan lonen.`); }
    return steps.length?{k,headline:`${E(total)} aan polissen`,steps,saving}:null;
  }
  if(k==='abonnement'){
    const subs=M.filter(x=>x.s>=1).slice(0,5);
    return {k,headline:`${items.length} afschrijvingen`,saving:Math.round((subs[subs.length-1]||{}).s||total*0.2),steps:[
      `Je hebt ${items.length} abonnementen voor <b>${E(total)}/mnd</b>${subs.length?`: ${subs.map(s=>s.name.toLowerCase()).slice(0,4).join(', ')}`:''}.`,
      `Zeg er deze week minstens één op die je nauwelijks gebruikt, of deel een gezinsabonnement / kies een goedkoper pakket.`]};
  }
  if(k==='uiteten'){ const n=items.length; return {k,headline:`${n}× uit eten/afhalen`,saving:Math.round(total*0.35),steps:[
    `Je gaf <b>${E(total)}</b> uit aan uit eten & afhalen over ${n} keer (gem. ${euro(total/n)}).`,
    `Kook 2 avonden per week extra thuis i.p.v. afhalen — scheelt ongeveer ${E(total*0.35)}/mnd.`,
    `Geef jezelf een vast “uit eten”-budget en betaal dat vanaf een apart potje.`]}; }
  if(k==='boodschappen'){ const n=items.length; return {k,headline:`${n} trips`,saving:Math.round(total*0.12),steps:[
    `<b>${n} boodschappentrips</b> deze maand (gem. ${euro(total/n)}), vooral bij PLUS, Vomar en Safrana.`,
    `Doe 1 grote weekboodschap met een lijstje i.p.v. veel kleine trips — minder impuls = ~10–15% besparing (≈ ${E(total*0.12)}/mnd).`,
    `Kies vaker huismerk: vaak 20% goedkoper voor hetzelfde product.`]}; }
  if(k==='sport'){ return {k,headline:`abonnement ${E(total)}/mnd`,saving:Math.round(total*0.5),steps:[
    `Sportabonnement <b>${E(total)}/mnd</b> (Health Club). Ga je er minder dan 1×/week heen? Een losse 10-rittenkaart is dan goedkoper.`,
    `Anders: vraag of je het in rustige maanden tijdelijk kunt pauzeren.`]}; }
  if(k==='shopping'){ return {k,headline:`${E(total)} winkelen`,saving:Math.round(total*0.25),steps:[
    `<b>${E(total)}</b> aan winkelen${top?` (o.a. ${top.name})`:''} — grotendeels kleding.`,
    `Stel een maandelijks kledingbudget in en hanteer een 48-uurs wachtregel voor niet-essentiële aankopen.`]}; }
  if(k==='goededoel'){ return {k,headline:`${E(total)} aan giften`,saving:0,steps:[
    `Mooi dat je doneert (${E(total)}/mnd) — niet op bezuinigen. Tip: leg giften vast als periodieke schenking, dan zijn ze aftrekbaar voor de inkomstenbelasting.`]}; }
  return null;
}
function savingsPlan(m){
  const t=totals(m);
  const cats=Object.entries(t.byCat).filter(([k,v])=>CATS[k].type==='expense'&&v<0).map(([k,v])=>[k,-v]).sort((a,b)=>b[1]-a[1]);
  const plan=[];
  for(const [k,total] of cats){
    if(total<25) continue;
    const items=txOfMonth(m).filter(x=>catOf(x)===k && x.amount<0);
    const a=buildAction(k,total,items);
    if(a){ a.total=total; plan.push(a); }
    if(plan.length>=4) break;
  }
  return plan;
}
// status van een actie ('open' default)
function planStatus(k){ return (PLAN[k]||{}).status || 'open'; }
function markAction(k,status,saving){
  const note=(PLAN[k]||{}).note;
  if(status==='open'){ if(note) PLAN[k]={status:'open',note}; else delete PLAN[k]; }
  else { PLAN[k]={status, saving:status==='done'?(+saving||0):((PLAN[k]||{}).saving||0), note, ts:Date.now()}; }
  save(); render();
}
function editNote(k){
  const cur=(PLAN[k]||{}).note||'';
  const v=prompt('Notitie bij deze actie:',cur);
  if(v===null) return;
  const tx=v.trim();
  const cur2=Object.assign({status:'open'},PLAN[k]||{});
  if(tx) cur2.note=tx; else delete cur2.note;
  if(!cur2.note && (cur2.status==='open')) delete PLAN[k]; else PLAN[k]=cur2;
  save(); render();
}

function leverCtx(k,m){
  const items=txOfMonth(m).filter(x=>catOf(x)===k && x.amount<0);
  const total=items.reduce((s,t)=>s-t.amount,0);
  const sub=re=>items.filter(x=>re.test((x.desc||'')+' '+(x.name||''))).reduce((s,t)=>s-t.amount,0);
  return {total, lease:sub(/HILTERMANN|LEASE/i), fuel:sub(/TRAVELCARD|SHELL|ESSO|\bBP |TINQ|TANK/i), park:sub(/PARKBEE|PARKEER|PARKING/i)};
}
function leverSel(k){ return (SET.levers&&SET.levers[k])||[]; }
function leverCustomList(k){ return (SET.leverCustom&&SET.leverCustom[k])||[]; }
function toggleLever(k,id){ SET.levers=SET.levers||{}; const cur=new Set(SET.levers[k]||[]); cur.has(id)?cur.delete(id):cur.add(id); SET.levers[k]=[...cur]; save(); renderActions(); }
function addCustomLever(k){
  const label=prompt('Eigen optie / maatregel:'); if(label===null||!label.trim()) return;
  const amt=prompt('Geschatte besparing per maand (€), laat leeg indien onbekend:');
  SET.leverCustom=SET.leverCustom||{}; SET.leverCustom[k]=(SET.leverCustom[k]||[]).concat([{label:label.trim(),saving:+amt||0}]); save(); renderActions();
}
function removeCustomLever(k,i){ SET.leverCustom=SET.leverCustom||{}; (SET.leverCustom[k]||[]).splice(i,1); save(); renderActions(); }
function leverEffect(k,ctx){
  const defs=LEVERS[k]||[]; const sel=new Set(leverSel(k));
  let eff=defs.filter(l=>sel.has(l.id)).reduce((s,l)=>s+(l.est(ctx)||0),0);
  eff += leverCustomList(k).reduce((s,c)=>s+(+c.saving||0),0);
  return Math.min(Math.round(eff), Math.round(ctx.total*1.05));
}

function buildCoaching(){
  if(!TX.length || SET.coachOff) return '';
  const now=new Date(); const nowYM=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const done=months().filter(m=>m<nowYM).slice(-6);
  if(done.length<2) return '';
  const lim=SET.limit, tgtPct=100-lim, mn=m=>MNAMES[+m.slice(5,7)-1];
  const base=baseIncome(), target=Math.round(monthlySavingTarget());
  const avg=a=>a.length?a.reduce((s,x)=>s+x,0)/a.length:0;
  const rows=done.map(m=>{const t=totals(m);return{m,inc:t.income,sp:t.spend,bud:t.budget,saved:t.income?(t.income-t.spend)/t.income*100:0,savedEur:t.income-t.spend,over:t.spend>t.budget};});
  let streak=0; for(let i=rows.length-1;i>=0;i--){ if(rows[i].over) streak++; else break; }
  const overN=rows.filter(r=>r.over).length;
  const srt=rows.slice().sort((a,b)=>a.saved-b.saved); const worst=srt[0];
  // windfall-afhankelijkheid: sparen in gewone salarismaanden vs meevallermaanden
  const normal=rows.filter(r=>r.inc<=base*1.15), windfall=rows.filter(r=>r.inc>base*1.15);
  const savNormal=Math.round(avg(normal.map(r=>r.savedEur)));
  const windfallDep = normal.length>=1 && windfall.length>=1 && savNormal<target*0.7;
  const spW=Math.round(avg(windfall.map(r=>r.sp))), spN=Math.round(avg(normal.map(r=>r.sp)));
  const lifestyle = windfall.length>=1 && normal.length>=1 && spW>spN*1.12;
  // grootste variabele categorie (gem/mnd)
  const vc={}; for(const m of done){ for(const t of txOfMonth(m)){ if(t.amount<0 && CATS[catOf(t)].type==='expense' && !isFixed(t)){ const k=catOf(t); vc[k]=(vc[k]||0)+(-t.amount);} } }
  const topVar=Object.entries(vc).map(([k,v])=>({k,avg:v/done.length})).sort((a,b)=>b.avg-a.avg)[0];
  // spaarautomatisering die nog als uitgave staat (N26 'Rules')
  const savRx=/monthly rule|weekly rule/i; let savMis=0,savN=0;
  for(const m of done.concat([curMonth])){ for(const t of txOfMonth(m)){ if(t.amount<0 && CATS[catOf(t)].type==='expense' && savRx.test(t.name||'')){ savMis+=-t.amount; savN++; } } }
  // tempo deze maand
  const isNow=curMonth===nowYM; const tCur=totals(curMonth); const de=daysElapsed(curMonth); const el=de.elapsed||1;
  const curPct=tCur.budget?Math.round(tCur.spend/tCur.budget*100):0;
  const projPct=tCur.budget?Math.round((tCur.spend/el*de.dim)/tCur.budget*100):0;
  const pace=(isNow&&curPct>0)?`Dag ${de.today||el}/${de.dim}: je staat op <b>${curPct}%</b> van je ruimte${projPct>105?` — op dit tempo eindig je rond <b style="color:var(--red)">${projPct}%</b>`:''}. `:'';
  // ---- opbouw ----
  const diag=`<div class="small"><b>${ICON('search')} Diagnose.</b> ${streak>=2?`<b>${streak} maanden op rij</b> boven je ${lim}%-grens`:`${overN}/${done.length} maanden boven je ${lim}%-grens`} · gem. ${Math.round(avg(rows.map(r=>r.saved)))}% gespaard (doel ${tgtPct}%). Zwakst: ${mn(worst.m)} — ${euro0(worst.inc)} binnen, ${euro0(worst.sp)} eruit → <b>${Math.round(worst.saved)}%</b>.</div>`;
  const obs1=windfallDep?`<div class="coach bad" style="margin:8px 0"><div class="ic">${ICON('warn')}</div><div class="tx"><b>Je doel hangt aan meevallers.</b> In je gewone salarismaanden zet je gemiddeld maar <b>${euro0(savNormal)}</b> weg — ${euro0(target-savNormal)} ónder je ${euro0(target)}-doel. Je haalt het alleen dankzij dividend/vakantiegeld.</div></div>`:'';
  const obs2=(!windfallDep&&lifestyle)?`<div class="coach warn" style="margin:8px 0"><div class="ic">${ICON('warn')}</div><div class="tx"><b>Lifestyle inflation.</b> Je rijkere maanden zijn ook je dúurste (gem. ${euro0(spW)} vs ${euro0(spN)}). Extra geld gaat op, niet naar je buffer.</div></div>`:'';
  const savFix=savN>=2?`<div class="coach info" style="margin:8px 0"><div class="ic">${ICON('tag')}</div><div class="tx"><b>${euro0(savMis)} aan 'Rule'-overboekingen staat als uitgave.</b> Dat is je eigen sparen — het maakt je cijfers slechter dan ze zijn. <span style="color:var(--teal);cursor:pointer;font-weight:700" onclick="fixSavingsRules()">los op met 1 tik ›</span></div></div>`:'';
  const vraag=topVar?`<div class="small" style="margin:8px 0"><b>${ICON('bulb')} Vraag.</b> ${CATS[topVar.k].name} kost je gem. <b>${euro0(topVar.avg)}/mnd</b>. Zou je dat vandaag, vanaf nul, opnieuw zo kiezen? <span style="color:var(--teal);cursor:pointer" onclick="openCategory('${topVar.k}')">bekijk ›</span></div>`:'';
  const acties=`<div class="small muted" style="font-weight:600;margin:12px 0 6px">${ICON('check')} Je 3 grootste hefbomen</div>
    <div class="coach" style="margin:0 0 6px"><div class="ic">1</div><div class="tx"><b>Sparen eerst.</b> €${target}/mnd automatisch weg op je salarisdag — vóór je het kunt uitgeven. Dan zijn je gewone maanden niet meer afhankelijk van meevallers.</div></div>

  return `<div class="card">
    <div class="row" style="margin-bottom:6px"><b>${ICON('target')} Coach</b><span class="small muted">laatste ${done.length} mnd</span></div>
    ${diag}${obs1}${obs2}${savFix}${vraag}${acties}${acc}
  </div>`;
}

function computeStreak(dagdoel){
  if(!(dagdoel>0)||!TX.length) return 0;
  const byDay={}; let first='9999-99-99';
  for(const x of TX){ if(x.date<first) first=x.date; if(x.amount<0 && CATS[catOf(x)].type==='expense' && !isFixed(x)){ byDay[x.date]=(byDay[x.date]||0)+(-x.amount); } }
  const today=new Date(); today.setHours(0,0,0,0); let streak=0;
  for(let i=1;i<=120;i++){ const d=new Date(today); d.setDate(d.getDate()-i); const ds=d.toISOString().slice(0,10);
    if(ds<first) break;
    if((byDay[ds]||0)<=dagdoel) streak++; else break;
  }
  return streak;
}

/* ----- VASTE vs VARIABELE LASTEN ----- */
const FIXED_CATS=new Set(['verzekering','studie','sport','abonnement','bankkosten','persoonlijk']);
function isFixed(t){
  const U=(t.desc||'').toUpperCase(), cat=catOf(t);
  if(/TRAVELCARD|PARKBEE|TANK|SHELL|ESSO|GELDMAAT/.test(U)) return false;       // brandstof/parkeren/opname = variabel
  if(FIXED_CATS.has(cat)) return true;
  if(cat==='zorg' && /INCASSO|ZILVEREN KRUIS|PREMIE/.test(U)) return true;       // zorgpremie = vast, losse zorg = variabel
  if(/HILTERMANN|LEASECONTRACT/.test(U)) return true;                            // leaseauto
  if(/INCASSO ALGEMEEN DOORLOPEND|PERIODIEKE OVERB|HUUR|HYPOTHEEK|BASISPAKKET|DUO /.test(U)) return true;
  return false;
}
function renderFixedVariable(list, inc){
  const items=list.filter(x=>x.amount<0 && CATS[catOf(x)].type==='expense');
  let fixed=0,vari=0; for(const x of items){ if(isFixed(x)) fixed+=-x.amount; else vari+=-x.amount; }
  inc=inc||0; const spend=fixed+vari, over=Math.max(inc-spend,0);
  const pc=v=>inc?Math.round(v/inc*100):0;
  const w=v=>inc?Math.max(v/inc*100,0):(spend?v/spend*100:0);
  return `<div class="card">
    <div class="row"><b>Vaste vs variabele lasten</b><span class="small muted">% van inkomen</span></div>
    <div class="stack">
      <div style="width:${w(fixed)}%;background:var(--blue)">${pc(fixed)>=8?pc(fixed)+'%':''}</div>
      <div style="width:${w(vari)}%;background:var(--amber)">${pc(vari)>=8?pc(vari)+'%':''}</div>
      <div style="width:${w(over)}%;background:var(--teal)">${pc(over)>=8?pc(over)+'%':''}</div>
    </div>
    <div class="fv-row"><span class="dot" style="background:var(--blue)"></span><span class="nm">${ICON('lock')} Vaste lasten</span><span class="amt">${euro(fixed)}</span><span class="pc">${pc(fixed)}%</span></div>
    <div class="fv-row"><span class="dot" style="background:var(--amber)"></span><span class="nm">${ICON('cart')} Variabele uitgaven</span><span class="amt">${euro(vari)}</span><span class="pc">${pc(vari)}%</span></div>
    <div class="fv-row"><span class="dot" style="background:var(--teal)"></span><span class="nm">${ICON('coins')} Overgehouden</span><span class="amt">${euro(over)}</span><span class="pc">${pc(over)}%</span></div>
    <div class="small muted" style="margin-top:6px">Vaste lasten liggen grotendeels vast (verzekeringen, lease, abonnementen, studie). Op je <b>variabele</b> uitgaven kun je het snelst sturen.</div>
  </div>`;
}

  const merch=all.slice(0,15); const max=merch[0].s;
  const exp=!!SET.expandMerch; const shown=exp?merch:merch.slice(0,3);
  const toggle=merch.length>3?`<button class="snz" onclick="toggleExpand('expandMerch')">${exp?'minder ▲':'toon top '+merch.length+' ▼'}</button>`:'';
  return `<div class="card">
    <div class="row" style="margin-bottom:10px"><b>${ICON('store')} Top winkels & leveranciers</b><span class="small muted">${label||'deze maand'}</span></div>
    ${shown.map(x=>{const cat=catBestFor(items,x.name);const c=CATS[cat]||CATS.overig;return `

  </div>`;
}
function catBestFor(items,merchName){ const u=merchName.toUpperCase(); const it=items.find(x=>cleanMerch(x.name).toUpperCase()===u); return it?catOf(it):'overig'; }

function drillMonth(m){ curMonth=m; SET.insPeriod='month'; save(); render(); }
function gotoCurrentMonth(){ const ms=months(); const now=new Date(); const ym=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0'); curMonth = ms.includes(ym)?ym:ms[ms.length-1]; SET.insPeriod='month'; save(); render(); }

function catSpendMap(m){ const by={}; for(const t of txOfMonth(m)){ if(t.amount<0 && CATS[catOf(t)].type==='expense') by[catOf(t)]=(by[catOf(t)]||0)+(-t.amount); } return by; }
function merchSpendMap(m){ const items=txOfMonth(m).filter(x=>x.amount<0 && CATS[catOf(x)].type==='expense'); const by={}; for(const x of groupMerch(items)) by[x.name.toUpperCase()]={name:x.name,s:x.s}; return by; }
// vergelijking huidige maand vs vorige: waar bespaard / meer uitgegeven
function openCompare(prev){
  const cur=curMonth;
  const cn=catSpendMap(cur), cp=catSpendMap(prev);
  const ck=[...new Set([...Object.keys(cn),...Object.keys(cp)])];
  const cds=ck.map(k=>({k,d:(cn[k]||0)-(cp[k]||0)})).filter(x=>Math.abs(x.d)>=2).sort((a,b)=>a.d-b.d);
  const mn=merchSpendMap(cur), mp=merchSpendMap(prev);
  const mk=[...new Set([...Object.keys(mn),...Object.keys(mp)])];
  const mds=mk.map(k=>({k,name:(mn[k]||mp[k]).name,d:(mn[k]?mn[k].s:0)-(mp[k]?mp[k].s:0)})).filter(x=>Math.abs(x.d)>=5);
  const saved=mds.filter(x=>x.d<0).sort((a,b)=>a.d-b.d).slice(0,6);
  const more=mds.filter(x=>x.d>0).sort((a,b)=>b.d-a.d).slice(0,6);
  const net=Object.values(cn).reduce((a,b)=>a+b,0)-Object.values(cp).reduce((a,b)=>a+b,0);
  const row=(name,icon,d,color)=>`<div class="tx" style="cursor:default"><div class="ava" style="background:${color}22">${icon}</div><div class="info"><div class="nm">${esc(name)}</div></div><div class="amt" style="color:${color};font-weight:700">${d<0?'−':'+'}${euro(Math.abs(d))}</div></div>`;
  $('#sheet').innerHTML=`<div class="grab"></div>
    <div class="center" style="margin-bottom:8px"><div style="font-weight:800;font-size:16px">${monthLabel(cur)} vs ${monthLabel(prev)}</div>
      <div style="font-size:20px;font-weight:800;margin:5px 0;color:${net<=0?'var(--green)':'var(--red)'}">${net<=0?'▼ '+euro(-net)+' minder uitgegeven':'▲ '+euro(net)+' meer uitgegeven'}</div></div>
    <div class="small muted" style="margin:10px 0 4px">Verschil per categorie (groen = bespaard)</div>
    ${cds.length?cds.map(x=>row(CATS[x.k].name,CATS[x.k].icon,x.d,x.d<0?'var(--green)':'var(--red)')).join(''):'<div class="muted small">Geen noemenswaardig verschil.</div>'}
    ${saved.length?`<div class="small muted" style="margin:16px 0 4px">${ICON('check')} Meest bespaard per winkel/leverancier</div>${saved.map(x=>row(x.name,ICON('store'),x.d,'var(--green)')).join('')}`:''}
    ${more.length?`<div class="small muted" style="margin:16px 0 4px">${ICON('trend')} Meer uitgegeven per winkel/leverancier</div>${more.map(x=>row(x.name,ICON('store'),x.d,'var(--red)')).join('')}`:''}`;
  $('#sheetBg').classList.add('show');
}
// variabele uitgaven per weekdag
function renderWeekdayPattern(list){
  const items=list.filter(x=>x.amount<0 && CATS[catOf(x)].type==='expense' && !isFixed(x));
  if(items.length<5) return '';
  const sum=[0,0,0,0,0,0,0], cnt=[0,0,0,0,0,0,0], names=['ma','di','wo','do','vr','za','zo'];
  for(const x of items){ const idx=(new Date(x.date).getDay()+6)%7; sum[idx]+=-x.amount; cnt[idx]++; }
  const max=Math.max(...sum,1), peak=sum.indexOf(max), totalV=sum.reduce((a,b)=>a+b,0);
  const weekend=sum[5]+sum[6], wkPct=totalV?Math.round(weekend/totalV*100):0;
  return `<div class="card">
    <div class="row" style="margin-bottom:4px"><b>${ICON('cal')} Variabele uitgaven per weekdag</b></div>
    <div class="small muted">Wanneer geef je je vrij besteedbare geld uit?</div>
    <div class="spark" style="margin-top:16px">${sum.map((v,i)=>`
      <div class="b" style="height:${Math.max(v/max*100,3)}%;background:${i===peak?'var(--amber)':'var(--teal-d)'}">
        <span class="val">${v>0?euro0(v):''}</span><span class="lab">${names[i]}</span></div>`).join('')}</div>
    <div style="height:20px"></div>
    <div class="small muted">Piekdag: <b>${['maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag','zondag'][peak]}</b> (${euro0(max)}). In het weekend gaat <b>${wkPct}%</b> van je variabele uitgaven op.</div>
  </div>`;
}

/* ----- COACH (lichtgewicht AI-regels) ----- */
function coachTips(m){
  const t=totals(m), tips=[];
  const ms=months(), idx=ms.indexOf(m), prev=idx>0?ms[idx-1]:null;
  const pct = t.budget>0?t.spend/t.budget*100:0;
  const items = t.list.filter(x=>x.amount<0 && CATS[catOf(x)].type==='expense');
  const push=(pri,type,ic,msg,act)=>tips.push({pri,t:type,ic,m:msg,act:act||"go('act')"});
  // inkomen-setup
  if(t.budget<=0) push(9,'info',ICON('gear'),`Geen inkomen herkend voor deze maand. Stel je <b>vast inkomen</b> in bij Instellingen voor een kloppend budget.`,"go('set')");
  // budgetstatus
  if(t.budget>0){
    if(pct<70) push(5,'good',ICON('party'),`Je zit op <b>${Math.round(pct)}%</b> van je bestedingsruimte — ruim binnen je ${SET.limit}%-norm.`);
    else if(pct<100) push(6,'warn','⏳',`Je zit op <b>${Math.round(pct)}%</b> van je ${SET.limit}%-grens — nog ${euro(t.budget-t.spend)} ruimte.`);
    else push(9,'bad',ICON('alert'),`Je zit <b>${euro(t.spend-t.budget)}</b> boven je ${SET.limit}%-grens (${Math.round(pct)}%). Dit gaat ten koste van je spaardoel.`);
  }
  // vaste lasten als % van inkomen
  const sv=splitFixedVar(m);
  if(t.income>0 && sv.fixed>0){ const fr=Math.round(sv.fixed/t.income*100);
    push(fr>50?7:3, fr>50?'warn':'info',ICON('lock'),`Je vaste lasten zijn <b>${fr}%</b> van je inkomen (${euro0(sv.fixed)}/mnd). ${fr>50?'Dat is hoog — weinig ruimte om te sparen.':'Een gezond niveau.'}`,"openFixedDue()");
  }
  // spaarresultaat deze maand
  const saved=t.income-t.spend, target=monthlySavingTarget();
  if(t.income>0 && target>0){
    if(saved>=target) push(6,'good',ICON('coins'),`Je spaarde deze maand <b>${euro0(saved)}</b> — je haalt je doel van ${euro0(target)}.`);
    else if(saved>0) push(7,'warn',ICON('coins'),`Je spaarde <b>${euro0(saved)}</b>, ${euro0(target-saved)} minder dan je doel van ${euro0(target)}.`);
    else push(8,'bad',ICON('coins'),`Je gaf <b>meer uit dan er binnenkwam</b> (${euro0(-saved)} tekort) — geen ruimte om te sparen deze maand.`);
  }
  // grootste stijger vs vorige maand
  if(prev){ const pt=totals(prev); let big=null;
    for(const k in t.byCat){ if(CATS[k].type!=='expense') continue; const nw=-Math.min(t.byCat[k],0), bef=-Math.min(pt.byCat[k]||0,0);
      if(bef>5 && nw>bef*1.2 && (nw-bef)>20){ const d=nw-bef; if(!big||d>big.d) big={k,nw,bef,d,pct:Math.round((nw/bef-1)*100)}; } }
    if(big) push(6,'warn',CATS[big.k].icon,`<b>${CATS[big.k].name}</b> steeg ${big.pct}% t.o.v. ${MFULL[+prev.slice(5,7)-1]} (${euro0(big.bef)} → ${euro0(big.nw)}).`,`openVariance('${big.k}')`);
  }
  // top uitgavebestemming
  const merch=groupMerch(items)[0];
  if(merch && merch.s>50) push(4,'info',ICON('store'),`Je grootste uitgavebestemming: <b>${esc(merch.name)}</b> (${euro0(merch.s)}, ${merch.n}×).`,"go('tx')");
  // weekdag-piek (variabel)
  const varItems=items.filter(x=>!isFixed(x));
  if(varItems.length>=6){ const sum=[0,0,0,0,0,0,0]; for(const x of varItems) sum[(new Date(x.date).getDay()+6)%7]+=-x.amount;
    const peak=sum.indexOf(Math.max(...sum)); const names=['maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag','zondag'];
    if(sum[peak]>0) push(3,'info',ICON('cal'),`Je geeft je variabele geld het meest uit op <b>${names[peak]}</b> (${euro0(sum[peak])} deze maand).`,"openVarTx()");
  }
  // abonnementen
  const subs=items.filter(x=>catOf(x)==='abonnement');
  if(subs.length>=2){ const s=subs.reduce((a,b)=>a-b.amount,0); push(4,'info',ICON('repeat'),`<b>${subs.length} abonnementen</b> kosten samen ${euro0(s)} deze maand — één opzeggen bespaart direct.`,"openCategory('abonnement')"); }
  // grootste enkele uitgave
  const biggest=items.slice().sort((a,b)=>a.amount-b.amount)[0];
  if(biggest && -biggest.amount>=100) push(2,'info',ICON('card'),`Je grootste enkele uitgave: <b>${esc(biggest.name)}</b> ${euro0(-biggest.amount)}.`,`openSheet('${biggest.id}')`);
  // buffer-ETA
  const S=savingsModel(); if(S.toGo>0 && S.monthlySaving>0 && S.cur>0) push(4,'info',ICON('target'),`Bij ${euro0(S.monthlySaving)}/mnd bereik je je buffer (${euro0(S.goal)}) over ±<b>${Math.round(S.monthsLeft)} maanden</b>.`);
  // ongecategoriseerd
  const uncat=items.filter(x=>catOf(x)==='overig').length;
  if(uncat>=5) p
