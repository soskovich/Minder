/* ----- DASHBOARD KPI-WIDGETS (compact, met drill-down naar Inzichten) ----- */
// maand-liquiditeit: wat is deze maand NOG niet ontvangen/betaald?
// "Due" = terugkerende post die deze kalendermaand nog niet in je transacties voorkomt
// (niet op basis van de typische dag, die kan al gepasseerd zijn terwijl het bedrag nog moet komen).
function monthLiquidity(){
  const sched=recurringSchedule(), f=forecastModel();
  const now=new Date(); const dom=now.getDate(); const dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const daysLeft=Math.max(dim-dom,0);
  const ym=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  // wat is deze maand al langsgekomen?
  const seen=new Set(); let incomeThisMonth=0;
  for(const t of txOfMonth(ym)){ const k=recurKey(t); if(k) seen.add(k); if(CATS[catOf(t)].type==='income') incomeThisMonth+=Math.max(t.amount,0); }
  // maandelijkse vaste last die deze maand nog niet langskwam = komt deze maand nog (de afschrijfdatum kan een paar dagen variëren,
  // dus niet uitsluiten omdat de voorspelde dag al voorbij is). Kwartaal/jaar blijven op de voorspelde maand.
  const fixDueItems=sched.filter(s=>{
    if(s.type!=='fixed' || seen.has(s.key) || !s.incasso) return false;
    if(s.intervalM===1) return true;
    return s.nextDate.getFullYear()===now.getFullYear() && s.nextDate.getMonth()===now.getMonth();
  });
  // robuust vangnet: vaste lasten die VORIGE maand langskwamen maar deze maand nog niet (vangt incasso's die het strikte schema mist door wisselende omschrijvingen of korte historie)
  try{ const _ms=months(); const _idx=_ms.indexOf(ym); const _prev=_idx>0?_ms[_idx-1]:null;
    if(_prev){ const _have=new Set(fixDueItems.map(s=>s.key)); const _byk={};
      for(const t of txOfMonth(_prev)){ if(t.amount<0 && isFixed(t) && isIncasso(t)){ const k=recurKey(t); if(!k) continue; const dd=+t.date.slice(8,10); const e=(_byk[k]=_byk[k]||{amt:0,name:t.name,day:dd}); e.amt+=-t.amount; if(dd>e.day) e.day=dd; } }
      for(const k in _byk){ if(seen.has(k)||_have.has(k)) continue; const it=_byk[k]; if(it.amt<5) continue; fixDueItems.push({key:k,name:it.name,amount:Math.round(it.amt),day:it.day,type:'fixed',intervalM:1}); }
    } }catch(_){}
  // provider-dedupe: schreef ditzelfde bedrijf deze maand al iets af (ook een afwijkend/incidenteel bedrag), dan die vaste last niet nog eens voorspellen
  try{ const _cl=x=>(x||'').toUpperCase().replace(/[0-9]/g,'').replace(/[^A-Z ]/g,'').replace(/\s+/g,' ').trim();
    const _paid=txOfMonth(ym).filter(t=>t.amount<0).map(t=>_cl(t.name)).filter(x=>x.length>=5);
    const _match=name=>{ const a=_cl(name); if(a.length<5) return false; return _paid.some(bb=>{ const sh=a.length<=bb.length?a:bb, lo=a.length<=bb.length?bb:a; return sh.length>=5 && lo.startsWith(sh.slice(0,Math.min(sh.length,16))); }); };
    for(let i=fixDueItems.length-1;i>=0;i--){ if(_match(fixDueItems[i].name)) fixDueItems.splice(i,1); }
  }catch(_){}
  const fixDue=fixDueItems.reduce((a,s)=>a+s.amount,0);
  // verwacht inkomen dat nog moet komen = basisinkomen minus wat al deze maand binnen is
  const incDue=Math.max(baseIncome()-incomeThisMonth,0);
  // variabel resterend = tempo-bewust: blend historisch gemiddelde (per dag) met je werkelijke tempo deze maand
  const spentVarMtd=splitFixedVar(ym).vari;        // al variabel uitgegeven deze maand
  const elapsedM=Math.max(dom,1);
  const histDaily=f?f.fVar/dim:0;                  // historisch gemiddelde per dag (werkelijke dagen in de maand)
  const actualDaily=spentVarMtd/elapsedM;          // jouw tempo deze maand
  const wPace=Math.min(elapsedM/dim,1);            // later in de maand telt je eigen tempo zwaarder
  const dailyVar=(elapsedM>=3)?(wPace*actualDaily+(1-wPace)*histDaily):histDaily;
  const varDue=Math.round(dailyVar*daysLeft);
  const {sum,missing}=totalBalance(); const buffer=+SET.buffer||0;
  const projected=Math.round(sum+incDue-fixDue-varDue);
  return {sum,missing,fixDue:Math.round(fixDue),incDue:Math.round(incDue),varDue,daysLeft,projected,buffer,shortfall:Math.round(buffer-projected),fixDueItems};
}
// Veilig te besteden = saldo - nog-niet-betaalde vaste lasten deze maand - nog gereserveerde potjes (budget minus al uitgegeven)
function safeToSpend(){
  const tb=totalBalance(); const L=monthLiquidity();
  const now=new Date(); const ym=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const sp=catSpendMap(ym); const B=SET.budgets||{};
  let reserved=0; for(const k in B){ const bud=+B[k]||0; if(bud>0) reserved+=Math.max(bud-(sp[k]||0),0); }
  // spaardoel: reserveer het deel van je maanddoel dat nog niet opzij is gezet (al gespaard = 'sparen'-categorie deze maand)
  let saveRemaining=0; try{ const saveTarget=monthlySavingTarget(); let savedThisMonth=0; for(const t of txOfMonth(ym)){ if(t.amount<0 && catOf(t)==='sparen') savedThisMonth+=-t.amount; } saveRemaining=Math.max(Math.round(saveTarget-savedThisMonth),0); }catch(_){ }
  return {saldo:tb.sum, missing:tb.missing, fixDue:L.fixDue, reserved:Math.round(reserved), saveReserved:saveRemaining, safe:Math.round(tb.sum-L.fixDue-reserved-saveRemaining)};
}
function renderLiquidityKPI(){
  // liquiditeit is altijd 'vanaf nu vooruit' → alleen zinvol op de lopende/laatste maand
  const ms=months(), latest=ms[ms.length-1];

// beoogde maandelijkse spaarinleg, instelbaar: automatisch (inkomen − bestedingsruimte), vast bedrag, of %
function monthlySavingTarget(){
  const inc = SET.autoIncome ? baseIncome() : (+SET.income||0);
  const mode = SET.savingMode||'auto';
  if(mode==='amount') return +SET.savingAmount||0;
  if(mode==='percent') return inc*(+SET.savingPercent||0)/100;
  return Math.max(inc - monthBudget(inc), 0);
}
function savingLabel(){ const m=SET.savingMode||'auto';
  if(m==='amount') return 'vast bedrag'; if(m==='percent') return (+SET.savingPercent||0)+'% van inkomen';
  return (100-SET.limit)+'% van inkomen'; }
function savingsModel(){
  const inc = SET.autoIncome ? baseIncome() : (+SET.income||0);
  const room = monthBudget(inc);
  const monthlySaving = monthlySavingTarget();
  const ms=months(); const med=a=>{const s=a.filter(v=>v>0).sort((x,y)=>x-y);return s.length?s[Math.floor(s.length/2)]:0;};
  const avgSpend=med(ms.map(m=>totals(m).spend));
  const avgFixed=med(ms.map(m=>splitFixedVar(m).fixed));
  const avgVar=med(ms.map(m=>splitFixedVar(m).vari));
  // flexibel bufferdoel
  const basis=SET.bufferBasis||'spend';
  const mult=+SET.bufferMonths||6;
  let baseVal, baseLabel;
  if(basis==='income'){ baseVal=inc; baseLabel='inkomen'; }
  else if(basis==='fixed'){ baseVal=avgFixed; baseLabel='vaste lasten'; }
  else if(basis==='variable'){ baseVal=avgVar; baseLabel='variabele lasten'; }
  else { baseVal=avgSpend; baseLabel='maanduitgave'; }
  const goal = basis==='amount' ? (+SET.bufferAmount||0) : baseVal*mult;
  const {sum:bankBal,missing}=totalBalance();
  const cur=bankBal + (+SET.extraSavings||0);   // + handmatig spaargeld buiten PSD2 (bv. N26 Spaces)
  const pct=goal>0?Math.min(cur/goal*100,100):0;
  const toGo=Math.max(goal-cur,0);
  const monthsLeft= monthlySaving>0? toGo/monthlySaving : 0;
  return {inc,room,monthlySaving,avgSpend,avgFixed,avgVar,basis,mult,baseVal,baseLabel,goal,cur,missing,pct,toGo,monthsLeft};
}
function renderSavings(){
  const S=savingsModel(); if(!S.inc) return '';
  return `<div class="card">

function cleanMerch(s){ return (s||'').replace(/\s+/g,' ')
  .replace(/^\s*(BEA|GEA|ECOM)[, ]*/i,'')
  .replace(/\b(GOOGLE PAY|APPLE PAY|BETAALPAS|CONTACTLOOS|VIA TIKKIE)\b/gi,'')
  .replace(/\bNR[: ].*$/i,'')
  .replace(/\b(B\.?V\.?|N\.?V\.?|PURMEREND|PURME|AMSTERDAM|ZAANDAM|WEERWAL|KOOIMANPLEIN|HOUTEN|DE MEERN)\b/gi,'')
  .replace(/BCK\*|CCV\*|SUMUP ?\*|ZTL\*/gi,'')
  .replace(/[^A-Za-z0-9 &.\-]/g,'').replace(/\s+/g,' ').trim(); }
function titleCase(s){ return s.replace(/\b([A-Z])([A-Z0-9]+)\b/g,(m,a,b)=>a+b.toLowerCase()); }
function groupMerch(items){ const by={}; for(const x of items){ const disp=cleanMerch(x.name)||'Overig'; const key=disp.toUpperCase(); (by[key]=by[key]||{name:titleCase(disp),n:0,s:0}); by[key].n++; by[key].s+=-x.amount; } return Object.values(by).sort((a,b)=>b.s-a.s); }
function hasRe(items,re){ return items.filter(x=>re.test((x.desc||'')+' '+(x.name||''))); }
function sumNeg(arr){ return arr.reduce((a,b)=>a-b.amount,0); }

function buildAction(k,total,items){
  const M=groupMerch(items), top=M[0], E=v=>euro0(v);
  if(k==='vervoer'){
    const lease=sumNeg(hasRe(items,/HILTERMANN|LEASE/i)), fuel=sumNeg(hasRe(items,/TRAVELCARD|SHELL|ESSO|\bBP |TINQ|TANK/i)), park=hasRe(items,/PARKBEE|PARKEER|PARKING/i), parkS=sumNeg(park), flight=sumNeg(hasRe(items,/KLM|ESKY|TRANSAVIA|RYANAIR|EASYJET/i));
    const steps=[]; let saving=0;
    if(lease>0){ steps.push(`Je leaseauto kost <b>${E(lease)}/mnd</b> (Hiltermann). Dat is veruit je grootste vaste last. Reken bij contractverlenging een kleiner model of budget private-lease door. Dat scheelt al snel €75 tot €150 per maand.`); saving+=Math.round(lease*0.12); }
    if(fuel>0){ steps.push(`Tankpas (Travelcard): <b>${E(fuel)}/mnd</b>. Tank bij onbemande pompen zoals Tinq, TanQyou of Gulf. Dat is een stuk goedkoper.`); saving+=Math.round(fuel*0.08); }
    if(parkS>5){ steps.push(`Parkeren: <b>${E(parkS)}</b> over ${park.length} keer. Gebruik P+R met OV of een parkeervergunning i.p.v. losse ParkBee-sessies.`); saving+=Math.round(parkS*0.5); }
    if(flight>40){ steps.push(`Vluchten/reizen: <b>${E(flight)}</b>. Boek 6–8 weken vooruit en zet prijsalerts aan (Google Flights/Skyscanner).`); }
    return steps.length?{k,headline:lease>0?`lease ${E(lease)}/mnd`:(top?top.name:''),steps,saving}:null;
  }
  if(k==='verzekering'){
    const zorg=sumNeg(hasRe(items,/ZILVEREN KRUIS|ZORGVERZEK/i)), schade=sumNeg(hasRe(items,/ALLIANZ/i)), dela=sumNeg(hasRe(items,/DELA/i));
    const steps=[]; let saving=0;
    if(zorg>0){ steps.push(`Zorgverzekering (Zilveren Kruis): <b>${E(zorg)}/mnd</b>. Stap vóór 31 december over via een vergelijker. Dat scheelt gemiddeld €100 tot €300 per jaar, en vraag ook naar collectiviteitskorting.`); saving+=Math.round(zorg*0.1); }
    if(schade>0){ steps.push(`Schade/zakelijk (Allianz): <b>${E(schade)}/mnd</b>. Vraag een nieuwe offerte of verhoog je eigen risico voor een lagere premie.`); saving+=Math.round(schade*0.12); }
    if(dela>0){ steps.push(`Uitvaartverzekering (DELA): controleer of het verzekerde bedrag nog past. Verlagen of oversluiten kan lonen.`); }
    return steps.length?{k,headline:`${E(total)} aan polissen`,steps,saving}:null;
  }
  if(k==='abonnement'){
    const subs=M.filter(x=>x.s>=1).slice(0,5);
    return {k,headline:`${items.length} afschrijvingen`,saving:Math.round((subs[subs.length-1]||{}).s||total*0.2),steps:[
      `Je hebt ${items.length} abonnementen voor <b>${E(total)}/mnd</b>${subs.length?`: ${subs.map(s=>s.name.toLowerCase()).slice(0,4).join(', ')}`:''}.`,
      `Zeg er deze week minstens één op die je nauwelijks gebruikt, of deel een gezinsabonnement / kies een goedkoper pakket.`]};
  }
  if(k==='uiteten'){ const n=items.length; return {k,headline:`${n}× uit eten/afhalen`,saving:Math.round(total*0.35),steps:[
    `Je gaf <b>${E(total)}</b> uit aan uit eten & afhalen over ${n} keer (gem. ${euro(total/n)}).`,
    `Kook 2 avonden per week extra thuis in plaats van afhalen. Dat scheelt ongeveer ${E(total*0.35)} per maand.`,
    `Geef jezelf een vast “uit eten”-budget en betaal dat vanaf een apart potje.`]}; }
  if(k==='boodschappen'){ const n=items.length; return {k,headline:`${n} trips`,saving:Math.round(total*0.12),steps:[
    `<b>${n} boodschappentrips</b> deze maand (gem. ${euro(total/n)}), vooral bij PLUS, Vomar en Safrana.`,
    `Doe 1 grote weekboodschap met een lijstje in plaats van veel kleine trips. Minder impuls scheelt al gauw ${E(total*0.12)} per maand.`,
    `Kies vaker huismerk: vaak goedkoper voor hetzelfde product.`]}; }
  if(k==='sport'){ return {k,headline:`abonnement ${E(total)}/mnd`,saving:Math.round(total*0.5),steps:[
    `Sportabonnement <b>${E(total)}/mnd</b> (Health Club). Ga je er minder dan 1×/week heen? Een losse 10-rittenkaart is dan goedkoper.`,
    `Anders: vraag of je het in rustige maanden tijdelijk kunt pauzeren.`]}; }
  if(k==='shopping'){ return {k,headline:`${E(total)} winkelen`,saving:Math.round(total*0.25),steps:[
    `<b>${E(total)}</b> aan winkelen${top?` (o.a. ${top.name})`:''}, grotendeels kleding.`,
    `Stel een maandelijks kledingbudget in en hanteer een 48-uurs wachtregel voor niet-essentiële aankopen.`]}; }
  if(k==='goededoel'){ return {k,headline:`${E(total)} aan giften`,saving:0,steps:[
    `Mooi dat je doneert (${E(total)}/mnd). Hier hoef je niet op te bezuinigen. Tip: leg giften vast als periodieke schenking, dan zijn ze aftrekbaar voor de inkomstenbelasting.`]}; }
  if(k==='vices'){ const E=v=>euro0(v); const top=groupMerch(items)[0]; return {k,headline:`${E(total)} aan vices`,saving:Math.round(total*0.4),steps:[
    `<b>${E(total)}</b> deze maand aan vices${top?` (o.a. ${esc(top.name)})`:''}. Minder hier is dubbele winst, voor je saldo én je gezondheid.`,
    `Zet een vast weekbudget en neem het contant op: wat op is, is op. Elke week onder je grens telt dubbel.`]}; }
  return null;
}
function savingsPlan(m){
  const t=totals(m);
  const cats=Object.entries(t.byCat).filter(([k,v])=>CATS[k].type==='expense'&&v<0).map(([k,v])=>[k,-v]).sort((a,b)=>b[1]-a[1]);
  const plan=[];
  for(const [k,total] of cats){
    if(total<25) continue;
    const items=txOfMonth(m).filter(x=>catOf(x)===k && x.amount<0);
    const a=buildAction(k,total,items);
    if(a){ a.total=total; plan.push(a); }
    if(plan.length>=4) break;
  }
  return plan;
}
// status van een actie ('open' default)
function planStatus(k){ return (PLAN[k]||{}).status || 'open'; }
function markAction(k,status,saving){
  const note=(PLAN[k]||{}).note;
  if(status==='open'){ if(note) PLAN[k]={status:'open',note}; else delete PLAN[k]; }
  else { PLAN[k]={status, saving:status==='done'?(+saving||0):((PLAN[k]||{}).saving||0), note, ts:Date.now()}; }
  save(); render();
}
function editNote(k){
  const cur=(PLAN[k]||{}).note||'';
  const v=prompt('Notitie bij deze actie:',cur);
  if(v===null) return;
  const tx=v.trim();
  const cur2=Object.assign({status:'open'},PLAN[k]||{});
  if(tx) cur2.note=tx; else delete cur2.note;
  if(!cur2.note && (cur2.status==='open')) delete PLAN[k]; else PLAN[k]=cur2;
  save(); render();
}

}
function leverSel(k){ return (SET.levers&&SET.levers[k])||[]; }
function leverCustomList(k){ return (SET.leverCustom&&SET.leverCustom[k])||[]; }
function toggleLever(k,id){ SET.levers=SET.levers||{}; const cur=new Set(SET.levers[k]||[]); cur.has(id)?cur.delete(id):cur.add(id); SET.levers[k]=[...cur]; save(); renderActions(); }

function buildCoaching(){
  if(!TX.length || SET.coachOff) return '';
  const now=new Date(); const nowYM=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const done=months().filter(m=>m<nowYM).slice(-6);
  if(done.length<2) return '';
  const lim=SET.limit, tgtPct=100-lim, mn=m=>MNAMES[+m.slice(5,7)-1];
  const base=baseIncome(), target=Math.round(monthlySavingTarget());
  const avg=a=>a.length?a.reduce((s,x)=>s+x,0)/a.length:0;
  const rows=done.map(m=>{const t=totals(m);return{m,inc:t.income,sp:t.spend,bud:t.budget,saved:t.income?(t.income-t.spend)/t.income*100:0,savedEur:t.income-t.spend,over:t.spend>t.budget};});
  let streak=0; for(let i=rows.length-1;i>=0;i--){ if(rows[i].over) streak++; else break; }
  const overN=rows.filter(r=>r.over).length;
  const srt=rows.slice().sort((a,b)=>a.saved-b.saved); const worst=srt[0];
  // windfall-afhankelijkheid: sparen in gewone salarismaanden vs meevallermaanden
  const normal=rows.filter(r=>r.inc<=base*1.15), windfall=rows.filter(r=>r.inc>base*1.15);
  const savNormal=Math.round(avg(normal.map(r=>r.savedEur)));
  const windfallDep = normal.length>=1 && windfall.length>=1 && savNormal<target*0.7;
  const spW=Math.round(avg(windfall.map(r=>r.sp))), spN=Math.round(avg(normal.map(r=>r.sp)));
  const lifestyle = windfall.length>=1 && normal.length>=1 && spW>spN*1.12;
  // grootste variabele categorie (gem/mnd)
  const vc={}; for(const m of done){ for(const t of txOfMonth(m)){ if(t.amount<0 && CATS[catOf(t)].type==='expense' && !isFixed(t)){ const k=catOf(t); vc[k]=(vc[k]||0)+(-t.amount);} } }
  const topVar=Object.entries(vc).map(([k,v])=>({k,avg:v/done.length})).sort((a,b)=>b.avg-a.avg)[0];
  // spaarautomatisering die nog als uitgave staat (N26 'Rules')
  const savRx=/monthly rule|weekly rule/i; let savMis=0,savN=0;
  for(const m of done.concat([curMonth])){ for(const t of txOfMonth(m)){ if(t.amount<0 && CATS[catOf(t)].type==='expense' && savRx.test(t.name||'')){ savMis+=-t.amount; savN++; } } }
  // tempo deze maand
  const isNow=curMonth===nowYM; const tCur=totals(curMonth); const de=daysElapsed(curMonth); const el=de.elapsed||1;
  const curPct=tCur.budget?Math.round(tCur.spend/tCur.budget*100):0;
  const projPct=tCur.budget?Math.round((tCur.spend/el*de.dim)/tCur.budget*100):0;
  const pace=(isNow&&curPct>0)?`Dag ${de.today||el}/${de.dim}: je staat op <b>${curPct}%</b> van je ruimte${projPct>105?`. Op dit tempo eindig je rond <b style="color:var(--red)">${projPct}%</b>`:''}. `:'';
  // ---- opbouw ----
  const diag=`<div class="small"><b>${ICON('search')} Diagnose.</b> ${streak>=2?`<b>${streak} maanden op rij</b> boven je ${lim}%-grens`:`${overN}/${done.length} maanden boven je ${lim}%-grens`} · gem. ${Math.round(avg(rows.map(r=>r.saved)))}% gespaard (doel ${tgtPct}%). Zwakst: ${mn(worst.m)}, ${euro0(worst.inc)} binnen, ${euro0(worst.sp)} eruit → <b>${Math.round(worst.saved)}%</b>.</div>`;
  const obs1=windfallDep?`<div class="coach bad" style="margin:8px 0"><div class="ic">${ICON('warn')}</div><div class="tx"><b>Je doel hangt aan meevallers.</b> In je gewone salarismaanden zet je gemiddeld maar <b>${euro0(savNormal)}</b> weg. Dat is ${euro0(target-savNormal)} ónder je ${euro0(target)}-doel. Je haalt het alleen dankzij dividend/vakantiegeld.</div></div>`:'';
  const obs2=(!windfallDep&&lifestyle)?`<div class="coach warn" style="margin:8px 0"><div class="ic">${ICON('warn')}</div><div class="tx"><b>Lifestyle inflation.</b> Je rijkere maanden zijn ook je dúurste (gem. ${euro0(spW)} vs ${euro0(spN)}). Extra geld gaat op, niet naar je buffer.</div></div>`:'';
  const savFix=savN>=2?`<div class="coach info" style="margin:8px 0"><div class="ic">${ICON('tag')}</div><div class="tx"><b>${euro0(savMis)} aan 'Rule'-overboekingen staat als uitgave.</b> Dat is je eigen sparen. Het maakt je cijfers slechter dan ze zijn. <span style="color:var(--teal);cursor:pointer;font-weight:700" onclick="fixSavingsRules()">los op met 1 tik ›</span></div></div>`:'';
  const vraag=topVar?`<div class="small" style="margin:8px 0"><b>${ICON('bulb')} Vraag.</b> ${CATS[topVar.k].name} kost je gem. <b>${euro0(topVar.avg)}/mnd</b>. Zou je dat vandaag, vanaf nul, opnieuw zo kiezen? <span style="color:var(--teal);cursor:pointer" onclick="openCategory('${topVar.k}')">bekijk ›</span></div>`:'';
  const acties=`<div class="small muted" style="font-weight:600;margin:12px 0 6px">${ICON('check')} Je 3 grootste hefbomen</div>
    <div class="coach" style="margin:0 0 6px"><div class="ic">1</div><div class="tx"><b>Sparen eerst.</b> €${target}/mnd automatisch weg op je salarisdag, nog vóór je het kunt uitgeven. Dan zijn je gewone maanden niet meer afhankelijk van meevallers.</div></div>
    ${topVar?`<div class="coach" style="margin:0 0 6px"><div class="ic">2</div><div class="tx"><b>${CATS[topVar.k].name} −15%:</b> van ${euro0(topVar.avg)} naar ~${euro0(topVar.avg*0.85)}/mnd. <span style="color:var(--teal);cursor:pointer" onclick="go('ins')">zie waar het heen gaat ›</span></div></div>`:''}
    <div class="coach" style="margin:0"><div class="ic">3</div><div class="tx"><b>Meevaller-quarantaine.</b> Alles boven ${euro0(base)} dat binnenkomt: 80% direct naar je buffer, vóór je het als ruimte ziet.</div></div>`;
  const acc=`<div class="coach info" style="margin-top:10px"><div class="ic">${ICON('repeat')}</div><div class="tx"><b>Deze maand.</b> ${pace}Focus: ${topVar?`houd ${CATS[topVar.k].name} onder ${euro0(topVar.avg*0.85)}`:'blijf onder je grens'} en zet de €${target}-overboeking vast.</div></div>`;
  return `<div class="card">
    <div class="row" style="margin-bottom:6px"><span class="hlabel" style="margin:0;flex:1">Coach</span><span class="small muted">laatste ${done.length} mnd</span></div>
    ${diag}${obs1}${obs2}${savFix}${vraag}${acties}${acc}
  </div>`;
}

function coachLeak(m){

  try{ for(const x of txOfMonth(m)){ const k=catOf(x), c=CATS[k];
    if(!(x.amount<0 && c && c.type==='expense' && !isFixed(x))) continue;

    const amt=-x.amount; if(amt<25) continue;
    const nm=titleCase(cleanMerch(x.name)||x.name||'een aankoop'); const rec=isRecurringMerchant(x.name);

  else if(imp) noPot={kind:'impulse',name:imp.name,amount:imp.amt,cat:imp.k};
  else if(need) noPot={kind:'missing-pot',name:need.name,amount:need.amt,cat:need.k};

  const ov=(typeof budgetOverCat==='function')?budgetOverCat(m):null;

  if(noPot && over) return over.amount>noPot.amount ? over : noPot;

function netWorthSeries(){
  const ms=months(); if(ms.length<2) return [];
  const cur=totalBalance().sum; const flow={}; ms.forEach(m=>flow[m]=0);
  for(const t of TX){ const m=t.date.slice(0,7); if(flow[m]!==undefined) flow[m]+=t.amount; }
  const balEnd={}; let runs=cur;
  for(let i=ms.length-1;i>=0;i--){ balEnd[ms[i]]=runs; runs-=flow[ms[i]]; }
  const overig=(SET.assets||[]).reduce((s,a)=>s+(+a.waarde||0),0);
  const sch=(SET.debts||[]).reduce((s,d)=>s+Math.max(+d.rest||0,0),0);
  return ms.map(m=>({m,nw:Math.round(balEnd[m]+overig-sch)}));
}
function nwChart(series){
  if(series.length<2) return '';
  const W=330,H=110,L=8,R=W-8,T=12,B=H-18; const vals=series.map(s=>s.nw);
  const mn=Math.min(...vals,0), mx=Math.max(...vals,1); const span=(mx-mn)||1;
  const X=i=>L+(i/(series.length-1))*(R-L); const Y=v=>B-((v-mn)/span)*(B-T);
  const pts=series.map((s,i)=>`${X(i).toFixed(1)},${Y(s.nw).toFixed(1)}`).join(' ');
  const MN=['','jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
  const step=Math.max(Math.ceil(series.length/5),1);
  const labs=series.map((s,i)=>(i%step===0||i===series.length-1)?`<text x="${X(i).toFixed(1)}" y="${H-4}" fill="#8a97ab" font-size="8.5" text-anchor="middle">${MN[+s.m.slice(5,7)]}</text>`:'').join('');
  const zero=mn<0?`<line x1="${L}" y1="${Y(0).toFixed(1)}" x2="${R}" y2="${Y(0).toFixed(1)}" stroke="#56627d" stroke-dasharray="3 3"/>`:'';
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">${zero}<polyline points="${pts}" fill="none" stroke="#2dd4bf" stroke-width="2.4"/></svg>`+`<div style="display:flex;justify-content:space-between;margin-top:-14px">${labs?'':''}</div>`;
}

// ===== Coach-gedreven 'Sneller bij je doel?' =====
// concrete, op patronen gebaseerde manieren HOE je mindert (geen generiek 'geef minder uit')
function goalCoachTips(m){
  const tips=[];
  try{ const small=txOfMonth(m).filter(t=>t.amount<0 && CATS[catOf(t)] && CATS[catOf(t)].type==='expense' && !isFixed(t) && (-t.amount)<=15);
    if(small.length>=6){ const save=Math.max(Math.round(small.reduce((a,t)=>a-t.amount,0)*0.35/5)*5,15);
      tips.push({key:'tip_small',icon:ICON('cart'),how:`Je deed deze maand <b>${small.length} kleine aankopen</b> onder de 15 euro. Als je die bundelt tot een paar vaste momenten, geef je vaak vanzelf minder uit.`,save,label:'Kleine aankopen bundelen'}); } }catch(_){}
  try{ let subs=[]; if(typeof subscriptionsList==='function') subs=subscriptionsList()||[]; const tot=subs.reduce((a,x)=>a+(x.amount||x.bedrag||0),0);
    if(subs.length>=2 && tot>=15){ const save=Math.max(Math.round(tot*0.3/5)*5,10);
      tips.push({key:'tip_subs',icon:ICON('repeat'),how:`Je hebt <b>${subs.length} abonnementen</b>, samen ${euro0(tot)} per maand. Loop ze eens na, want meestal zit er eentje bij die je niet meer echt gebruikt.`,save,label:'Abonnementen nalopen'}); } }catch(_){}
  try{ const days=[0,0,0,0,0,0,0]; const nm=['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag']; let tot=0;
    for(const t of txOfMonth(m)){ if(t.amount>=0)continue; const c=catOf(t); if(!CATS[c]||CATS[c].type!=='expense'||isFixed(t))continue; days[new Date(t.date).getDay()]+=-t.amount; tot+=-t.amount; }
    if(tot>0){ let mi=0; for(let i=1;i<7;i++) if(days[i]>days[mi])mi=i; const share=days[mi]/tot;
      if(share>=0.28 && days[mi]>=40){ const save=Math.max(Math.round(days[mi]*0.4/5)*5,10);
        tips.push({key:'tip_peak',icon:ICON('cal'),how:`Je losse uitgaven lopen vooral op <b>${nm[mi]}</b> op (${Math.round(share*100)}%). E\u00e9n rustige ${nm[mi]} per week scheelt al gauw wat.`,save,label:nm[mi]+' rustiger'}); } } }catch(_){}
  if(tips.length<2){ try{ for(const o of coachRuleOptions(m)){ if(tips.find(t=>t.key===o.key))continue;
        tips.push({key:o.key,icon:ICON('bulb'),how:`<b>${esc(o.label)}</b> is een van de grootste posten waar je zelf aan kunt draaien.`,save:o.cut,label:o.label}); if(tips.length>=3)break; } }catch(_){} }
  return tips.slice(0,3);
}

function goalChartCard(){ let S=null; try{S=savingsModel();}catch(_){} if(!S||!S.goal||S.goal<=0) return '';

function goalDualChart(ingelegd,doel,maand,cut,baseMonths,newMonths){
  const W=324,H=110,x0=8,x1=W-8,yT=16,yB=H-22;
  const maxM=Math.max(baseMonths,1);
  const frac=doel>0?Math.min(Math.max(ingelegd/doel,0),1):0;
  const startY=yB-frac*(yB-yT);
  const X=mn=>x0+(Math.min(mn,maxM)/maxM)*(x1-x0);
  const bX=X(baseMonths), nX=X(newMonths);
  const accel = cut>0 && newMonths<baseMonths;
  const dShort=mn=>{const d=new Date();d.setMonth(d.getMonth()+mn);return d.toLocaleDateString('nl-NL',{month:'short'});};
  const goalLine=`<line x1="${x0}" y1="${yT}" x2="${x1}" y2="${yT}" stroke="#39496a" stroke-width="1.4" stroke-dasharray="4 4"/><text x="${x1}" y="${yT-5}" fill="#8a97ab" font-size="9" text-anchor="end">doel ${euro0(doel)}</text>`;
  const baseLine=`<line x1="${X(0)}" y1="${startY}" x2="${bX}" y2="${yT}" stroke="#56627d" stroke-width="2" stroke-dasharray="5 4"/><circle cx="${bX}" cy="${yT}" r="3.2" fill="#56627d"/><text x="${bX}" y="${H-6}" fill="#8a97ab" font-size="9" text-anchor="${bX>W-30?'end':'middle'}">${dShort(baseMonths)}</text>`;
  const accelLine=accel?`<line x1="${X(0)}" y1="${startY}" x2="${nX}" y2="${yT}" stroke="#2dd4bf" stroke-width="2.6"/><circle cx="${nX}" cy="${yT}" r="4" fill="#2dd4bf"/><text x="${nX}" y="${H-6}" fill="#2dd4bf" font-size="9" font-weight="700" text-anchor="middle">${dShort(newMonths)}</text>`:'';
  return `<div class="gc-dual"><svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="none">${goalLine}${baseLine}${accelLine}</svg>
    <div class="gc-leg"><span><i style="background:#2dd4bf"></i>jouw koers</span><span><i class="d" style="border-color:#56627d"></i>huidig tempo</span></div></div>`;
}
function goalCoachCard(){
  let S=null; try{S=savingsModel();}catch(_){}
  if(!S||!S.goal||S.goal<=0) return '';
  const ingelegd=Math.round(S.cur),doel=Math.round(S.goal),maand=Math.round(S.monthlySaving),toGo=Math.max(doel-ingelegd,0);
  if(isMode('rustig')||toGo<=0||maand<=0) return goalChartCard();
  const m=curMonth||months()[months().length-1];
  const tips=goalCoachTips(m); if(!tips.length) return goalChartCard();
  let cut=0; const active=new Set();
  for(const t of tips){ if(SET.coachRules&&SET.coachRules[t.key]){ cut+=+SET.coachRules[t.key]||0; active.add(t.key);} }
  const baseMonths=Math.ceil(toGo/maand), newMonths=Math.ceil(toGo/(maand+cut)), earlier=baseMonths-newMonths;
  const nd=new Date(); nd.setMonth(nd.getMonth()+newMonths); const dlabel=nd.toLocaleDateString('nl-NL',{month:'short',year:'numeric'});
  const n=active.size;
  const coach = n===0
    ? `Twee plekken om makkelijk sneller te sparen, op basis van je eigen uitgaven. Zet aan wat past.`
    : (earlier>=1 ? `${n===tips.length?'Goed bezig. ':'Mooi. '}Samen zet je <b style="color:var(--teal)">${euro0(cut)} per maand</b> extra opzij.` : `Met <b style="color:var(--teal)">${euro0(cut)} per maand</b> erbij ben je een paar weken eerder klaar.`);
  const chip = (cut>0) ? `<span class="gc-chipd">${earlier>=1?`${earlier} ${earlier===1?'maand':'maanden'} eerder`:'paar weken eerder'}</span>` : '';
  const sub = cut>0 ? `met ${euro0(cut)} per maand extra opzij` : 'kies hieronder om eerder klaar te zijn';
  const rows=tips.map(t=>{const on=active.has(t.key);return `<div class="gc-tip${on?' on':''}" onclick="toggleVooruitCut('${t.key}',${t.save})"><span class="gc-ic">${t.icon}</span><div class="gc-bd"><div class="gc-how">${t.how}</div><div class="gc-save">${euro0(t.save)} per maand</div></div><span class="gc-sw"></span></div>`;}).join('');
  const committed=SET.goalCommit&&SET.goalCommit.cut===cut&&cut>0;
  const commitBtn=cut>0?`<button class="gc-commit${committed?' done':''}" onclick="commitGoalCut(${cut})">${committed?`Vastgelegd, ${euro0(cut)} per maand`:`Leg ${euro0(cut)} per maand vast, dan help ik je eraan denken`}</button>`:'';
  const reinforce=committed?`<div class="small muted" style="margin-top:9px">Mooi dat je dit aangaat. Ik help je eraan denken en we kijken samen hoe het gaat. Een mindere week is niet erg, vooruitgang weegt zwaarder dan perfectie.</div>`:'';
  return `<div class="card">
    <div class="row" style="margin-bottom:7px"><span class="hlabel" style="margin:0;flex:1">${ICON('bulb')} Sneller bij je doel?</span></div>
    <div class="gc-bighead">Klaar ${dlabel}${chip}</div>
    <div class="small muted" style="margin-top:2px">${sub}</div>
    ${goalDualChart(ingelegd,doel,maand,cut,baseMonths,newMonths)}
    <div class="gc-coach" style="margin-top:12px"><span>${coach}</span></div>
    ${rows}${commitBtn}
    ${reinforce}
  </div>`;
}

// COACH-GESPREK (startpunt): persoonlijke groet + constatering + eerlijke vooruitblik
function coachOpening(){
  const m=curMonth||months()[months().length-1];
  const t=totals(m); const L=monthLiquidity();
  const nm=(SET.name||'').trim().split(/\s+/)[0];
  const greet=nm?`Hey ${esc(nm)},`:'Hey,';
  const bud=Math.round(t.budget), spent=Math.round(t.spend);
  // 2) constatering: waar sta je nu t.o.v. je budgetdoel + dagen resterend (feitelijk, toon zit in de vooruitblik)
  let cons;
  if(bud<=0){
    cons=`ik zie nog geen inkomen, dus je budgetdoel kan ik nog niet berekenen. Stel je inkomen in bij Instellingen, dan coach ik je gericht.`;
  } else {
    cons=`ik zie dat je op ${euro0(spent)} van je ${euro0(bud)}-budget zit, met nog ${L.daysLeft} dagen te gaan deze maand.`;
  }
  // 3) eerlijke vooruitblik, toon past zich aan de situatie aan: ruimte (nuchter) / op koers (fragiel) / over (eerlijk, niet straffen)
  let outlook='', outWarn=false;
  if(bud>0){
    // resterende variabele uitgaven: dagtempo, maar afgetopt op wat er van je variabele norm nog over is
    // (anders telt de coach het volledige dag-gemiddelde bij terwijl je je variabele budget deze maand al op had)
    const fm=(typeof forecastModel==='function')?forecastModel():null;
    const fVar=fm?fm.fVar:0;
    const variSpent=splitFixedVar(m).vari;
    const varRemain = fVar>0 ? Math.max(0, Math.min(Math.round((fVar/30)*L.daysLeft), Math.round(fVar-variSpent))) : L.varDue;
    const ONTRACK=(+SET.onTrackFloor||0.8);   // expliciete grens: vanaf dit aandeel van je budget heet het 'op koers'
    const projSpend=spent+L.fixDue+varRemain;
    const overBy=Math.round(projSpend-bud);
    const room=Math.round(bud-projSpend);
    const items=(L.fixDueItems||[]).slice().sort((a,b)=>b.amount-a.amount);
    const names=items.slice(0,2).map(x=>{const nx=titleCase(cleanMerch(x.name)||''); return nx||(CATS[x.cat]?CATS[x.cat].name:'');}).filter(Boolean);
    const naming = names.length? `je ${names.join(' en ')} ${names.length>1?'moeten':'moet'} nog van je rekening` : `je vaste lasten moeten nog van je rekening`;
    if(overBy>0 || spent>bud){
      // SITUATIE 3, (gaat) fors over budget: eerlijk over de ernst, niet straffen
      outWarn=true;
      const lead = spent>bud
        ? `je zit op ${euro0(spent)} van je ${euro0(bud)}-budget en je bent er deze maand overheen`
        : `${naming}, en daarmee ga je deze maand zo'n ${euro0(overBy)} over je budget`;
      outlook=`Ik ga niet om de hete brij heen: ${lead}. Geen ramp, wél een signaal, hieronder zie je precies waar het lekt en wat de stap is.`;
    } else if(projSpend >= bud*ONTRACK){
      // SITUATIE 2, precies op koers: benoem dat 'op koers' fragiel is en bewaak het
      outlook=`Je loopt op schema.${L.fixDue<=0?` Je vaste lasten zijn deze maand al binnen, dus de ruimte die je ziet is echt.`:``} Maar eerlijk: "op koers" verlies je het makkelijkst, want het voelt veilig. Eén impulsaankoop en je kantelt. Hou vast aan je regel, geen budget, geen aankoop, dan eindig je mét marge in plaats van op de rand.`;
    } else {
      // SITUATIE 1, ruim binnen budget: nuchter blijven, richten op de volgende bestemming (geen schouderklopje)
      outlook=`Je houdt naar verwachting zo'n ${euro0(room)} over, en dat is geen toeval. De vraag is nu niet óf je iets leuks mag doen met dat geld, maar waar je het een bestemming geeft. Schuif het naar je spaardoel vóór het vanzelf opgaat, geld zonder bestemming verdwijnt, ook als je het goed deed.`;
    }
  }
  const lines=`<div class="cg-line">${cons}</div>${outlook?`<div class="cg-line${outWarn?' warn':''}">${outlook}</div>`:''}`;
  return `<div class="coachgreet"><div class="cg-hi">${greet}</div>${lines}</div>`+coachSandwich(m)+coachDiscipline(m);
}

  }catch(_){ persTxt=`Hou je dit vol, dan is dit de laatste maand dat je lasten je verrassen. Daarna werk jíj met je geld, niet andersom.`; }

// 1) STATUS op time-pacing: verwacht tempo = budget × verstreken/dim; incl. nog-te-komen vaste lasten in projEind
function coachStatus(m){
  const t=totals(m), L=monthLiquidity(), de=daysElapsed(m);
  const bud=Math.round(t.budget), spent=Math.round(t.spend);
  const dim=de.dim, elapsed=de.elapsed, left=Math.max(dim-elapsed,0);
  const expected=bud>0?Math.round(bud*elapsed/dim):0;            // lineair verwacht tempo tot nu
  const fm=(typeof forecastModel==='function')?forecastModel():null; const fVar=fm?fm.fVar:0;
  const variSpent=splitFixedVar(m).vari;
  const varRest=fVar>0?Math.max(0,Math.min(Math.round((fVar/dim)*left),Math.round(fVar-variSpent))):L.varDue;
  const projEnd=spent+L.fixDue+varRest;
  let verdict,vcol,vkey;
  if(bud<=0){ verdict='stel inkomen in'; vcol='var(--mut)'; vkey='none'; }
  else if(spent>bud||projEnd>bud){ verdict='over budget'; vcol='var(--amber)'; vkey='over'; }
  else if(spent<=expected*0.9){ verdict='ruim binnen'; vcol='var(--teal)'; vkey='room'; }
  else { verdict='op koers'; vcol='var(--teal)'; vkey='track'; }
  return {bud,spent,left,dim,elapsed,expected,projEnd,verdict,vcol,vkey,
    pct:bud>0?Math.min(spent/bud*100,100):0, pacePct:bud>0?Math.min(expected/bud*100,100):0};
}
// 3) "Wat ging goed", discretionair onder budget, anders een gedragswinst; nooit een over-budget categorie
function coachGood(m){
  let EB={}, act={}; try{ EB=effectiveBudgets(m).out; act=catSpendMap(m); }catch(_){}
  let good=null;
  for(const k in EB){ if(isFixedCat(k)) continue; const b=+EB[k]; if(b>0){ const a=act[k]||0; if(a>0 && a<=b*0.9){ if(!good||b>good.b) good={k,b,a}; } } }
  if(good) return `Je hield <b>${CATS[good.k].name.toLowerCase()}</b> strak onder controle (${euro0(good.a)} van ${euro0(good.b)}). Daar zat geen impuls in.`;
  // gedragswinst a) discretionaire categorie onder je eigen 3-maands gemiddelde
  const prev=months().filter(x=>x<m).slice(-3);
  if(prev.length){ let best=null;
    for(const k in act){ if(isFixedCat(k)||!CATS[k]||CATS[k].type!=='expense') continue;
      const avg=prev.reduce((s,mm)=>s+(catSpendMap(mm)[k]||0),0)/prev.length;
      if(avg>0 && act[k]<avg*0.85){ const drop=Math.round(avg-act[k]); if(!best||drop>best.drop) best={k,drop}; } }
    if(best) return `Je gaf <b>${euro0(best.drop)}</b> minder uit aan ${CATS[best.k].name.toLowerCase()} dan je gewend bent. Dat is een echte gedragswinst.`;
  }
  // gedragswinst b) totaal onder het verwachte tempo
  const st=coachStatus(m);
  if(st.bud>0 && st.spent<=st.expected*0.9) return `Je ligt <b>${euro0(st.expected-st.spent)}</b> onder je verwachte tempo voor deze maand. Goed gestuurd.`;
  return `Je kijkt naar je geld in plaats van weg. Dat is precies de gewoonte waar grip begint.`;
}

// concrete, gekwantificeerde gedragsregels per signaal, elke regel draagt z'n eigen maand-besparing (cut) voor de forecast
function coachRules(m,sig){
  const k=sig.catKey; const over=Math.round(sig.over||0); const r=(label,cut,heavy)=>({label,cut:Math.max(Math.round(cut||0),0),heavy:!!heavy});
  if(sig.scale==='week' && k){

        return [ r('Lease herfinancieren (€75 p/m lager)',75),
                 r('Kleiner of korter contract (€120 p/m lager)',120),
                 r(`Lease afkopen (+€${L} p/m cashflow)`,L,true) ]; }
      if(s.park>0 && s.park>=s.fuel){ const P=Math.round(s.park);
        return [ r(`P+R in plaats van centrum (€${Math.round(P*0.5)} p/m lager)`,P*0.5),
                 r(`Parkeren vooraf boeken (€${Math.round(P*0.3)} p/m lager)`,P*0.3),
                 r(`Vaker met het OV (€${Math.round(P*0.4)} p/m lager)`,P*0.4) ]; }
      const F=Math.round(s.fuel); const fw=Math.max(Math.floor((F/4)/5)*5,5);
      return [ r(`Tank max €${fw} per week (€${Math.round(F*0.2)} p/m lager)`,F*0.2),
               r(`Onbemand tanken (€${Math.round(F*0.06)} p/m lager)`,F*0.06),
               r(`Korte ritten op de fiets (€${Math.round(F*0.15)} p/m lager)`,F*0.15) ];
    }
    if(k==='uiteten') return [ r('Max 1× uit eten per week',over), r('Deze week thuis koken',over), r(`Max €${wk} per week`,over) ];
    if(k==='boodschappen') return [ r('1 grote weekboodschap',over), r(`Max €${wk} per week`,over), r('Geen losse ritjes',over) ];
    if(k==='shopping') return [ r('Eerst 24 uur wachten',over), r('Niks op afbetaling',over), r(`Max €${wk} per week`,over) ];
    if(k==='vices') return [ r(`Max €${wk} contant per week`,over), r('Niet pinnen',over), r('2 dagen per week overslaan',over) ];
    return [ r(`Max €${wk} per week`,over), r('1 vaste dag per week',over), r('Geen impulsaankopen',over) ];
  }
  if(sig.scale==='maand' && sig.tone!=='good') return [ r('Een abonnement opzeggen (€15 p/m)',15), r('Automatisch €100 per maand sparen',0), r('Een vaste last verlagen (€50 p/m)',50) ];
  return [ r('Naar mijn buffer',0), r('Extra aflossen',0), r('Laten staan',0) ];

  const byDay={}; let first='9999-99-99';

/* ----- VASTE vs VARIABELE LASTEN ----- */
const FIXED_CATS=new Set(['verzekering','studie','sport','abonnement','bankkosten','persoonlijk']);
function isFixed(t){
  const ov=(SET.fixOvr||{})[t.id]; if(ov) return ov==='fixed';                   // handmatige override: deze transactie
  const ovm=(SET.fixOvrM||{})[recurKey(t)]; if(ovm) return ovm==='fixed';        // handmatige override: alle van deze winkel
  const U=(t.desc||'').toUpperCase(), cat=catOf(t);
  if(/TRAVELCARD|PARKBEE|TANK|SHELL|ESSO|GELDMAAT/.test(U)) return false;       // brandstof/parkeren/opname = variabel
  if(FIXED_CATS.has(cat)) return true;
  if(cat==='zorg' && /INCASSO|ZILVEREN KRUIS|PREMIE/.test(U)) return true;       // zorgpremie = vast, losse zorg = variabel
  if(/HILTERMANN|LEASECONTRACT/.test(U)) return true;                            // leaseauto
  if(/INCASSO ALGEMEEN DOORLOPEND|PERIODIEKE OVERB|HUUR|HYPOTHEEK|BASISPAKKET|DUO /.test(U)) return true;
  return false;
}
function renderFixedVariable(list, inc){
  const items=list.filter(x=>x.amount<0 && CATS[catOf(x)].type==='expense');

  const spend=fixed+vari; if(spend<=0) return '';

// vergelijking huidige maand vs vorige: waar bespaard / meer uitgegeven
function openCompare(prev){

    ${saved.length?`<div class="small muted" style="margin:16px 0 4px">${ICON('check')} Meest bespaard per winkel/leverancier</div>${saved.map(x=>row(x.name,ICON('store'),x.d,'var(--green)')).join('')}`:''}

  $('#sheetBg').classList.add('show');
}

// percentage → leesbare breuk voor lekentaal ("bijna de helft")
function pctWord(p){
  if(p>=46&&p<=54) return 'ongeveer de helft';
  if(p>=42&&p<46) return 'bijna de helft';
  if(p>=30&&p<=37) return 'ongeveer een derde';
  if(p>=22&&p<=28) return 'ongeveer een kwart';
  if(p>=63&&p<=70) return 'ongeveer twee derde';
  if(p>=72&&p<=78) return 'ongeveer driekwart';
  if(p>=80) return 'het grootste deel';
  return null;
}
function renderWeekdayPattern(list){

  const sum=[0,0,0,0,0,0,0], cnt=[0,0,0,0,0,0,0], names=['ma','di','wo','do','vr','za','zo'];

}

/* ----- COACH (lichtgewicht AI-regels) ----- */

function coachTips(m){
  const t=totals(m), tips=[];
  const ms=months(), idx=ms.indexOf(m), prev=idx>0?ms[idx-1]:null;
  const pct = t.budget>0?t.spend/t.budget*100:0;
  const items = t.list.filter(x=>x.amount<0 && CATS[catOf(x)].type==='expense');
  const push=(pri,type,ic,msg,act)=>tips.push({pri,t:type,ic,m:msg,act:act||''});
  // inkomen-setup
  if(t.budget<=0) push(9,'info',ICON('gear'),`Geen inkomen herkend voor deze maand. Stel je <b>vast inkomen</b> in bij Instellingen voor een kloppend budget.`,"go('set')");
  // budgetstatus
  if(t.budget>0){
    const _d=new Date(), _nowYM=_d.getFullYear()+'-'+String(_d.getMonth()+1).padStart(2,'0'); const isNowM=(m===_nowYM);
    const rem=t.budget-t.spend; let fixDue=0; if(isNowM){ try{ fixDue=monthLiquidity().fixDue||0; }catch(_){ fixDue=0; } }
    const realFree=rem-fixDue;
    if(pct>=100){
      push(9,'bad',ICON('alert'),`Je zit ${euro(t.spend-t.budget)} boven budget. Hou je uitgaven deze week stil.`,"go('act')");
    } else if(isNowM && fixDue>0 && realFree<0){
      push(8,'bad',ICON('alert'),`Nog ${euro(rem)} over, maar ${euro0(fixDue)} vaste lasten komt nog. Hou losse uitgaven klein.`,"openFixedDue()");
    } else if(pct<70){
      push(5,'good',ICON('party'),`Je zit ruim binnen budget${isNowM&&fixDue>0?`. ${euro0(realFree)} is echt vrij na je vaste lasten`:''}. Blijf zo doorgaan.`,(isNowM&&fixDue>0)?"openFixedDue()":'');
    } else {
      push(6,'warn',ICON('clock'),`Nog ${euro(rem)} te besteden${isNowM&&fixDue>0?`, waarvan ${euro0(realFree)} echt vrij`:''}. Hou je tempo laag.`,(isNowM&&fixDue>0)?"openFixedDue()":"go('ins')");
    }
  }
  // vaste lasten als % van inkomen
  const sv=splitFixedVar(m);
  if(t.income>0 && sv.fixed>0){ const fr=Math.round(sv.fixed/t.income*100);
    push(fr>50?7:3, fr>50?'warn':'info',ICON('lock'),`${fr>50?`Je vaste lasten (${euro0(sv.fixed)}/mnd) zijn aan de hoge kant. Zeg één ongebruikt abonnement op.`:`Je vaste lasten (${euro0(sv.fixed)}/mnd) zijn gezond. Mooi.`}`,"openFixedDue()");
  }
  // spaarresultaat deze maand
  const saved=t.income-t.spend, target=monthlySavingTarget();
  if(t.income>0 && target>0){
    if(saved>=target) push(6,'good',ICON('coins'),`Je haalde je spaardoel van ${euro0(target)}. Mooi, hou dit vast.`);
    else if(saved>0) push(7,'warn',ICON('coins'),`Je spaarde ${euro0(target-saved)} minder dan je doel. Zet vandaag wat extra opzij.`,"go('act')");
    else push(8,'bad',ICON('coins'),`Je gaf ${euro0(-saved)} meer uit dan er binnenkwam. Sla vandaag één aankoop over.`,"go('act')");
  }
  // grootste stijger vs vorige maand
  if(prev){ const pt=totals(prev); let big=null;
    for(const k in t.byCat){ if(CATS[k].type!=='expense') continue; const nw=-Math.min(t.byCat[k],0), bef=-Math.min(pt.byCat[k]||0,0);
      if(bef>5 && nw>bef*1.2 && (nw-bef)>20){ const d=nw-bef; if(!big||d>big.d) big={k,nw,bef,d,pct:Math.round((nw/bef-1)*100)}; } }
    if(big) push(6,'warn',CATS[big.k].icon,`<b>${CATS[big.k].name}</b> steeg ${big.pct}% t.o.v. ${MFULL[+prev.slice(5,7)-1]} (${euro0(big.bef)} → ${euro0(big.nw)}).`,`openVariance('${big.k}')`);
  }
  // top uitgavebestemming
  const merch=groupMerch(items)[0];
  if(merch && merch.s>50) push(4,'info',ICON('store'),`Je grootste uitgavebestemming: <b>${esc(merch.name)}</b> (${euro0(merch.s)}, ${merch.n}×).`,"go('tx')");
  // weekdag-piek (variabel)
  const varItems=items.filter(x=>!isFixed(x));
  if(varItems.length>=6){ const sum=[0,0,0,0,0,0,0]; for(const x of varItems) sum[(new Date(x.date).getDay()+6)%7]+=-x.amount;
    const peak=sum.indexOf(Math.max(...sum)); const names=['maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag','zondag'];
    if(sum[peak]>0) push(3,'info',ICON('cal'),`Je geeft je variabele geld het meest uit op <b>${names[peak]}</b> (${euro0(sum[peak])} deze maand).`,"openVarTx()");
  }
  // abonnementen
  const subs=items.filter(x=>catOf(x)==='abonnement');
  if(subs.length>=2){ const s=subs.reduce((a,b)=>a-b.amount,0); push(4,'info',ICON('repeat'),`<b>${subs.length} abonnementen</b> kosten samen ${euro0(s)} deze maand. Eén opzeggen bespaart direct.`,"openCategory('abonnement')"); }
  // grootste enkele uitgave
  const biggest=items.slice().sort((a,b)=>a.amount-b.amount)[0];
  if(biggest && -biggest.amount>=100) push(2,'info',ICON('card'),`Je grootste enkele uitgave: <b>${esc(biggest.name)}</b> ${euro0(-biggest.amount)}.`,`openSheet('${biggest.id}')`);
  // buffer-ETA
  const S=savingsModel(); if(S.toGo>0 && S.monthlySaving>0 && S.cur>0) push(4,'info',ICON('target'),`Bij ${euro0(S.monthlySaving)}/mnd bereik je je buffer (${euro0(S.goal)}) over ±<b>${Math.round(S.monthsLeft)} maanden</b>.`);
  // ongecategoriseerd
  const uncat=items.filter(x=>catOf(x)==='overig').length;
  if(uncat>=5) push(2,'info',ICON('tag'),`<b>${uncat} transacties</b> staan op "Overig". Categoriseer ze voor scherpere inzichten.`,"go('set')");
  return tips.sort((a,b)=>(b.pri||0)-(a.pri||0)).slice(0,5);
}

function steerSpendUpTo(m, day){ // stuurbare (variabele) uitgaven per categorie in maand m t/m dag 'day' (99 = hele maand)
  const by={};
  for(const t of txOfMonth(m)){ if(t.amount>=0) continue; const c=catOf(t); if(!CATS[c]||CATS[c].type!=='expense'||isFixedCat(c)) continue; const d=+t.date.slice(8,10); if(d>day) continue; by[c]=(by[c]||0)+(-t.amount); }
  return by;
}
function monthVsPrevInner(m){
  const ms=months(); const idx=ms.indexOf(m); if(idx<1) return {has:false,drivers:new Set(),html:''};
  const prev=ms[idx-1];
  const now=new Date(); const todayYM=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const partial=(m===todayYM);
  const dim=new Date(+m.slice(0,4),+m.slice(5,7),0).getDate();
  const day=partial?Math.min(now.getDate(),dim):99;
  const sum=o=>Math.round(Object.values(o).reduce((s,v)=>s+v,0));
  const a=steerSpendUpTo(m,day), b=steerSpendUpTo(prev,day);
  const tThis=sum(a), tPrev=sum(b);
  if(tPrev<=0 && tThis<=0) return {has:false,drivers:new Set(),html:''};
  const delta=tThis-tPrev, minder=delta<0;
  const pct=tPrev>0?Math.round(Math.abs(delta)/tPrev*100):0;
  const keys=new Set([...Object.keys(a),...Object.keys(b)]);
  const diffs=[...keys].map(k=>({k,d:Math.round((a[k]||0)-(b[k]||0))})).filter(x=>Math.abs(x.d)>=5 && CATS[x.k]);
  const downs=diffs.filter(x=>x.d<0).sort((x,y)=>x.d-y.d).slice(0,3);
  const ups=diffs.filter(x=>x.d>0).sort((x,y)=>y.d-x.d).slice(0,2);
  const drivers=new Set([...downs,...ups].map(x=>x.k));
  // streak op volledige maanden (hele maand vs hele maand), exclusief een lopende maand
  let streak=0; const lastFull=partial?idx-1:idx;
  for(let i=lastFull;i>=1;i--){ const cur=sum(steerSpendUpTo(ms[i],99)), pr=sum(steerSpendUpTo(ms[i-1],99)); if(cur>0&&pr>0&&cur<pr) streak++; else break; }
  const col=minder?'var(--green)':'var(--red)';
  const rustig=isMode('rustig');
  const dirWord=minder?'minder':'meer';
  const drv=(minder?downs:ups).slice(0,2).map(x=>CATS[x.k].name.toLowerCase());
  const drvSentence=drv.length?`Vooral doordat je ${dirWord} aan ${drv.length>1?drv[0]+' en '+drv[1]:drv[0]} uitgaf.`:'';
  const sub=partial?'dan vorige maand, tot nu toe':'dan vorige maand';
  const html=`<div style="font-size:25px;font-weight:800;letter-spacing:-.5px;color:${col}">${euro0(Math.abs(delta))} ${dirWord}</div>
    <div class="small muted" style="margin-top:2px">${sub}</div>
    ${streak>=2?`<div class="small" style="color:var(--green);margin-top:5px">Al ${streak} maanden op rij minder uitgegeven.</div>`:''}
    ${(!rustig&&drvSentence)?`<div class="small muted" style="margin-top:9px">${drvSentence}</div>`:''}`;
  return {has:true,drivers,html};
}

/* ===== OPVALLEND DEZE MAAND, data-gedreven hypotheses (van 'wat' naar 'dus-wat') ===== */
function _catSpendOf(mm){ const by={}; for(const t of txOfMonth(mm)){ if(t.amount<0 && CATS[catOf(t)] && CATS[catOf(t)].type==='expense') by[catOf(t)]=(by[catOf(t)]||0)+(-t.amount); } return by; }
function insSignals(m,exclude){
  exclude=exclude||new Set();
  const ms=months(); const idx=ms.indexOf(m); if(idx<0) return [];
  const out=[]; const cur=_catSpendOf(m); const curTot=Object.values(cur).reduce((a,b)=>a+b,0);
  const dn=['maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag','zondag'];
  // 1) categorie stijgt 3 maanden op rij
  if(idx>=2){
    let best=null;
    for(const k of Object.keys(cur)){
      const a=_catSpendOf(ms[idx-2])[k]||0, b=_catSpendOf(ms[idx-1])[k]||0, c=cur[k]||0;
      if(exclude.has(k)) continue;
      if(c>b && b>a && a>0 && (c-a)>=15 && (!best||(c-a)>best.d)) best={k,a,c,d:c-a};
    }
    if(best) out.push({pri:9,tone:'warn',act:`openCategory('${best.k}')`,
      kpiLabel:CATS[best.k].name, kpiVal:euro0(best.c), kpiSub:`was ${euro0(best.a)}`, chip:{text:'loopt op',type:'up'},
      hyp:`${CATS[best.k].name} loopt al drie maanden op.`, imp:`Kijk of dit blijvend is; zo ja, zet er een grens op.`});
  }
  // 2) bovengemiddeld aandeel t.o.v. eigen historie
  if(idx>=1 && curTot>0){
    const hist=ms.slice(Math.max(0,idx-3),idx); let best=null;
    for(const k of Object.keys(cur)){
      const share=cur[k]/curTot; let hs=0,hc=0,as=0,ac=0;
      for(const mm of hist){ const sp=_catSpendOf(mm); const tot=Object.values(sp).reduce((a,b)=>a+b,0); if(tot>0){ hs+=(sp[k]||0)/tot; hc++; } if((sp[k]||0)>0){ as+=sp[k]; ac++; } }
      const avg=hc?hs/hc:0, avgAmt=ac?as/ac:0;
      if(exclude.has(k)) continue;
      if(share>=0.12 && (share-avg)>=0.05 && (!best||share>best.share)) best={k,share,avg,amt:cur[k],avgAmt};
    }
    if(best){ const mult=best.avgAmt>0?best.amt/best.avgAmt:0;
      out.push({pri:7,tone:'warn',act:`openCategory('${best.k}')`,
        kpiLabel:CATS[best.k].name, kpiVal:euro0(best.amt), kpiSub:best.avgAmt>0?`jouw gemiddelde ${euro0(best.avgAmt)}`:'bovengemiddeld',
        chip:{text:mult>=1.4?(mult.toFixed(1).replace('.',',')+'\u00d7 normaal'):'bovengemiddeld',type:'up'},
        hyp:`Aan ${CATS[best.k].name.toLowerCase()} ben je dit keer veel meer kwijt dan je gewend bent.`, imp:`Check of het eenmalig was; anders een grens op ${CATS[best.k].name.toLowerCase()}.`}); }
  }
  // 3) piekdag (variabele uitgaven)
  const vis=txOfMonth(m).filter(x=>x.amount<0 && CATS[catOf(x)] && CATS[catOf(x)].type==='expense' && !isFixed(x));
  if(vis.length>=6){
    const sumd=[0,0,0,0,0,0,0]; for(const x of vis){ sumd[(new Date(x.date).getDay()+6)%7]+=-x.amount; }

// "Wat valt op", gecombineerd: maand-over-maand (vs vorige maand) + ontdubbelde patroonsignalen (vs je normaal).

function weekBoundsFromAnchor(anchor, weeksBack){

}
function weekVarTx(start,end){ return TX.filter(t=>{ if(t.amount>=0)return false; const c=catOf(t); if(!CATS[c]||CATS[c].type!=='expense'||isFixed(t))return false; const dt=new Date(t.date); return dt>=start&&dt<=end; }); }

  const nm=['ma','di','wo','do','vr','za','zo']; const dayFull=['maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag','zondag'];
  const max=Math.max(...days,1), peak=days.indexOf(Math.max(...days));

    else { insight=`Je hield <b>${cat}</b> lager dan vorige week. Was dat een bewuste keuze, leg het dan vast met een kleine weekgrens, dan beklijft het.`; }

      <div class="wvo-tile"><div class="wvo-tl">Vorige week</div><div class="wvo-tv" style="color:var(--mut)">${euro0(lastSum)}</div><div class="wvo-ts">${normAvg>0?`normaal ~${euro0(normAvg)}`:'vorige week'}</div></div>

function renderCat(){

  $('#s-cat').innerHTML=`<div class="card">${donut}</div><div class="card">${rows||'<div class="muted small">geen uitgaven</div>'}</div>${internHtml}`;

function insOverview(m){
  const t=totals(m); const saved=Math.round(t.income-t.spend);
  return `<div class="card"><div class="hlabel" style="margin:0 0 10px">Deze maand</div>
    <div class="ov-row"><span>Uitgegeven</span><span>${euro0(t.spend)}</span></div>
    <div class="ov-row"><span>Over</span><span style="color:${saved>=0?'var(--teal)':'var(--red)'}">${euro0(saved)}</span></div></div>`;
}
function renderBehavior(m){
  const rows=[]; const actual=catSpendMap(m), EB=effectiveBudgets(m).out; let worst=null;
  for(const k in EB){ if(+EB[k]>0){ const act=actual[k]||0; if(act>+EB[k]){ const band=budgetBand(+EB[k],act); if(band==='action'||band==='monitor'){ const over=act-(+EB[k]); if(!worst||over>worst.over) worst={k,over}; } } } }
  if(worst) rows.push({tone:'warn',txt:`${CATS[worst.k].name} loopt uit de pas`,k:worst.k});
  for(const i of (coachItems()||[])){ if(i.t==='good'||rows.length>=4) continue;
    if(worst && i.insight && i.insight.toLowerCase().includes(CATS[worst.k].name.toLowerCase())) continue;
    rows.push({tone:i.t,txt:i.insight}); }
  if(!rows.length) return '';
  const dotc=t=>t==='bad'?'var(--red)':t==='warn'?'var(--amber)':'var(--teal)';
  const body=rows.slice(0,4).map(r=>`<div class="beh-row"><span class="beh-dot" style="background:${dotc(r.tone)}"></span><span class="beh-t">${esc(r.txt)}</span></div>`).join('');
  return `<div class="card"><div class="hlabel" style="margin:0 0 4px">Gedrag</div>${body}</div>`;
}
function renderCatBreak(list){
  const by={}; for(const t of list){ if(t.amount<0 && CATS[catOf(t)].type==='expense') by[catOf(t)]=(by[catOf(t)]||0)+(-t.amount); }
  const ex=Object.entries(by).sort((a,b)=>b[1]-a[1]); if(!ex.length) return '';
  const max=ex[0][1], total=ex.reduce((s,e)=>s+e[1],0);
  const exp=!!SET.expandCat; const shown=exp?ex:ex.slice(0,3);
  const toggle=ex.length>3?`<button class="snz" onclick="toggleExpand('expandCat')">${exp?'minder ▲':'toon alle '+ex.length+' categorieën ▼'}</button>`:'';
  return `<div class="card"><div class="row" style="margin-bottom:2px"><span class="hlabel" style="margin:0;flex:1">Categorieën</span><span class="small muted"><b style="color:var(--txt);font-size:15px">${euro0(total)}</b> totaal</span></div>
    <div class="small muted" style="margin:0 0 10px;font-size:11px">Totaal uitgegeven deze periode · % = aandeel per categorie</div>
    ${shown.map(([k,v])=>{const c=CATS[k];const cnt=list.filter(x=>catOf(x)===k&&x.amount<0).length;return `
      <div class="cat-row" style="cursor:pointer" onclick="openCategory('${k}')"><div class="ava" style="background:var(--card2)">${c.icon}</div>
        <div class="g"><div class="t"><span>${c.name} <span class="c">· ${cnt}×</span></span><span>${euro(v)} <span class="muted small">${Math.round(v/total*100)}%</span> ›</span></div>
          <div class="bar-track" style="margin:0"><div class="bar-fill" style="width:${v/max*100}%;background:var(--teal)"></div></div></div>
      </div>`;}).join('')}${toggle}</div>`;
}

function csvDownload(name,rows){ const csv=rows.map(r=>r.map(c=>{ c=(c==null?'':String(c)); return /[";\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c; }).join(';')).join('\r\n'); const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1500); }
async function requestPersist(){ try{ if(navigator.storage && navigator.storage.persist){ if(!(await navigator.storage.persisted())) return await navigator.storage.persist(); return true; } }catch(_){} return false; }
async function requestPersistUI(){ const ok=await requestPersist(); toast(ok?`${ICON('check')} Beschermd: de browser wist je gegevens niet meer zomaar`:`${ICON('warn')} Niet gelukt. Installeer Minder als app voor de beste bescherming`); }

function ingest(items){
  let added=0;
  const existing=new Set(TX.map(t=>t.id));
  for(const {name,text} of items){
    const isCSV = /\.csv$/i.test(name) || /booking date|partner name|account name/i.test(text.slice(0,200));
    let res; try{ res = isCSV ? parseCSV(text) : parseMT940(text); }catch(e){ continue; }
    for(const t of res.txns){ if(!existing.has(t.id)){ TX.push(t); existing.add(t.id); added++; } }
    for(const a in res.balances){ ACCMETA[a]=Object.assign(ACCMETA[a]||{},res.balances[a]); }
  }
  TX.sort((a,b)=>a.date.localeCompare(b.date));
  applyOwnAccounts(); buildAccMeta(); save();
  return added;
}

/* ---------- automatische map-import (File System Access API) ---------- */

function idb(){return new Promise((res,rej)=>{const r=indexedDB.open('minder',1);r.onupgradeneeded=()=>r.result.createObjectStore('kv');r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}

async function idbSet(k,v){const db=await idb();return new Promise((res,rej)=>{const t=db.transaction('kv','readwrite');t.objectStore('kv').put(v,k);t.oncomplete=()=>res();t.onerror=()=>rej(t.error);});}

async function idbGet(k){const db=await idb();return new Promise((res,rej)=>{const t=db.transaction('kv','readonly');const q=t.objectStore('kv').get(k);q.onsuccess=()=>res(q.result);q.onerror=()=>rej(q.error);});}

async function connectFolder(){
  if(!FSA){ alert('Automatische map-import werkt in Chrome of Edge. Gebruik anders “Bestand toevoegen” of sleep je map op het scherm.'); return; }
  try{
    dirHandle=await window.showDirectoryPicker({id:'minder-bank',mode:'read'});
    await idbSet('dir',dirHandle);
    SET.autoSync=true; SET.folderName=dirHandle.name; save();
    await syncFolder(true);
  }catch(e){ if(e&&e.name!=='AbortError') alert('Kon de map niet koppelen: '+e.message); }
}

async function syncFolder(verbose){
  try{
    if(!dirHandle) dirHandle=await idbGet('dir');
    if(!dirHandle){ if(verbose) alert('Koppel eerst een map.'); return; }
    let p=await dirHandle.queryPermission({mode:'read'});
    if(p!=='granted'){ if(!verbose) return; p=await dirHandle.requestPermission({mode:'read'}); }
    if(p!=='granted'){ if(verbose) alert('Geen leestoegang tot de map gegeven.'); return; }
    const items=[];
    for await (const [name,h] of dirHandle.entries()){
      if(h.kind==='file' && FILE_RX.test(name)){ const f=await h.getFile(); items.push({name,text:await f.text()}); }
    }
    const added=ingest(items);
    SET.lastSync=Date.now(); SET.folderName=dirHandle.name; save();
    curMonth=null; render();
    if(added) try{ pushTopNotif(); updateNotifBadge(); }catch(_){}
    if(added) toast(`${ICON('check')} ${added} nieuwe transacties bijgewerkt`); else if(verbose) toast('Bijgewerkt, geen nieuwe transacties');
  }catch(e){ if(verbose) toast('Synchroniseren mislukt'); }
}

async function forgetFolder(){ dirHandle=null; SET.autoSync=false; SET.folderName=''; SET.lastSync=0; try{await idbSet('dir',null);}catch(e){} save(); render(); }

/* ---------- PSD2 live koppeling (Enable Banking via eigen backend) ---------- */

function psd2Cfg(){ return { url:(SET.psd2Url||'').replace(/\/+$/,''), token:SET.psd2Token||'' }; }

function psd2Ready(){ const c=psd2Cfg(); return !!(c.url && c.token); }

async function psd2Api(path, opts){
  opts=opts||{}; const c=psd2Cfg(); if(!c.url) throw new Error('Geen backend-URL ingesteld');
  const r=await fetch(c.url+path, Object.assign({}, opts, {
    headers: Object.assign({ 'Authorization':'Bearer '+c.token, 'Content-Type':'application/json' }, opts.headers||{})
  }));
  let data=null; try{ data=await r.json(); }catch(e){}
  if(!r.ok) throw new Error((data&&(data.error||data.detail))||('HTTP '+r.status));
  return data||{};
}
// iban → numeriek rekeningdeel (zelfde vorm als MT940 :25:, voor intern-detectie)

function ibanNum(iban){ const s=(iban||'').replace(/\s/g,''); if(s.length<8) return ''; const d=(s.slice(4).match(/\d+/g)||[]).join(''); return d.replace(/^0+/,''); }
// 1) bank kiezen → consent starten

async function psd2Refresh(silent){
  const meta=SET.psd2Accounts||{}; const keys=Object.keys(meta);
  if(!keys.length){ if(!silent) psd2Connect(); return; }
  if(!psd2Ready()){ if(!silent){ toast('Stel eerst de backend-URL en token in'); go('set'); } return; }
  if(!silent) toast('Verversen…');
  const from=new Date(); from.setMonth(from.getMonth()-2); const fromStr=from.toISOString().slice(0,10);
  const allTx=[]; const balances={}; let authFail=false, anyOk=false;
  for(const accId of keys){ const uid=meta[accId].uid; if(!uid) continue;
    let cont=null, guard=0;
    do{
      const qs='?date_from='+fromStr+(cont?'&continuation_key='+encodeURIComponent(cont):'');
      let d; try{ d=await psd2Api('/accounts/'+encodeURIComponent(uid)+'/transactions'+qs); anyOk=true; }
      catch(e){ if(/40[13]|verlop|expired|consent|session|unauth/i.test(e.message||'')) authFail=true; break; }
      for(const raw of (d.transactions||[])){ const t=mapPsd2Tx(raw, accId); if(t) allTx.push(t); }
      cont=d.continuation_key||null; guard++;
    } while(cont && guard<40);
    try{ const b=await psd2Api('/accounts/'+encodeURIComponent(uid)+'/balances'); const bal=pickBalance(b); if(bal!=null) balances[accId]={balance:bal,date:new Date().toISOString().slice(0,10)}; }catch(e){}
  }
  if(authFail && !anyOk){ if(!silent){ toast('Koppeling verlopen, log opnieuw in'); psd2Connect(); } return; }
  SET.psd2LastSync=Date.now(); save();
  const added=commitTx(allTx, balances);
  if(SET.psd2Pending!==false){ const pend=[];
    for(const accId of keys){ const uid=meta[accId].uid; if(!uid) continue;
      try{ const dp=await psd2Api('/accounts/'+encodeURIComponent(uid)+'/transactions?date_from='+fromStr+'&transaction_status=PDNG');
        for(const raw of (dp.transactions||[])){ const t=mapPsd2Tx(raw, accId, true); if(t) pend.push(t); }
      }catch(e){}
    }
    applyPending(pend);
  }
  curMonth=null; render();
  if(added) try{ pushTopNotif(); updateNotifBadge(); }catch(_){}
  if(!silent) toast(added? `${ICON('check')} ${added} nieuwe transacties` : 'Bijgewerkt, geen nieuwe (van vandaag soms nog niet geboekt)');
}
async function psd2Connect(){
  if(!psd2Ready()){ toast('Stel eerst je bank-verbinding in'); SET.advBank=true; SET.setOpen='bank'; save(); go('set'); return; }
  toast('Banken ophalen…');
  let banks;
  try{ const d=await psd2Api('/aspsps?country=NL'); banks=(d.aspsps||d||[]).filter(b=>b&&b.name).sort((a,b)=>a.name.localeCompare(b.name)); }
  catch(e){ toast('Fout: '+e.message); return; }
  if(!banks.length){ toast('Geen banken ontvangen'); return; }
  $('#sheet').innerHTML=`<div class="grab"></div>
    <div class="center" style="margin-bottom:8px"><div style="font-size:22px">${ICON('bank')}</div><div style="font-weight:800;font-size:17px">Kies je bank</div>
      <div class="muted small">${banks.length} banken · je logt in bij je bank om toegang te geven</div></div>
    ${banks.map((b,i)=>`<div class="tx" style="cursor:pointer" onclick="psd2StartAuth(${i})">
      <div class="ava" style="background:var(--card2)">${ICON('bank')}</div>
      <div class="info"><div class="nm">${esc(b.name)}</div><div class="cat">${esc(b.country||'NL')}</div></div>
      <div class="amt" style="color:var(--teal)">›</div></div>`).join('')}`;
  window._psd2Banks=banks; $('#sheetBg').classList.add('show');
}

async function psd2StartAuth(idx){
  const b=(window._psd2Banks||[])[idx]; if(!b) return;
  const aspsp={ name:b.name, country:b.country||'NL' };
  const state='mind_'+Math.random().toString(36).slice(2)+Date.now().toString(36);
  const redirect=location.origin+location.pathname;
  sessionStorage.setItem('psd2_state', state); closeSheet();
  toast('Doorsturen naar '+b.name+'…');
  try{
    const d=await psd2Api('/auth',{ method:'POST', body:JSON.stringify({ aspsp, state, redirect_url:redirect, valid_days:90 }) });
    if(d&&d.url){ location.href=d.url; } else { toast('Geen autorisatie-URL ontvangen'); }
  }catch(e){ toast('Fout: '+e.message); }
}
// 2) terug van de bank: ?code=&state=

async function psd2HandleCallback(){
  const q=new URLSearchParams(location.search);
  const code=q.get('code'), state=q.get('state');
  if(!code) return;
  const expect=sessionStorage.getItem('psd2_state');
  history.replaceState(null,'',location.origin+location.pathname);
  if(expect && state && state!==expect){ toast('Sessie kwam niet overeen, probeer opnieuw'); return; }
  toast('Bankkoppeling afronden…');
  try{ const s=await psd2Api('/sessions',{ method:'POST', body:JSON.stringify({ code }) }); await psd2IngestSession(s); }
  catch(e){ toast('Fout bij afronden: '+e.message); }
}
// accounts uit de sessie → transacties + saldo ophalen en opslaan

async function psd2IngestSession(s){
  const accounts = s.accounts || [];
  if(!accounts.length){ toast('Geen rekeningen ontvangen'); return; }
  const meta=SET.psd2Accounts||{};
  const aspspName=(s.aspsp&&s.aspsp.name)||'Bank';
  const allTx=[]; const balances={}; const pend=[];
  const from=new Date(); from.setMonth(from.getMonth()-24); const fromStr=from.toISOString().slice(0,10);
  for(const a of accounts){
    const uid = a.uid || a;
    const iban = (a.account_id&&a.account_id.iban) || a.iban || '';
    const accId = ibanNum(iban) || ('psd2_'+String(uid).slice(0,8));
    const label = (a.name||a.product||'Rekening')+(iban?' ··'+iban.slice(-4):'');
    meta[accId]={ uid, iban, label, bank:aspspName, exp:(s.access&&s.access.valid_until)||'' };
    let cont=null, guard=0;
    do{
      const qs='?date_from='+fromStr+(cont?'&continuation_key='+encodeURIComponent(cont):'');
      let d; try{ d=await psd2Api('/accounts/'+encodeURIComponent(uid)+'/transactions'+qs); }
      catch(e){ toast('Transacties ophalen mislukt: '+e.message); break; }
      for(const raw of (d.transactions||[])){ const t=mapPsd2Tx(raw, accId); if(t) allTx.push(t); }
      cont=d.continuation_key||null; guard++;
    } while(cont && guard<40);
    try{ const b=await psd2Api('/accounts/'+encodeURIComponent(uid)+'/balances'); const bal=pickBalance(b); if(bal!=null) balances[accId]={balance:bal,date:new Date().toISOString().slice(0,10)}; }catch(e){}
    if(SET.psd2Pending!==false){ try{ const fp=new Date(); fp.setMonth(fp.getMonth()-1); const dp=await psd2Api('/accounts/'+encodeURIComponent(uid)+'/transactions?date_from='+fp.toISOString().slice(0,10)+'&transaction_status=PDNG');
      for(const raw of (dp.transactions||[])){ const t=mapPsd2Tx(raw, accId, true); if(t) pend.push(t); } }catch(e){} }
  }
  SET.psd2Accounts=meta; SET.psd2LastSync=Date.now();
  const added=commitTx(allTx, balances);
  applyPending(pend);
  curMonth=null; render();
  toast(added? `${ICON('check')} ${added} transacties gekoppeld van ${aspspName}` : `Koppeling met ${aspspName} ververst (geen nieuwe)`);
}
// Enable Banking transactie → intern TX-object (zelfde schema als MT940/CSV)

function mapPsd2Tx(raw, accId, pending){
  const amtObj = raw.transaction_amount || raw.amount || {};
  const val = parseFloat(amtObj.amount); if(isNaN(val)) return null;
  const cdi = (raw.credit_debit_indicator||'').toUpperCase();
  const amount = cdi==='DBIT' ? -Math.abs(val) : (cdi==='CRDT'? Math.abs(val) : val);
  const date = (raw.booking_date || raw.value_date || raw.transaction_date || '').slice(0,10);
  if(!date) return null;
  const remit = Array.isArray(raw.remittance_information)? raw.remittance_information.join(' ') : (raw.remittance_information||'');
  const cp = amount<0 ? (raw.creditor||{}) : (raw.debtor||{});
  const cpAcc = amount<0 ? (raw.creditor_account||{}) : (raw.debtor_account||{});
  const name = ((cp.name||'').trim() || remit.slice(0,42).trim() || 'Transactie');
  const desc = [name, remit, (raw.bank_transaction_code&&raw.bank_transaction_code.description)||''].filter(Boolean).join(' ');
  const t={ date, amount, acc:accId, src:'psd2', desc, name:name.replace(/\s+/g,' ').slice(0,44),
    refNums: cpAcc.iban? [ibanNum(cpAcc.iban)].filter(Boolean) : [] };
  categorize(t);
  if(pending){ t.pending=true; t.id+='_p'; }
  return t;
}

function pickBalance(b){
  const arr = (b&&(b.balances||b))||[]; if(!Array.isArray(arr)||!arr.length) return null;
  const pref = arr.find(x=>/CLBD|ITAV|XPCD|PRCD/i.test(x.balance_type||x.type||'')) || arr[0];
  const v = pref&&(pref.balance_amount||pref.amount); if(!v) return null;
  const n=parseFloat(v.amount); if(isNaN(n)) return null;
  return (pref.credit_debit_indicator||'').toUpperCase()==='DBIT' ? -Math.abs(n) : n;
}
// gedeelde commit voor kant-en-klare TX-objecten (zelfde dedup als ingest)

function applyPending(list){
  TX=TX.filter(t=>!t.pending);            // wis vorige pending-snapshot
  const booked=TX.slice();                // dedup alleen tegen geboekte/geïmporteerde tx
  let add=0;
  for(const t of (list||[])){ if(!t) continue;
    const dup=booked.some(b=>b.acc===t.acc && Math.abs(b.amount-t.amount)<0.01 && Math.abs((new Date(b.date)-new Date(t.date))/86400000)<=6);
    if(dup) continue;
    TX.push(t); add++;
  }
  TX.sort((a,b)=>a.date.localeCompare(b.date));
  applyOwnAccounts(); buildAccMeta(); save();
  return add;
}
function commitTx(newTxns, balances){
  let added=0; const existing=new Set(TX.map(t=>t.id));
  for(const t of newTxns){ if(t&&!existing.has(t.id)){ TX.push(t); existing.add(t.id); added++; } }
  if(balances) for(const a in balances){ ACCMETA[a]=Object.assign(ACCMETA[a]||{}, balances[a]); }
  TX.sort((a,b)=>a.date.localeCompare(b.date));
  applyOwnAccounts(); buildAccMeta(); save();
  if(added) try{ pushTopNotif(); updateNotifBadge(); }catch(_){}
  return added;
}

function psd2Disconnect(){
  if(!confirm('Live koppeling vergeten? (Reeds ingelezen transacties blijven staan.)')) return;
  SET.psd2Accounts={}; SET.psd2LastSync=0; save(); render();
}

/* ---------- map/bestanden slepen (werkt ook zonder File System Access API) ---------- */

function detectRecurring(){
  const map={};
  for(const t of TX){ if(t.amount>=0) continue; const c=catOf(t); if(CATS[c].type!=='expense'&&c!=='intern')continue;
    const key=t.name.toUpperCase().replace(/[0-9]/g,'').slice(0,18).trim();
    if(!key)continue; (map[key]=map[key]||{name:t.name,cat:c,amts:[],mset:new Set()});
    map[key].amts.push(-t.amount); map[key].mset.add(t.date.slice(0,7));
  }
  return Object.values(map).filter(r=>r.mset.size>=2).map(r=>({name:r.name,cat:r.cat,count:r.amts.length,
    avg:r.amts.reduce((a,b)=>a+b,0)/r.amts.length})).sort((a,b)=>b.avg-a.avg);
}

/* ----- ABONNEMENTEN / VASTE LASTEN CHECK ----- */
function isIncasso(t){ const U=((t.desc||'')+' '+(t.name||'')).toUpperCase();
  if(/\bBEA\b|BEA,|\bGEA\b|GEA,|ECOM|BETAALPAS|APPLE PAY|GOOGLE PAY|\bIDEAL\b|TIKKIE|CONTACTLOOS/.test(U)) return false;   // kaart/pin/online betaling = geen incasso
  if(t.src==='csv' && /(direct ?debit|incasso)/i.test(t.typ||'')) return true;                                            // N26 CSV: Type-veld
  return /INCASSO|DOORLOPENDE MACHTIGING|MACHTIGING|SEPA DD|DIRECT DEBIT/.test(U);
}
function subscriptionsList(){
  // alleen ECHTE, opzegbare abonnementen via AUTOMATISCHE INCASSO (geen losse betalingen, geen vaste lasten als verzekering/huur)
  const recent3=months().slice(-3); const r3=new Set(recent3);
  const map={};
  for(const t of TX){ if(t.amount>=0) continue; const c=catOf(t); if(!CATS[c]||CATS[c].type!=='expense') continue;
    if(!isIncasso(t)) continue;                                                 // alleen automatische incasso's
    const ym=t.date.slice(0,7); if(!r3.has(ym)) continue;                       // alleen laatste 3 maanden
    const key=(t.name||'').toUpperCase().replace(/[0-9]/g,'').replace(/\s+/g,' ').slice(0,20).trim(); if(!key) continue;
    const m=(map[key]=map[key]||{name:t.name,cat:c,byM:{},last:''}); m.byM[ym]=(m.byM[ym]||0)+(-t.amount); if(t.date>m.last)m.last=t.date; m.cat=c; }
  const subCats=new Set(['abonnement','sport','goededoel']);                    // opzegbaar
  const med=a=>{const z=a.slice().sort((x,y)=>x-y);return z.length?(z.length%2?z[(z.length-1)/2]:(z[z.length/2-1]+z[z.length/2])/2):0;};
  const out=[];
  for(const k in map){ const r=map[k];
    const vals=recent3.map(m=>r.byM[m]||0).filter(v=>v>0);
    if(vals.length<2) continue;                                                 // terugkerend: in >=2 van de laatste 3 maanden
    const mean=vals.reduce((a,b)=>a+b,0)/vals.length; const sd=Math.sqrt(vals.reduce((s,a)=>s+(a-mean)**2,0)/vals.length); const cv=mean>0?sd/mean:1;
    if(!(subCats.has(r.cat) || (r.cat==='overig' && cv<0.12))) continue;        // opzegbare categorie, of uncategorized maar stabiel
    out.push({key:k,name:r.name,cat:r.cat,monthly:Math.round(med(vals)),months:vals.length,last:r.last}); }   // bedrag = mediaan laatste 3 mnd
  return out.sort((a,b)=>b.monthly-a.monthly);
}
function subsCard(){ const list=subscriptionsList(); if(!list.length) return ''; const total=list.reduce((s,x)=>s+x.monthly,0);
  return `<div class="card" style="cursor:pointer" onclick="openSubs()"><div class="row"><span style="font-weight:600">${ICON('repeat')} Abonnementen</span><span class="small" style="color:var(--teal);font-weight:600">${euro0(total)}/mnd ›</span></div><div class="small muted" style="margin-top:4px">${list.length} ${list.length===1?'abonnement':'abonnementen'} · check wat je nog gebruikt</div></div>`; }
function toggleCancel(k){ SET.cancelFlags=SET.cancelFlags||{}; if(SET.cancelFlags[k]) delete SET.cancelFlags[k]; else SET.cancelFlags[k]=true; save(); openSubs(); }
function openSubs(){
  const list=subscriptionsList(); const flags=SET.cancelFlags||{};
  const total=list.reduce((s,x)=>s+x.monthly,0); const saving=list.filter(x=>flags[x.key]).reduce((s,x)=>s+x.monthly,0);
  $('#sheet').innerHTML=`<div class="grab"></div>
    <div class="row" style="margin-bottom:4px"><div style="font-weight:800;font-size:17px">${ICON('repeat')} Abonnementen</div><span class="small" style="color:var(--teal);cursor:pointer;font-weight:600" onclick="closeSheet()">Klaar</span></div>
    <div class="small muted" style="margin-bottom:10px">${list.length} ${list.length===1?'abonnement':'abonnementen'} · samen ${euro0(total)}/mnd. Markeer wat je niet meer gebruikt. <span style="display:block;margin-top:4px">Alleen automatische incasso&#39;s &middot; bedrag = mediaan van de laatste 3 maanden.</span></div>
    ${list.map(x=>{const on=!!flags[x.key]; return `<div class="row" style="padding:9px 0;border-top:1px solid var(--line);${on?'opacity:.55':''}">
      <div style="min-width:0;flex:1"><div style="font-weight:600;font-size:14px">${CATS[x.cat].icon||''} ${esc(x.name)}</div><div class="small muted">${euro0(x.monthly)}/mnd · ${x.months} mnd gezien</div></div>
      <button class="chip ${on?'on':''}" style="flex-shrink:0" onclick="toggleCancel('${x.key}')">${on?'opzeggen':'opzeggen?'}</button></div>`;}).join('')||'<div class="small muted">Nog geen abonnementen herkend.</div>'}
    ${saving>0?`<div style="margin-top:12px;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.35);border-radius:10px;padding:12px 14px;font-size:14px">Door deze op te zeggen bespaar je <b style="color:var(--green)">${euro0(saving)}/mnd</b> (${euro0(saving*12)}/jaar).</div>`:''}
    <div style="height:8px"></div>`;
  $('#sheetBg').classList.add('show');
}

/* ----- INSTELLINGEN ----- */

function toggleSet(id){ SET.setOpen = SET.setOpen===id?'':id; save(); renderSet(); }

async function readEntry(entry,items){
  if(!entry) return;
  if(entry.isFile){ await new Promise(res=>entry.file(async f=>{ if(FILE_RX.test(f.name)) items.push({name:f.name,text:await f.text()}); res(); },res)); }
  else if(entry.isDirectory){ const rd=entry.createReader();
    while(true){ const ents=await new Promise((res,rej)=>rd.readEntries(res,rej)); if(!ents.length) break; for(const e of ents) await readEntry(e,items); } }
}
document.addEventListener('dragover',e=>{e.preventDefault();});
document.addEventListener('drop',async e=>{
  e.preventDefault();
  const items=[];
  const ents=[...(e.dataTransfer.items||[])].map(i=>i.webkitGetAsEntry&&i.webkitGetAsEntry()).filter(Boolean);
  if(ents.length){ for(const en of ents) await readEntry(en,items); }
  else { for(const f of e.dataTransfer.files){ if(FILE_RX.test(f.name)) items.push({name:f.name,text:await f.text()}); } }
  if(items.length){ const added=ingest(items); curMonth=null; render(); if(added) try{ pushTopNotif(); updateNotifBadge(); }catch(_){} toast(added? `${ICON('check')} ${added} transacties ingelezen · alles blijft op dit toestel` : 'Geen nieuwe transacties'); }
});

/* ---------- start ---------- */
load(); try{requestPersist();}catch(_){} rolloverBudgets(); if(TX.length){ TX.forEach(categorize); applyOwnAccounts(); buildAccMeta(); } render(); // hercategoriseer met actuele regels
// blijf na een refresh op de actieve pagina (niet terug naar Home), behalve bij terugkeer van de bank-consent
try{ const _v=localStorage.getItem('minder_view'); if(_v && TX.length && document.getElementById('s-'+_v) && !new URLSearchParams(location.search).get('code')) go(_v); }catch(_){}
try{ if(TX.length) pushTopNotif(); updateNotifBadge(); }catch(_){}
try{ if(Object.keys(SET.psd2Accounts||{}).length && (Date.now()-(SET.psd2LastSync||0))>4*3600000) psd2Refresh(true); }catch(_){}
if(new URLSearchParams(location.search).get('code')) psd2HandleCallback(); // terug van bank (PSD2-consent)
(async()=>{ // auto-sync bij openen als de map al gekoppeld is en toegang al verleend is
  if(!FSA || !SET.autoSync) return;
  try{ dirHandle=await idbGet('dir');
    if(dirHandle && await dirHandle.queryPermission({mode:'read'})==='granted'){ await syncFolder(false); }
    else { render(); }
  }catch(e){}
})();

/* ---------- PWA: service worker + installeren ---------- */
if('serviceWorker' in navigator && location.protocol!=='file:'){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').then(reg=>{ try{reg.update();}catch(e){} }).catch(()=>{}));
  let _reloading=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{ if(_reloading)return; _reloading=true; location.reload(); });
}
window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); deferredPrompt=e; if(TX.length) renderSet(); });
window.addEventListener('appinstalled',()=>{ deferredPrompt=null; if(TX.length) renderSet(); });
async function installApp(){
  if(!deferredPrompt){ alert('Installeren kan via het browsermenu: ⋮ → “App installeren” (Chrome/Edge) of Deel → “Zet op beginscherm” (iPhone). Mogelijk is de app al geïnstalleerd.'); return; }
  deferredPrompt.prompt(); try{ await deferredPrompt.userChoice; }catch(e){} deferredPrompt=null; renderSet();
}
